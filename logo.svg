<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123b73"/>
      <stop offset="1" stop-color="#082849"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- horns: two swept crescents -->
  <path d="M298,168 C316,104 372,68 418,80 C384,86 342,118 332,182 Z" fill="#e8ddc8"/>
  <path d="M214,168 C196,104 140,68 94,80 C128,86 170,118 180,182 Z" fill="#e8ddc8"/>

  <!-- ears: out-flared leaves -->
  <path d="M342,224 C376,196 428,188 452,208 C462,217 452,238 424,248 C394,259 356,250 342,238 Z" fill="#f5f0e4"/>
  <path d="M170,224 C136,196 84,188 60,208 C50,217 60,238 88,248 C118,259 156,250 170,238 Z" fill="#f5f0e4"/>
  <!-- inner ears -->
  <path d="M352,226 C378,208 416,202 434,215 C440,222 432,233 412,240 C390,247 362,242 352,234 Z" fill="#c9536b"/>
  <path d="M160,226 C134,208 96,202 78,215 C72,222 80,233 100,240 C122,247 150,242 160,234 Z" fill="#c9536b"/>

  <!-- face: broad friendly brow easing to a soft rounded muzzle -->
  <path d="M256,152
           C314,152 348,184 352,228
           C355,270 328,330 310,366
           C294,398 278,412 256,412
           C234,412 218,398 202,366
           C184,330 157,270 160,228
           C164,184 198,152 256,152 Z" fill="#f5f0e4"/>

  <!-- beard: a proper tuft -->
  <path d="M232,404 C236,434 244,456 256,470 C268,456 276,434 280,404 C272,412 240,412 232,404 Z" fill="#e8ddc8"/>

  <!-- eyes -->
  <circle cx="215" cy="272" r="14" fill="#0a2440"/>
  <circle cx="297" cy="272" r="14" fill="#0a2440"/>
  <circle cx="219" cy="268" r="4.5" fill="#ffffff"/>
  <circle cx="301" cy="268" r="4.5" fill="#ffffff"/>

  <!-- nostrils -->
  <ellipse cx="242" cy="376" rx="6" ry="8" fill="#0a2440" transform="rotate(-15 242 376)"/>
  <ellipse cx="270" cy="376" rx="6" ry="8" fill="#0a2440" transform="rotate(15 270 376)"/>

  <!-- the one star, red, on the forehead -->
  <path d="M256 178 L266.6 199.8 L290.6 203.2 L273.3 220.1 L277.4 244 L256 232.7 L234.6 244 L238.7 220.1 L221.4 203.2 L245.4 199.8 Z" fill="#c9243f"/>

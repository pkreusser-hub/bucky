<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#233357">
<title>BUCKY — Hayhem</title>
<link rel="icon" href="bucky.png">
<style>
  :root{
    --navy:#233357; --navy-d:#18233b; --red:#ba303e; --red-d:#7a1f28;
    --cream:#f4efe4; --ink:#15233f;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; height:100%; overflow:hidden;
    background:linear-gradient(180deg,#7eb8e8 0%,#c5e4f5 45%,#8fb86a 100%);
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    user-select:none;
  }
  #bar{
    position:fixed; top:0; left:0; right:0; height:46px; z-index:40;
    display:flex; align-items:center; gap:10px; padding:0 12px;
    background:var(--navy); box-shadow:0 2px 10px rgba(0,0,0,.25);
  }
  #bar a{
    color:#fff; text-decoration:none; font-weight:800; font-size:15px;
    background:rgba(255,255,255,.15); padding:7px 12px; border-radius:9px;
  }
  #bar .t{ font-weight:800; letter-spacing:.3px; }
  #stage{ position:absolute; top:46px; left:0; right:0; bottom:0; }
  #stage canvas{ display:block; width:100%; height:100%; touch-action:none; cursor:crosshair; }

  /* ── title ── */
  #title{
    position:absolute; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse at 50% 18%, rgba(255,255,255,.35), transparent 55%),
      linear-gradient(180deg,#6aa8d8 0%,#b7d9a0 55%,#6e9a4a 100%);
    text-align:center; padding:24px 18px calc(env(safe-area-inset-bottom) + 24px);
  }
  #title.hidden{ display:none; }
  .logo{
    font-size:clamp(46px,13vw,80px); font-weight:900; letter-spacing:1px;
    color:#fff; text-shadow:0 3px 0 var(--navy-d),0 8px 18px rgba(0,0,0,.35);
    margin:0 0 4px;
  }
  .logo .pk{ filter:drop-shadow(0 3px 4px rgba(0,0,0,.3)); }
  .sub{
    margin:0 0 22px; font-size:15px; font-weight:700; color:var(--navy);
    background:rgba(255,255,255,.6); padding:6px 14px; border-radius:999px;
  }
  .playBtn{
    appearance:none; border:0; cursor:pointer;
    background:var(--red); color:#fff; font-weight:900; font-size:22px;
    padding:15px 44px; border-radius:16px;
    box-shadow:0 4px 0 var(--red-d),0 10px 24px rgba(0,0,0,.25);
  }
  .playBtn:active{ transform:translateY(2px); box-shadow:0 2px 0 var(--red-d),0 6px 14px rgba(0,0,0,.2); }
  .hint{
    margin-top:18px; max-width:330px; font-size:13.5px; line-height:1.5;
    color:var(--navy-d); font-weight:600; opacity:.92;
  }

  /* ── HUD ── */
  #hud{ position:absolute; inset:0; z-index:12; pointer-events:none; display:none; }
  #hud.on{ display:block; }

  .teamCard{
    position:absolute; top:54px;
    background:rgba(35,51,87,.82); border-radius:12px; padding:7px 11px;
    min-width:112px; border:2px solid rgba(255,255,255,.16);
    box-shadow:0 3px 12px rgba(0,0,0,.25);
  }
  #teamWest{ left:10px; }
  #teamEast{ right:10px; text-align:right; }
  #teamEast.eastcol{ background:rgba(186,48,62,.86); }
  .teamCard .lab{ font-size:10.5px; font-weight:800; opacity:.92; letter-spacing:.3px; }
  .teamCard .val{ font-size:17px; font-weight:900; margin-top:2px; }
  .teamCard.turnon{ outline:3px solid #ffd23f; }

  #banner{
    position:absolute; top:106px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:5px;
    pointer-events:none; max-width:88vw;
  }
  #turnMsg{
    background:rgba(24,35,59,.86); color:#fff; font-weight:900; font-size:15px;
    padding:7px 15px; border-radius:12px; white-space:nowrap;
    box-shadow:0 3px 12px rgba(0,0,0,.25); text-align:center;
  }
  #windBox{
    display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,.72); color:var(--navy); font-weight:800; font-size:12px;
    padding:4px 10px; border-radius:999px;
  }
  #windArrow{ font-size:15px; display:inline-block; transition:transform .2s; }
  #windPips{ letter-spacing:1px; color:var(--red); }

  #toast{
    position:absolute; top:172px; left:50%; transform:translateX(-50%);
    background:rgba(35,51,87,.9); color:#fff; font-weight:800; font-size:14px;
    padding:8px 15px; border-radius:12px; opacity:0; transition:opacity .2s;
    white-space:nowrap; max-width:92vw; overflow:hidden; text-overflow:ellipsis;
    pointer-events:none;
  }
  #toast.show{ opacity:1; }

  /* ── aim controls: HEIGHT + POWER sliders (bottom-left, kid-sized) ── */
  #aimControls{
    position:absolute; left:12px; bottom:calc(env(safe-area-inset-bottom) + 16px);
    width:min(200px, 46vw); pointer-events:auto;
    display:flex; flex-direction:column; gap:10px;
    background:rgba(35,51,87,.78); border-radius:14px; padding:10px 12px;
    border:2px solid rgba(255,255,255,.18);
  }
  #aimControls .sliderRow{ display:flex; flex-direction:column; gap:4px; }
  #aimControls label{
    font-size:11px; font-weight:800; letter-spacing:.4px;
    text-shadow:0 1px 3px rgba(0,0,0,.45);
  }
  #aimControls input[type="range"]{
    -webkit-appearance:none; appearance:none;
    width:100%; height:18px; border-radius:999px;
    background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.22);
    outline:none; touch-action:none; cursor:pointer;
  }
  #aimControls input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:28px; height:28px; border-radius:50%;
    background:#ffd23f; border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,.35); cursor:pointer;
  }
  #aimControls input[type="range"]::-moz-range-thumb{
    width:28px; height:28px; border-radius:50%;
    background:#ffd23f; border:3px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,.35); cursor:pointer;
  }
  #heightSlider{ accent-color:#7eb8e8; }
  #powerSlider{ accent-color:#ba303e; }

  /* ── FIRE button (bottom-right) + ammo chips directly above it ── */
  #fireBtn{
    position:absolute; right:14px; bottom:calc(env(safe-area-inset-bottom) + 16px);
    width:88px; height:88px; border-radius:50%;
    border:3px solid #fff; background:var(--red); color:#fff;
    font-weight:900; font-size:17px; letter-spacing:.5px;
    box-shadow:0 6px 0 var(--red-d),0 12px 28px rgba(0,0,0,.35);
    pointer-events:auto; touch-action:manipulation; cursor:pointer;
  }
  #fireBtn:active{ transform:translateY(3px); box-shadow:0 3px 0 var(--red-d),0 8px 16px rgba(0,0,0,.3); }
  #ammoRow{
    position:absolute; right:12px; bottom:calc(env(safe-area-inset-bottom) + 136px);
    display:flex; gap:7px; pointer-events:auto;
  }
  #ammoRow .chip{
    appearance:none; border:2px solid rgba(255,255,255,.35);
    background:rgba(35,51,87,.82); color:#fff;
    font-weight:900; font-size:15px; padding:8px 10px; border-radius:12px;
    cursor:pointer; touch-action:manipulation; white-space:nowrap;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  #ammoRow .chip.on{ border-color:#ffd23f; background:rgba(24,35,59,.95); outline:2px solid #ffd23f; }
  #ammoRow .chip:disabled{ opacity:.38; cursor:default; filter:grayscale(1); }

  #mute{
    position:absolute; top:112px; right:12px;
    width:40px; height:40px; border-radius:50%;
    border:2px solid rgba(255,255,255,.3); background:rgba(35,51,87,.8);
    color:#fff; font-size:18px; pointer-events:auto; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  #win{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(24,35,59,.55); pointer-events:auto; z-index:15;
  }
  #win.on{ display:flex; }
  #win .card{
    background:#fff; color:var(--navy); border-radius:18px; padding:24px 30px;
    text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.35); max-width:90vw;
  }
  #win h2{ margin:0 0 8px; font-size:30px; }
  #win p{ margin:0 0 18px; font-weight:700; color:#445; }
  #win button{
    appearance:none; border:0; background:var(--red); color:#fff;
    font-weight:900; font-size:17px; padding:13px 26px; border-radius:13px; cursor:pointer;
    box-shadow:0 4px 0 var(--red-d);
  }
  #win button:active{ transform:translateY(2px); box-shadow:0 2px 0 var(--red-d); }
</style>
</head>
<body>
  <div id="bar">
    <a href="games.html">← Bucky</a>
    <span class="t">🎃 Hayhem</span>
  </div>

  <div id="stage"></div>

  <div id="title">
    <div class="logo"><span class="pk">🎃</span> HAYHEM</div>
    <p class="sub">Farmyard artillery mayhem</p>
    <button class="playBtn" id="playBtn" type="button">PLAY</button>
    <p class="hint" id="titleHint">Tap the battlefield to aim, set height &amp; power, then FIRE!
      Splash the other farmyard's critters into the pond to win.</p>
  </div>

  <div id="hud">
    <div class="teamCard" id="teamWest">
      <div class="lab">🐐 WEST · GOATS</div>
      <div class="val" id="westVal">3 in</div>
    </div>
    <div class="teamCard eastcol" id="teamEast">
      <div class="lab">🛡 EAST · ARMADILLOS</div>
      <div class="val" id="eastVal">3 in</div>
    </div>
    <div id="banner">
      <div id="turnMsg">Your turn!</div>
      <div id="windBox"><span id="windArrow">→</span><span>WIND</span><span id="windPips">·</span></div>
    </div>
    <div id="toast"></div>
    <div id="aimControls">
      <div class="sliderRow">
        <label for="heightSlider">HEIGHT</label>
        <input type="range" id="heightSlider" min="0" max="100" value="45" aria-label="Shot height">
      </div>
      <div class="sliderRow">
        <label for="powerSlider">POWER</label>
        <input type="range" id="powerSlider" min="0" max="100" value="55" aria-label="Shot power">
      </div>
    </div>
    <div id="ammoRow">
      <button class="chip on" id="chip_pumpkin" type="button">🎃</button>
      <button class="chip" id="chip_melon" type="button">🍉 ×3</button>
      <button class="chip" id="chip_egg" type="button">🥚 ×3</button>
    </div>
    <button id="fireBtn" type="button">FIRE</button>
    <button id="mute" type="button" aria-label="Mute">🔊</button>
    <div id="win">
      <div class="card">
        <h2 id="winTitle">West Yard wins!</h2>
        <p id="winSub">Splash!</p>
        <button type="button" id="againBtn">PLAY AGAIN</button>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script type="module">
import * as CANNON from "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js";

(() => {
  "use strict";
  const DEG = Math.PI / 180;
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  const IS_MOBILE = !!(window.matchMedia &&
    window.matchMedia("(pointer: coarse)").matches &&
    Math.min(window.innerWidth, window.innerHeight) < 900);
  if (IS_MOBILE) document.body.classList.add("mobile");

  // ─────────────────────────────────────────────────────────────────────────
  // POND / WORLD CONSTANTS — ONE source of truth, used everywhere
  // ─────────────────────────────────────────────────────────────────────────
  const CELL = 0.55;
  const GX = 56, GY = 14, GZ = 32;
  const OX = -(GX * CELL) / 2;      // -15.4
  const OY = 0;
  const OZ = -(GZ * CELL) / 2;      // -8.8
  const CHUNK = 8;
  const CX = Math.ceil(GX / CHUNK), CY = Math.ceil(GY / CHUNK), CZ = Math.ceil(GZ / CHUNK);

  const POND_HALF_X = 3.0;          // world units
  const POND_HALF_Z = 6.3;
  const POND_BED_TOP = 2;           // top filled cell index inside pond
  const YARD_TOP = 7;               // nominal yard surface cell
  const WATER_LEVEL_CELLS = 4.0;    // between bed top (3) and yard top (8) worlds
  const WATER_Y = OY + WATER_LEVEL_CELLS * CELL;             // 2.20
  const BED_TOP_Y = OY + (POND_BED_TOP + 1) * CELL;          // 1.65  (< WATER_Y ✔)
  const WATER_OUT_T = 0.6;

  const CONTENT_HALF_X = 14.5;      // camera framing target (spawns at ±11.6)
  const CONTENT_HALF_Z = 8.5;

  const MAT = { 1: 0xa9713f /*dirt*/, 2: 0x74b054 /*grass*/, 3: 0x8a8f96 /*stone*/, 4: 0x5c6b7a /*pondbed*/ };

  const GRAV = 18;
  const MAX_POWER = 26;
  const BLAST_CARVE_R = 1.5;
  const BLAST_KNOCK_R = 2.9;
  const HIT_R = 0.62;               // projectile vs torso direct hit
  const SUBSTEP_MAX = 0.22;         // max world units per integration substep (anti-tunnel)
  const MIN_PITCH = 10 * DEG, MAX_PITCH = 70 * DEG;
  const PREVIEW_FRAC = 0.4;         // visible preview = first 40% of the honest arc

  // ── AMMO — three types; limited ones are per-team-per-match ──
  const AMMO = {
    pumpkin: { icon: "🎃", velF: 1.0,  carveR: BLAST_CARVE_R, knockR: BLAST_KNOCK_R, impF: 1.0, limit: Infinity },
    melon:   { icon: "🍉", velF: 0.85, carveR: 2.2,           knockR: 3.8,           impF: 1.4, limit: 3 },
    egg:     { icon: "🥚", velF: 1.0,  carveR: 0.8,           knockR: 2.0,           impF: 0.6, limit: 3 }
  };
  const AMMO_TYPES = ["pumpkin", "melon", "egg"];

  const UNIT_NAMES = { 0: ["Bucky", "Nanny", "Kid"], 1: ["Shell", "Rollie", "Pip"] };

  // ─────────────────────────────────────────────────────────────────────────
  // G — ALL shared gameplay state (JSON-serializable except .voxels Uint8Array)
  // ─────────────────────────────────────────────────────────────────────────
  const G = {
    phase: "title",          // title | aim | flying | settling | won
    activeTeam: 0,
    activeUnitId: 0,
    teamTurnCount: [0, 0],
    roundNum: 1,
    spawns: [
      { team: 0, x: -11.6, z: -3.3 },
      { team: 0, x: -12.1, z: 0.0 },
      { team: 0, x: -11.6, z: 3.3 },
      { team: 1, x: 11.6, z: -3.3 },
      { team: 1, x: 12.1, z: 0.0 },
      { team: 1, x: 11.6, z: 3.3 }
    ],
    units: [],
    projectiles: [],
    projSeq: 0,
    shotImpacts: [],
    ammo: { 0: { melon: 3, egg: 3 }, 1: { melon: 3, egg: 3 } },
    selAmmo: { 0: "pumpkin", 1: "pumpkin" },
    flightLog: [],
    wind: 0,
    voxels: null,
    voxelCount: 0,
    lastCarve: 0,
    lastImpact: null,
    shotCount: 0,
    settleT: 0,
    aiTimer: 0,
    winner: null,
    outs: { 0: 0, 1: 0 }
  };

  // ─── voxel helpers ─────────────────────────────────────────────────────────
  function vi(ix, iy, iz) { return ix + GX * (iy + GY * iz); }
  function inBounds(ix, iy, iz) { return ix >= 0 && iy >= 0 && iz >= 0 && ix < GX && iy < GY && iz < GZ; }
  function worldToCell(x, y, z) {
    return { ix: Math.floor((x - OX) / CELL), iy: Math.floor((y - OY) / CELL), iz: Math.floor((z - OZ) / CELL) };
  }
  function cellCenter(ix, iy, iz) {
    return { x: OX + (ix + 0.5) * CELL, y: OY + (iy + 0.5) * CELL, z: OZ + (iz + 0.5) * CELL };
  }
  function inPondXZ(x, z) { return Math.abs(x) < POND_HALF_X && Math.abs(z) < POND_HALF_Z; }

  // deterministic terrain (no Math.random)
  function terrainTopCell(ix, iz) {
    const wx = OX + (ix + 0.5) * CELL;
    const wz = OZ + (iz + 0.5) * CELL;
    if (Math.abs(wx) < POND_HALF_X && Math.abs(wz) < POND_HALF_Z) return POND_BED_TOP;
    let h = YARD_TOP;
    const edgeX = Math.abs(wx) - POND_HALF_X;      // >0 outside pond in X
    if (edgeX < 2.6) h = 3 + Math.max(0, Math.round(edgeX * 1.4)); // gentle bank rising from pond
    const bump = Math.round(1.1 * Math.sin(wx * 0.5 + 1.3) + 0.85 * Math.cos(wz * 0.72 + 0.4));
    h += bump;
    if (Math.abs(wz) > POND_HALF_Z + 0.4) h += 0; // yards flank pond
    return clamp(h, 3, GY - 2);
  }

  function buildVoxelField() {
    const vox = new Uint8Array(GX * GY * GZ);
    let count = 0;
    for (let iz = 0; iz < GZ; iz++) {
      for (let ix = 0; ix < GX; ix++) {
        const wx = OX + (ix + 0.5) * CELL;
        const wz = OZ + (iz + 0.5) * CELL;
        const pond = Math.abs(wx) < POND_HALF_X && Math.abs(wz) < POND_HALF_Z;
        const h = terrainTopCell(ix, iz);
        for (let iy = 0; iy <= h; iy++) {
          let t = 1;                       // dirt
          if (iy === 0) t = 3;             // stone base
          if (iy === h) t = pond ? 4 : 2;  // pondbed or grass
          vox[vi(ix, iy, iz)] = t;
          count++;
        }
      }
    }
    G.voxels = vox;
    G.voxelCount = count;
  }

  function groundYAt(x, z) {
    const { ix, iz } = worldToCell(x, 0, z);
    if (!inBounds(ix, 0, iz)) return OY;
    for (let iy = GY - 1; iy >= 0; iy--) {
      if (G.voxels[vi(ix, iy, iz)]) return OY + (iy + 1) * CELL;
    }
    return OY + CELL;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // three.js scene
  // ─────────────────────────────────────────────────────────────────────────
  const stage = document.getElementById("stage");
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, IS_MOBILE ? 1.5 : 2));
  renderer.setClearColor(0x87b8e0, 1);
  stage.appendChild(renderer.domElement);
  const canvas = renderer.domElement;

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x9ec8e8, 60, 140);

  const camera = new THREE.PerspectiveCamera(50, 1, 1, 400);

  scene.add(new THREE.HemisphereLight(0xeaf6ff, 0x6a7a4a, 0.9));
  const sun = new THREE.DirectionalLight(0xfff2d6, 0.75);
  sun.position.set(-16, 30, 14);
  scene.add(sun);

  const sky = new THREE.Mesh(
    new THREE.SphereGeometry(260, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0x7eb8e8, side: THREE.BackSide, fog: false })
  );
  scene.add(sky);

  // pond bed (darker plane under the water so it reads as depth)
  const bed = new THREE.Mesh(
    new THREE.PlaneGeometry(POND_HALF_X * 2 + 0.6, POND_HALF_Z * 2 + 0.6),
    new THREE.MeshLambertMaterial({ color: 0x2f4a52 })
  );
  bed.rotation.x = -Math.PI / 2;
  bed.position.set(0, BED_TOP_Y + 0.05, 0);
  scene.add(bed);

  // translucent water plane — sits ABOVE the bed, BELOW the yards
  const water = new THREE.Mesh(
    new THREE.PlaneGeometry(POND_HALF_X * 2, POND_HALF_Z * 2),
    new THREE.MeshLambertMaterial({ color: 0x2f8fce, transparent: true, opacity: 0.72, depthWrite: false })
  );
  water.rotation.x = -Math.PI / 2;
  water.position.set(0, WATER_Y, 0);
  water.renderOrder = 2;
  scene.add(water);

  // ── chunked voxel terrain — ONE shared geometry + ONE shared material ──
  const boxGeo = new THREE.BoxGeometry(CELL * 0.99, CELL * 0.99, CELL * 0.99);
  // NOTE: instanceColor (setColorAt) is applied by the shader on its own — do NOT
  // set vertexColors:true here or the shader multiplies by a missing per-vertex
  // color attribute (→ black terrain). Shared material, shared geometry.
  const voxMat = new THREE.MeshLambertMaterial({ vertexColors: false });
  const chunkMap = new Map();
  const chunkList = [];
  const chunkKey = (cx, cy, cz) => cx + "|" + cy + "|" + cz;

  function rebuildChunk(cx, cy, cz) {
    const key = chunkKey(cx, cy, cz);
    const old = chunkMap.get(key);
    if (old) {
      scene.remove(old.mesh);
      if (old.mesh.dispose) old.mesh.dispose(); // frees instance buffers (r128) — NOT the shared geo/mat
      chunkMap.delete(key);
      const i = chunkList.indexOf(old); if (i >= 0) chunkList.splice(i, 1);
    }
    const x0 = cx * CHUNK, y0 = cy * CHUNK, z0 = cz * CHUNK;
    const cells = [];
    for (let iz = 0; iz < CHUNK; iz++) { const gz = z0 + iz; if (gz >= GZ) continue;
      for (let iy = 0; iy < CHUNK; iy++) { const gy = y0 + iy; if (gy >= GY) continue;
        for (let ix = 0; ix < CHUNK; ix++) { const gx = x0 + ix; if (gx >= GX) continue;
          const t = G.voxels[vi(gx, gy, gz)]; if (t) cells.push({ gx, gy, gz, t });
        } } }
    if (!cells.length) return;
    const mesh = new THREE.InstancedMesh(boxGeo, voxMat, cells.length);
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    const dummy = new THREE.Object3D();
    const col = new THREE.Color();
    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      const p = cellCenter(c.gx, c.gy, c.gz);
      dummy.position.set(p.x, p.y, p.z); dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
      col.setHex(MAT[c.t] || 0x888888);

      const x = ix + dx, y = iy + dy, z = iz + dz;

    mk("legBL", half.leg, mass.leg); mk("legBR", half.leg, mass.leg);

        bodies[b], new CANNON.Vec3(pb[0], pb[1], pb[2])));

    link("torso", "legFL", [0.17 * facing, -0.2, 0.18], [0, 0.18, 0]);

  // ─────────────────────────────────────────────────────────────────────────
  // AIM MODEL — tap-to-target: WORLD-space aim point sets yaw; HEIGHT slider =
  // pitch (10°–70°); POWER slider = speed. FIRE button / Space fires.
  // ─────────────────────────────────────────────────────────────────────────
  const aim = { point: null, az: 0, pitch: 42 * DEG, power: 0, dir: new THREE.Vector3(1, 0.6, 0) };
  const heightSlider = document.getElementById("heightSlider");
  const powerSlider = document.getElementById("powerSlider");

  function facingOf(u) { return u.team === 0 ? 1 : -1; }
  function muzzleOf(u) { return { x: u.x + facingOf(u) * 0.5, y: u.y + 0.9, z: u.z }; }
  function activeUnit() { return G.units.find(u => u.id === G.activeUnitId && !u.out) || null; }
  function livingUnits(team) { return G.units.filter(u => u.team === team && !u.out); }

  function dirFromAzPitch(az, pitch) {
    const cp = Math.cos(pitch);
    return new THREE.Vector3(cp * Math.cos(az), Math.sin(pitch), cp * Math.sin(az));
  }
  function applyAzPitch() { aim.dir.copy(dirFromAzPitch(aim.az, aim.pitch)); }

  function sliderT(el) { return clamp((Number(el.value) || 0) / 100, 0, 1); }
  function readSliders() {
    aim.pitch = MIN_PITCH + sliderT(heightSlider) * (MAX_PITCH - MIN_PITCH);
    aim.power = sliderT(powerSlider) * MAX_POWER;
  }
  /** yaw from the world-space aim point; pitch/power from the sliders */
  function recomputeAim() {
    const u = activeUnit(); if (!u) return;
    readSliders();
    if (aim.point) {
      const o = muzzleOf(u);
      aim.az = Math.atan2(aim.point.z - o.z, aim.point.x - o.x);
    }
    applyAzPitch();
  }

  /** default aim point toward the enemy centroid — preview is never empty */
  function setDefaultAim() {
    const u = activeUnit(); if (!u) return;

    recomputeAim();
  }

  function setAimPoint(x, z) {
    // keep aim points on the island (grazing rays can land way beyond it)
    x = clamp(x, -14.8, 14.8); z = clamp(z, -8.6, 8.6);
    const y = inPondXZ(x, z) ? WATER_Y : groundYAt(x, z);
    aim.point = { x, y, z };

  // tap → world: (1) tapping a critter aims AT that critter (kid-obvious),
  // (2) else march the pick ray against voxel column heights (water counts),
  // (3) else fall back to the water-level plane so sky taps still aim somewhere
  const _rayA = new THREE.Vector3(), _rayB = new THREE.Vector3(), _rayP = new THREE.Vector3();
  function raycastGround(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const nx = ((clientX - rect.left) / Math.max(1, rect.width)) * 2 - 1;
    const ny = -(((clientY - rect.top) / Math.max(1, rect.height)) * 2 - 1);
    camera.updateMatrixWorld(true);
    _rayA.set(nx, ny, -1).unproject(camera);
    _rayB.set(nx, ny, 1).unproject(camera);
    const dir = _rayB.sub(_rayA).normalize();
    // critter pick: ray passes close to a living torso → aim at that critter
    let pick = null;
    for (const u of G.units) {
      if (u.out || !critters[u.id]) continue;
      const tp = critters[u.id].bodies.torso.position;
      const vx = tp.x - _rayA.x, vy = tp.y - _rayA.y, vz = tp.z - _rayA.z;
      const tAlong = vx * dir.x + vy * dir.y + vz * dir.z;
      if (tAlong < 0.5) continue;
      const cx = _rayA.x + dir.x * tAlong, cy = _rayA.y + dir.y * tAlong, cz = _rayA.z + dir.z * tAlong;
      const d = Math.hypot(cx - tp.x, cy - tp.y, cz - tp.z);
      if (d < 1.0 && (!pick || tAlong < pick.t)) pick = { t: tAlong, x: tp.x, z: tp.z };
    }
    if (pick) return { x: pick.x, y: groundYAt(pick.x, pick.z), z: pick.z };
    const step = 0.3;
    for (let t = step; t < 140; t += step) {
      _rayP.copy(_rayA).addScaledVector(dir, t);
      const gy = inPondXZ(_rayP.x, _rayP.z) ? WATER_Y : groundYAt(_rayP.x, _rayP.z);
      if (_rayP.y <= gy) return { x: _rayP.x, y: gy, z: _rayP.z };
    }
    if (Math.abs(dir.y) > 1e-4) { // fallback: water-level plane
      const t = (WATER_Y - _rayA.y) / dir.y;
      if (t > 0) { _rayP.copy(_rayA).addScaledVector(dir, t); return { x: _rayP.x, y: WATER_Y, z: _rayP.z }; }
    }
    return null;
  }

  function updatePreview() {
    const u = activeUnit();
    if (!playerCanAim() || !u || !aim.point) {
      setArcDotsVisible(false); aimFlag.visible = false;
      return;
    }
    recomputeAim();
    // tap-target flag (re-seated every frame — terrain can be carved under it)
    const fy = inPondXZ(aim.point.x, aim.point.z) ? WATER_Y : groundYAt(aim.point.x, aim.point.z);
    aimFlag.position.set(aim.point.x, fy, aim.point.z);
    aimFlag.visible = true;
    if (aim.power < 0.6) { setArcDotsVisible(false); return; }
    const o = muzzleOf(u);
    const velF = AMMO[G.selAmmo[u.team]].velF;
    // honest sim (selected ammo's physics), then show only the FIRST 40%
    const sim = simulateShot(o, aim.dir, aim.power * velF, G.wind, u.id);
    const stub = trimByLength(sim.pts, PREVIEW_FRAC);
    const n = stub.length;
    if (n > 1) {
      for (let i = 0; i < ARC_DOTS_N; i++) {
        const p = stub[Math.round((i / (ARC_DOTS_N - 1)) * (n - 1))];
        arcDots[i].position.set(p.x, p.y, p.z);
        arcDots[i].scale.setScalar(Math.max(0.6, 1 - (i / (ARC_DOTS_N - 1)) * 0.4));
        arcDots[i].visible = true;
      }
    } else setArcDotsVisible(false);
  }

  // ── shared ballistic integrator (preview + flight + AI all use this) ──
  function integrate(st, wind, h) {
    st.vy -= GRAV * h;
    st.vx += wind * h;
    st.x += st.vx * h; st.y += st.vy * h; st.z += st.vz * h;
  }
  function simulateArc(o, dir, power, wind, steps) {
    const pts = [];
    const st = { x: o.x, y: o.y, z: o.z, vx: dir.x * power, vy: dir.y * power, vz: dir.z * power };
    const dt = 1 / 60;
    for (let i = 0; i < steps; i++) {
      pts.push({ x: st.x, y: st.y, z: st.z });
      integrate(st, wind, dt);
      if (st.y < OY - 3) break;
      const c = worldToCell(st.x, st.y, st.z);
      if (inBounds(c.ix, c.iy, c.iz) && G.voxels[vi(c.ix, c.iy, c.iz)]) break;
      if (Math.abs(st.x) > 24 || Math.abs(st.z) > 15) break;
    }
    return pts;
  }
  /**
   * FULL-shot simulation with the SAME termination rules as the real flight:
   * substepped ≤SUBSTEP_MAX, wind, direct-hit vs living critters (skips the
   * shooter, arms past 0.6 from the muzzle), water splash, voxel hit, bounds.
   * Preview honesty: the drawn arc can never fly through a critter it would hit.
   */
  function simulateShot(o, dir, power, wind, shooterId) {
    const pts = [];
    const st = { x: o.x, y: o.y, z: o.z, vx: dir.x * power, vy: dir.y * power, vz: dir.z * power };
    let endKind = "timeout", hitUnitId = null, t = 0;
    for (let i = 0; i < 1200 && t < 8; i++) {
      pts.push({ x: st.x, y: st.y, z: st.z });
      const spd = Math.max(4, Math.hypot(st.vx, st.vy, st.vz));
      const h = Math.min(1 / 60, SUBSTEP_MAX / spd);
      integrate(st, wind, h); t += h;
      // 1) direct critter hit (mirror stepProjectile exactly)
      const armed = ((st.x - o.x) ** 2 + (st.y - o.y) ** 2 + (st.z - o.z) ** 2) > 0.6 * 0.6;
      if (armed) {
        let hit = -1;
        for (let j = 0; j < G.units.length; j++) {
          const u = G.units[j];
          if (u.out || u.id === shooterId || !critters[j]) continue;
          const tp = critters[j].bodies.torso.position;
          if ((st.x - tp.x) ** 2 + (st.y - tp.y) ** 2 + (st.z - tp.z) ** 2 <= HIT_R * HIT_R) { hit = j; break; }
        }
        if (hit >= 0) { pts.push({ x: st.x, y: st.y, z: st.z }); endKind = "hit"; hitUnitId = hit; break; }
      }
      // 2) water splash
      if (inPondXZ(st.x, st.z) && st.y <= WATER_Y + 0.15) { pts.push({ x: st.x, y: st.y, z: st.z }); endKind = "splash"; break; }
      // 3) voxel hit
      const c = worldToCell(st.x, st.y, st.z);
      if (inBounds(c.ix, c.iy, c.iz) && G.voxels[vi(c.ix, c.iy, c.iz)]) { pts.push({ x: st.x, y: st.y, z: st.z }); endKind = "carve"; break; }
      // 4) out of bounds
      if (st.y < OY - 1.5 || Math.abs(st.x) > 23 || Math.abs(st.z) > 14.5) { pts.push({ x: st.x, y: st.y, z: st.z }); endKind = "oob"; break; }
    }
    return { pts, endKind, hitUnitId };
  }
  function pathLen(pts) { let L = 0; for (let i = 1; i < pts.length; i++) L += Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y, pts[i].z - pts[i - 1].z); return L; }
  function trimByLength(pts, frac) {
    if (pts.length <= 1) return pts.slice();
    const total = pathLen(pts); if (total < 1e-6) return pts.slice(0, 1);
    const cut = total * frac; const out = [pts[0]]; let acc = 0;
    for (let i = 1; i < pts.length; i++) {
      const a = pts[i - 1], b = pts[i];
      const seg = Math.hypot(b.x - a.x, b.y - a.y, b.z - a.z);
      if (acc + seg >= cut) { const t = (cut - acc) / Math.max(1e-8, seg); out.push({ x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t, z: a.z + (b.z - a.z) * t }); break; }
      acc += seg; out.push(b);
    }
    return out;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // FIRING — ammo-aware, multi-projectile (egg trio splits at apex)
  // ─────────────────────────────────────────────────────────────────────────
  function fireShot(u) {
    if (!u) return false;
    if (aim.power < 1.0) { showToast("Turn up POWER!"); return false; }
    const team = u.team;
    let type = G.selAmmo[team] || "pumpkin";
    if (type !== "pumpkin" && G.ammo[team][type] <= 0) { type = "pumpkin"; G.selAmmo[team] = "pumpkin"; }
    const a = AMMO[type];
    const o = muzzleOf(u);
    const sp = aim.power * a.velF;
    G.projectiles = [{
      id: ++G.projSeq, type, child: false,
      x: o.x, y: o.y, z: o.z, ox: o.x, oy: o.y, oz: o.z, shooterId: u.id,
      vx: aim.dir.x * sp, vy: aim.dir.y * sp, vz: aim.dir.z * sp,
      r: type === "melon" ? 0.36 : 0.26, age: 0
    }];
    if (type !== "pumpkin") G.ammo[team][type]--;
    G.flightLog = [{ x: o.x, y: o.y, z: o.z }];
    G.shotImpacts = [];
    G.phase = "flying";
    G.shotCount++;
    setArcDotsVisible(false); aimFlag.visible = false;
    arrowGroup.visible = false;
    updateAmmoChips();
    sfx.fire();
    return true;
  }

  function spawnEggChildren(p) {
    // split at apex into 3: straight + yawed ±10°, tiny vy spread
    const hs = Math.hypot(p.vx, p.vz) || 0.001;
    for (let k = -1; k <= 1; k++) {
      const ang = k * 10 * DEG;
      const ca = Math.cos(ang), sa = Math.sin(ang);
      G.projectiles.push({
        id: ++G.projSeq, type: "egg", child: true,
        x: p.x, y: p.y, z: p.z, ox: p.x, oy: p.y, oz: p.z, shooterId: p.shooterId,
        vx: p.vx * ca - p.vz * sa, vy: p.vy + k * 0.6, vz: p.vx * sa + p.vz * ca,
        r: 0.16, age: p.age
      });
    }
    burst(p.x, p.y, p.z, 8, 0xf6f0dc, 0xffd23f);
    sfx.turn();
  }

  function enableRagdoll(id) {
    const u = G.units[id], crit = critters[id];
    if (!u || !crit || u.out) return;
    if (u.mode === "ragdoll") return;
    u.mode = "ragdoll"; setMode(crit, "ragdoll");
  }
  function applyBlast(wx, wy, wz, radius, impF) {
    const f = impF == null ? 1 : impF;
    let hit = 0;
    for (let i = 0; i < G.units.length; i++) {
      const u = G.units[i]; if (u.out) continue;
      const crit = critters[i]; if (!crit) continue;
      const t = crit.bodies.torso.position;
      const dx = t.x - wx, dy = t.y - wy, dz = t.z - wz;
      const d = Math.hypot(dx, dy, dz);
      if (d > radius || d < 0.001) continue;
      enableRagdoll(i);
      const fall = 1 - d / radius;
      const imp = (11 * fall + 2) * f;
      const ix = (dx / d) * imp, iy = Math.max(4 * f, (dy / d) * imp + 5.5 * f), iz = (dz / d) * imp;
      crit.bodies.torso.applyImpulse(new CANNON.Vec3(ix, iy, iz));
      crit.bodies.head.applyImpulse(new CANNON.Vec3(ix * 0.4, iy * 0.5, iz * 0.4));
      crit.bodies.torso.angularVelocity.set((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 6);
      hit++;
    }
    return hit;
  }

  function noteImpact(p, kind, carved, ragHits) {
    G.lastImpact = { x: p.x, y: p.y, z: p.z, carved, ragHits, kind, type: p.type };
    G.shotImpacts.push(G.lastImpact);
  }
  function detonate(p, kind) {
    const a = AMMO[p.type];
    const removed = carveSphere(p.x, p.y, p.z, a.carveR * (kind === "hit" ? 0.8 : 1));
    const hits = applyBlast(p.x, p.y, p.z, a.knockR, a.impF);
    if (p.type === "melon") { burst(p.x, p.y, p.z, 36, 0x3f7a2f, 0xa9713f); sfx.blastBig(); camShake(0.85); }
    else if (p.type === "egg") { burst(p.x, p.y, p.z, 12, 0xf6f0dc, 0xa9713f); sfx.splat(); camShake(0.25); }
    else { burst(p.x, p.y, p.z, 24, 0xe0862c, 0xa67c52); sfx.blast(); camShake(0.55); }
    noteImpact(p, kind, removed, hits);
  }

  /** all projectiles done → aftermath camera hold, then settling drives the turn */
  function resolveShot() {
    for (const d of trail) d.visible = false;
    const imps = G.shotImpacts || [];
    const best = imps.find(i => i.kind === "hit") || imps.find(i => i.kind === "carve") ||
                 imps.find(i => i.kind === "splash") || imps[0] || null;
    if (best) {
      if (best.kind === "splash") showToast("💦 Splash!");
      else if (best.ragHits > 0) showToast(best.ragHits === 1 ? "Direct hit!" : "Ragdoll party!");
      else if (best.carved > 0) showToast("💥 Boom! (−" + best.carved + " dirt)");
      else showToast("Fizzle…");
    }
    if (G.phase === "won") return;
    G.phase = "settling"; G.settleT = 0;
    if (best && best.kind !== "fizzle" && best.kind !== "oob") {
      // AFTERMATH HOLD: stay near the action — track the closest flopping critter
      // (or the impact point) until ragdolls settle / water-outs resolve
      let focusId = null, bd = Infinity;
      for (const u of G.units) {
        if (u.mode !== "ragdoll" && u.mode !== "out") continue;
        const c = critters[u.id]; if (!c) continue;
        const tp = c.bodies.torso.position;
        const d = Math.hypot(tp.x - best.x, tp.y - best.y, tp.z - best.z);
        if (d < bd) { bd = d; focusId = u.id; }
      }
      cam.aftermath = { x: best.x, y: best.y, z: best.z, unitId: focusId };
    } else {
      // fizzle/out-of-bounds: nothing to watch — straight to the overview
      camGoto("overview");
      cam.holdT = CAM_HOLD_TURN;
    }
  }

  function stepProjectiles(dt) {
    const list = G.projectiles;
    if (!list.length) return;
    for (let pi = list.length - 1; pi >= 0; pi--) {
      const p = list[pi];
      p.age += dt;
      if (p.age > 8) { noteImpact(p, "fizzle", 0, 0); list.splice(pi, 1); continue; }
      const speed = Math.hypot(p.vx, p.vy, p.vz);
      const steps = clamp(Math.ceil((speed * dt) / SUBSTEP_MAX), 1, 48);
      const h = dt / steps;
      let dead = false;
      for (let s = 0; s < steps && !dead; s++) {
        integrate(p, G.wind, h);
        if (pi === 0 && G.flightLog.length < 400) G.flightLog.push({ x: p.x, y: p.y, z: p.z });
        // egg apex → split into the trio (parent never detonates)
        if (p.type === "egg" && !p.child && p.vy <= 0) {
          list.splice(pi, 1);
          spawnEggChildren(p);
          dead = true; break;
        }
        // 1) direct critter hit — skip the shooter, only after clearing the muzzle
        const armed = ((p.x - p.ox) ** 2 + (p.y - p.oy) ** 2 + (p.z - p.oz) ** 2) > 0.6 * 0.6;
        for (let i = 0; armed && i < G.units.length; i++) {
          const u = G.units[i]; if (u.out || u.id === p.shooterId) continue;
          const t = critters[i].bodies.torso.position;
          if ((p.x - t.x) ** 2 + (p.y - t.y) ** 2 + (p.z - t.z) ** 2 <= HIT_R * HIT_R) {
            detonate(p, "hit"); list.splice(pi, 1); dead = true; break;
          }
        }
        if (dead) break;
        // 2) water splash
        if (inPondXZ(p.x, p.z) && p.y <= WATER_Y + 0.15) {
          burst(p.x, WATER_Y + 0.15, p.z, 12, 0xbfe6ff, 0x7fc4ea);
          ripple(p.x, p.z); sfx.splash();
          noteImpact(p, "splash", 0, 0); list.splice(pi, 1); dead = true; break;
        }
        // 3) voxel hit → carve + blast
        const c = worldToCell(p.x, p.y, p.z);
        if (inBounds(c.ix, c.iy, c.iz) && G.voxels[vi(c.ix, c.iy, c.iz)]) {
          detonate(p, "carve"); list.splice(pi, 1); dead = true; break;
        }
        // 4) out of bounds
        if (p.y < OY - 1.5 || Math.abs(p.x) > 23 || Math.abs(p.z) > 14.5) {
          noteImpact(p, "oob", 0, 0); list.splice(pi, 1); dead = true; break;
        }
      }
    }
    if (!G.projectiles.length && G.phase === "flying") resolveShot();
  }

  function settleOnTerrain(body, halfH) {
    const gy = groundYAt(body.position.x, body.position.z);
    const minY = gy + halfH;
    if (body.position.y < minY) {
      body.position.y = minY;
      if (body.velocity.y < 0) body.velocity.y = 0;
      body.velocity.x *= 0.9; body.velocity.z *= 0.9;
    }
  }
  const HALF_H = { torso: 0.2, head: 0.15, legFL: 0.2, legFR: 0.2, legBL: 0.2, legBR: 0.2 };
  function stepPhysics(dt) {
    if (G.units.some(u => u.mode === "ragdoll")) physWorld.step(1 / 60, dt, 4);
    for (let i = 0; i < G.units.length; i++) {
      const u = G.units[i], crit = critters[i]; if (!crit) continue;
      if (u.out) { syncMeshes(crit); continue; }
      if (u.mode === "stiff") {
        u.y = groundYAt(u.x, u.z); resetPose(crit, u); continue;
      }
      // ragdoll
      for (const k of BODY_KEYS) {
        const t = crit.bodies[k].position;
        if (!inPondXZ(t.x, t.z)) settleOnTerrain(crit.bodies[k], HALF_H[k]);
      }
      const tp = crit.bodies.torso.position;
      u.x = tp.x; u.y = tp.y - 0.62; u.z = tp.z;
      if (inPondXZ(tp.x, tp.z) && tp.y < WATER_Y + 0.2) {
        crit.bodies.torso.velocity.scale(0.9);
        u.waterT += dt;
        if (u.waterT >= WATER_OUT_T) markOut(i);
      } else {
        u.waterT = 0;
        const spd = crit.bodies.torso.velocity.length();
        if (spd < 0.4 && tp.y <= groundYAt(tp.x, tp.z) + 0.8) {
          u.mode = "stiff"; u.x = tp.x; u.z = tp.z; u.y = groundYAt(u.x, u.z);
          setMode(crit, "stiff"); resetPose(crit, u);
        }
      }
      syncMeshes(crit);
    }
  }

  function markOut(id) {
    const u = G.units[id], crit = critters[id];
    if (!u || u.out) return;
    u.out = true; u.mode = "out"; u.waterT = 0;
    if (crit) {
      setMode(crit, "stiff");
      for (const k of BODY_KEYS) { const b = crit.bodies[k]; b.position.y = Math.min(b.position.y, WATER_Y - 0.2); }
      syncMeshes(crit);
      crit.group.traverse(o => { if (o.material) { o.material.transparent = true; o.material.opacity = 0.4; } });
      if (crit.label) crit.label.material.opacity = 0.35;
    }
    const side = u.team === 0 ? "West" : "East";
    showToast("🌊 " + u.name + " went for a swim!");
    sfx.bloop();
    // if the active shooter drowned mid-cycle, hand off to next living teammate
    if (u.id === G.activeUnitId) {
      const next = livingUnits(u.team)[0];
      if (next) G.activeUnitId = next.id;
    }
    updateScoreboard();
    checkWin();
  }

  function updateScoreboard() {
    const w = livingUnits(0).length, e = livingUnits(1).length;
    G.outs[0] = 3 - w; G.outs[1] = 3 - e;
    document.getElementById("westVal").textContent = w + " in" + (G.outs[0] ? " · " + G.outs[0] + " out" : "");
    document.getElementById("eastVal").textContent = e + " in" + (G.outs[1] ? " · " + G.outs[1] + " out" : "");
  }

  function checkWin() {
    const w = livingUnits(0).length, e = livingUnits(1).length;
    if (e === 0 || w === 0) {
      const westWon = e === 0;
      G.winner = westWon ? 0 : 1;
      G.phase = "won";
      document.getElementById("winTitle").textContent = westWon ? "West Yard wins! 🎉" : "East Yard wins! 🎉";
      document.getElementById("winSub").textContent = westWon
        ? "The armadillos all went for a swim. Great lobbing!"
        : "The goats took a dip — rematch?";
      document.getElementById("win").classList.add("on");
      showToast((westWon ? "West" : "East") + " Yard wins!");
      arrowGroup.visible = false;
      cam.aftermath = null;
      camGoto("overview");
      cam.wantAim = false;
      if (westWon) sfx.win(); else sfx.lose();
      return true;
    }
    return false;
  }

  // ─────────────────────────────────────────────────────────────────────────
  // TURN SYSTEM
  // ─────────────────────────────────────────────────────────────────────────
  function rollWind() {
    // small X-axis wind, sometimes near zero
    const r = Math.random();
    if (r < 0.3) G.wind = (Math.random() - 0.5) * 0.6;
    else G.wind = (Math.random() * 2 - 1) * 2.2;
  }
  function updateWindHud() {
    const arrow = document.getElementById("windArrow"), pips = document.getElementById("windPips");
    const s = G.wind;
    arrow.textContent = "→";
    arrow.style.transform = "scaleX(" + (s < 0 ? -1 : 1) + ")";
    const mag = Math.min(3, Math.round(Math.abs(s) / 0.75));
    pips.textContent = Math.abs(s) < 0.35 ? "calm" : "•".repeat(Math.max(1, mag));
    document.getElementById("windBox").style.opacity = Math.abs(s) < 0.35 ? 0.7 : 1;
  }
  function updateBanner() {
    const tm = document.getElementById("turnMsg");
    const west = document.getElementById("teamWest"), east = document.getElementById("teamEast");
    west.classList.toggle("turnon", G.activeTeam === 0 && G.phase !== "won");
    east.classList.toggle("turnon", G.activeTeam === 1 && G.phase !== "won");
    if (G.phase === "won") { tm.textContent = "Match over"; return; }
    const u = activeUnit();
    if (G.activeTeam === 0) tm.textContent = "Your turn — " + (u ? u.name : "West") + "!";
    else tm.textContent = "Shell is aiming…".replace("Shell", u ? u.name : "East");
    updateWindHud();
  }

  function beginTurn(team) {
    G.activeTeam = team;
    resetOrbit();             // each unit's turn starts on the clean default pose
    const living = livingUnits(team);
    if (!living.length) { checkWin(); return; }
    const idx = G.teamTurnCount[team] % living.length;
    G.activeUnitId = living[idx].id;
    G.teamTurnCount[team]++;
    if (team === 0) G.roundNum = G.teamTurnCount[0];
    rollWind();
    G.phase = "aim";
    tapStart = null;
    setDefaultAim();          // sliders persist across turns — kids dial in a feel
    updateAmmoChips();
    updateBanner();
    cam.wantAim = true;   // camera flies in after the overview interlude
    const nu = activeUnit();
    if (nu && G.shotCount > 0) showToast("🎯 Next up — " + nu.name + "!");
    // AI think delay runs in PARALLEL with the interlude + camera transition
    if (team === 1) G.aiTimer = 1.0 + Math.random() * 0.6;
    else sfx.turn();
  }

  function finishTurn() {
    // aftermath watched — NOW pull out to the overview interlude
    cam.aftermath = null;
    if (checkWin()) { updateBanner(); return; }
    camGoto("overview");
    cam.holdT = CAM_HOLD_TURN;
    beginTurn(1 - G.activeTeam);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // AI
  // ─────────────────────────────────────────────────────────────────────────
  function solveFiringSolution(shooter, target, velF) {
    const vf = velF == null ? 1 : velF;
    const o = muzzleOf(shooter);
    const tp = critters[target.id].bodies.torso.position;
    const bearing = Math.atan2(tp.z - o.z, tp.x - o.x);
    let best = null;
    const pitches = [22, 30, 38, 46, 54, 62].map(d => d * DEG);
    for (let pw = 0.45; pw <= 1.001; pw += 0.09) {
      const power = pw * MAX_POWER;
      for (const pitch of pitches) {
        for (let daz = -0.18; daz <= 0.181; daz += 0.09) {
          const az = bearing + daz;
          const dir = dirFromAzPitch(az, pitch);
          const pts = simulateArc(o, dir, power * vf, G.wind, 130);
          let minD = Infinity;
          for (const p of pts) { const d = Math.hypot(p.x - tp.x, p.y - tp.y, p.z - tp.z); if (d < minD) minD = d; }
          if (!best || minD < best.minD) best = { az, pitch, power, minD };

  function aiTakeTurn() {
    if (G.activeTeam !== 1 || G.phase !== "aim") return;
    const shooter = activeUnit(); if (!shooter) return;
    const targets = livingUnits(0); if (!targets.length) return;
    const target = targets[Math.floor(Math.random() * targets.length)];
    // ammo: mostly pumpkin; ~25% chance to spend a special it still has
    let ammoType = "pumpkin";
    const have = ["melon", "egg"].filter(t => G.ammo[1][t] > 0);
    if (have.length && Math.random() < 0.25) ammoType = have[Math.floor(Math.random() * have.length)];
    G.selAmmo[1] = ammoType;
    const sol = solveFiringSolution(shooter, target, AMMO[ammoType].velF);
    // aim error shrinks as rounds progress (round 1 sloppy → round 4+ scary)
    const round = G.teamTurnCount[1];
    const errScale = Math.pow(0.62, round - 1); // 1, .62, .38, .24…
    const azErr = (Math.random() - 0.5) * 0.34 * errScale;
    const pErr = 1 + (Math.random() - 0.5) * 0.28 * errScale;

      const camReady = cam.mode === "aim" && !cam.flying;
      if (G.aiTimer <= 0 && (camReady || G.aiTimer < -6)) aiTakeTurn();
    }
  }

    win() { [523, 659, 784, 1046].forEach((f, i) => tone(f, 0.28, "triangle", 0.3, null, i * 0.11)); },

  // ─────────────────────────────────────────────────────────────────────────

  // ─────────────────────────────────────────────────────────────────────────
  // CAMERA — two modes with smooth ~0.8s ease-in-out flights:
  //   overview = whole-island fit (match start beat, post-shot interlude, win)
  //   aim      = third-person behind the active shooter → enemy yard in frame
  // ─────────────────────────────────────────────────────────────────────────
  const camTarget = new THREE.Vector3(0, 2.0, 0);

  const CAM_HOLD_START = 1.4;   // overview beat at match start
  const CAM_HOLD_TURN = 2.6;    // overview interlude after each shot resolves
  const AIM_POSE          = { back: 6.0, up: 3.2, lat: 1.7, lookAhead: 9,  lookY: 2.4 };
  const AIM_POSE_PORTRAIT = { back: 7.6, up: 4.6, lat: 1.2, lookAhead: 10, lookY: 2.2 };

  // ── PLAYER CAMERA ORBIT (aim mode only): right-drag / two-finger swing the eye
  //    around the shooter. Offset relative to the default behind-shoulder pose,
  //    applied AFTER the fly-in arrives; resets to clean on turn/overview/shooter.
  const ORBIT_AZ_SENS = 0.0065;      // rad per px of horizontal drag (azimuth)
  const ORBIT_EL_SENS = 0.0052;      // rad per px of vertical drag (elevation)
  const ORBIT_EL_MIN  = -6 * DEG;    // never dip the eye below the shooter into terrain
  const ORBIT_EL_MAX  = 80 * DEG;    // never go fully overhead (shooter stays in frame)
  const ORBIT_OFF_ELMIN = -70 * DEG; // clamp the raw offset so it never winds up
  const ORBIT_OFF_ELMAX = 85 * DEG;
  const ORBIT_PIVOT_UP = 1.4;        // pivot height above the shooter's feet

  const cam = {
    mode: "overview", targetMode: "overview", flying: false, t: 0,
    fromPos: new THREE.Vector3(), fromLook: new THREE.Vector3(),
    pos: new THREE.Vector3(0, 20, 26), look: new THREE.Vector3(0, 2, 0),
    holdT: 0, wantAim: false, lastAimUnit: -1,
    aftermath: null,  // { x, y, z, unitId } — watch the flop before pulling out
    orbitAz: 0, orbitEl: 0   // player orbit offset from the default aim pose
  };
  const _dPos = new THREE.Vector3(), _dLook = new THREE.Vector3();
  const _axis = new THREE.Vector3(), _perp = new THREE.Vector3();
  const _lookV = new THREE.Vector3(), _projV = new THREE.Vector3();

    cam.orbitEl = clamp(cam.orbitEl + (dEl || 0), ORBIT_OFF_ELMIN, ORBIT_OFF_ELMAX);
  }
  /** swing camera pos + look around the shooter by the orbit offset (world-space aim untouched) */
  function applyOrbit(u, pos, look) {
    const az = cam.orbitAz, el = cam.orbitEl;
    if (!az && !el) return;
    const pivot = _orbitPivot.set(u.x, u.y + ORBIT_PIVOT_UP, u.z);
    const off = _orbitOff.copy(pos).sub(pivot);
    const r = off.length();
    if (r < 1e-3) return;
    const baseAz = Math.atan2(off.z, off.x);
    const baseEl = Math.asin(clamp(off.y / r, -1, 1));

    const nEl = clamp(baseEl + el, ORBIT_EL_MIN, ORBIT_EL_MAX);

    pos.set(pivot.x + r * ce * Math.cos(nAz), pivot.y + r * Math.sin(nEl), pivot.z + r * ce * Math.sin(nAz));

    const lo = _orbitLook.copy(look).sub(pivot);
    const lr = Math.hypot(lo.x, lo.z);
    if (lr > 1e-3) {
      const lAz = Math.atan2(lo.z, lo.x) + az;
      look.set(pivot.x + lr * Math.cos(lAz), look.y, pivot.z + lr * Math.sin(lAz));

  }

  function isPortrait() {
    const w = stage.clientWidth || window.innerWidth;
    const h = stage.clientHeight || Math.max(1, window.innerHeight - 46);
    return w < h;
  }
  function enemyCentroid(team) {
    const foes = livingUnits(1 - team);
    if (!foes.length) return { x: team === 0 ? 11.6 : -11.6, y: 4, z: 0 };
    let x = 0, y = 0, z = 0;
    for (const f of foes) { x += f.x; y += f.y; z += f.z; }
    return { x: x / foes.length, y: y / foes.length, z: z / foes.length };
  }
  function desiredPose(mode, outPos, outLook) {
    const u = activeUnit();

      const P = isPortrait() ? AIM_POSE_PORTRAIT : AIM_POSE;
      const e = enemyCentroid(u.team);
      _axis.set(e.x - u.x, 0, e.z - u.z);
      if (_axis.lengthSq() < 1e-6) _axis.set(facingOf(u), 0, 0);
      _axis.normalize();
      _perp.set(-_axis.z, 0, _axis.x);
      const side = u.z > 0 ? -1 : 1;   // lateral offset biased toward island center
      outPos.set(u.x, 0, u.z)
        .addScaledVector(_axis, -P.back)
        .addScaledVector(_perp, P.lat * side);
      outPos.y = u.y + P.up;
      // never clip into a hill behind the shooter — lift above sampled terrain
      if (G.voxels) {
        let gy = -Infinity;
        for (const o of [[0, 0], [1.3, 0], [-1.3, 0], [0, 1.3], [0, -1.3]]) {

        if (outPos.y < gy + 1.5) outPos.y = gy + 1.5;

      const fc = cam.aftermath.unitId != null ? critters[cam.aftermath.unitId] : null;

  function updateCamera(dt, now) {
    // overview interlude countdown → hand off to the next shooter's pose
    if (!cam.flying && cam.mode === "overview" && cam.holdT > 0) cam.holdT -= dt;
    if (!cam.flying && cam.mode === "overview" && cam.holdT <= 0 && cam.wantAim && G.phase === "aim") {
      cam.wantAim = false;
      camGoto("aim");
    }
    // active shooter changed while aiming (drown hand-off, debug skips) → re-fly
    if (cam.targetMode === "aim" && !cam.flying && cam.lastAimUnit !== G.activeUnitId && G.phase === "aim") {
      resetOrbit();   // new shooter → clean default pose
      cam.fromPos.copy(cam.pos); cam.fromLook.copy(cam.look);
      cam.t = 0; cam.flying = true; cam.lastAimUnit = G.activeUnitId; cam.wantAim = false;
    }
    desiredPose(cam.targetMode, _dPos, _dLook);
    if (cam.flying) {
      cam.t += dt / CAM_FLY_T;
      const s = easeInOut(clamp(cam.t, 0, 1));
      cam.pos.lerpVectors(cam.fromPos, _dPos, s);
      cam.look.lerpVectors(cam.fromLook, _dLook, s);
      if (cam.t >= 1) { cam.flying = false; cam.mode = cam.targetMode; }
    } else {
      cam.pos.lerp(_dPos, Math.min(1, dt * 5));
      cam.look.lerp(_dLook, Math.min(1, dt * 5));
    }
    applyCam(now);
  }
  function camModeStr() { return cam.flying ? "fly" : cam.mode; }

  function fit() {
    const w = stage.clientWidth || window.innerWidth;
    const h = stage.clientHeight || Math.max(1, window.innerHeight - 46);
    renderer.setSize(w, h, true);
    const aspect = w / Math.max(1, h);
    const vFov = 50 * DEG, vHalf = vFov / 2;
    const hHalf = Math.atan(Math.tan(vHalf) * aspect);
    const distW = CONTENT_HALF_X / Math.tan(hHalf);
    const halfVScreen = CONTENT_HALF_Z * Math.sin(TILT) + 3.0 * Math.cos(TILT);
    const distV = halfVScreen / Math.tan(vHalf);
    let d = Math.max(distW, distV) * 1.12;
    d = Math.max(16, d);
    const dir = new THREE.Vector3(0, -Math.sin(TILT), -Math.cos(TILT)); // cam→target
    camBase.copy(camTarget).addScaledVector(dir, -d);
    camera.fov = 50; camera.aspect = aspect;
    camera.near = 0.4;                          // aim pose gets close to the shooter
    camera.far = Math.max(300, d * 3 + 120);    // keep the sky dome inside
    camera.updateProjectionMatrix();
    scene.fog.near = Math.max(48, d * 1.1);
    scene.fog.far = scene.fog.near + 110;
    if (G.phase === "title") {
      cam.pos.copy(camBase); cam.look.copy(camTarget);
      camera.position.copy(camBase); camera.lookAt(camTarget);
    }
  }
  window.addEventListener("resize", fit);

  let last = performance.now();
  setInterval(() => {
    if (G.phase === "title") return;
    const now = performance.now();
    if (now - last < 100) return;
    const dt = Math.min(0.05, (now - last) / 1000); last = now;
    tickSim(dt);
  }, 50);

  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000); last = now;

    // camera itself is driven inside tickSim (works with the heartbeat too);
    // preview stays live whenever the player can aim (tap point + sliders)
    updatePreview();

    tickSim(dt);
    syncProjMeshes(dt);

    // labels + active arrow
    for (let i = 0; i < critters.length; i++) {
      const u = G.units[i], crit = critters[i]; if (!crit || !crit.label) continue;
      const t = crit.bodies.torso.position;
      crit.label.position.set(t.x, t.y + 0.95, t.z);
      // in 3rd person, hide the aiming TEAM's labels (they loom huge in the near
      // field and block the view) — enemy labels stay so kids know the targets
      const hideOwnTeam = cam.targetMode === "aim" && G.phase !== "won" && !u.out && u.team === G.activeTeam;
      crit.label.visible = !hideOwnTeam;
    }
    if (G.phase === "aim") {
      const u = activeUnit();
      if (u) {
        arrowGroup.visible = true;
        arrowGroup.position.set(u.x, u.y + 1.7 + Math.sin(now * 0.005) * 0.12, u.z);
        arrowGroup.children.forEach(m => m.material.color.setHex(u.team === 0 ? 0x233357 : 0xba303e));
      } else arrowGroup.visible = false;
    } else if (G.phase !== "flying") {
      // keep hidden during settling/won
      if (G.phase !== "settling") arrowGroup.visible = false;
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.life -= dt; p.vy -= GRAV * 0.5 * dt;
      p.mesh.position.x += p.vx * dt; p.mesh.position.y += p.vy * dt; p.mesh.position.z += p.vz * dt;
      if (p.life <= 0) { scene.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); particles.splice(i, 1); }
    }
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i]; r.life -= dt; r.s += dt * 3; r.mesh.scale.set(r.s, r.s, r.s);
      r.mesh.material.opacity = Math.max(0, r.life * 0.9);
      if (r.life <= 0) { scene.remove(r.mesh); r.mesh.geometry.dispose(); r.mesh.material.dispose(); ripples.splice(i, 1); }
    }

    if (G.projectiles.length) {
      for (let i = trail.length - 1; i > 0; i--) { trail[i].position.copy(trail[i - 1].position); trail[i].visible = trail[i - 1].visible; }
      const fp = G.projectiles[0];
      trail[0].position.set(fp.x, fp.y, fp.z); trail[0].visible = true;
    }
    water.material.opacity = 0.66 + Math.sin(now * 0.002) * 0.06;

    renderer.render(scene, camera);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ─────────────────────────────────────────────────────────────────────────
  // start / restart
  // ─────────────────────────────────────────────────────────────────────────
  function startMatch() {
    initAudio();
    document.getElementById("title").classList.add("hidden");
    document.getElementById("hud").classList.add("on");
    document.getElementById("win").classList.remove("on");
    buildVoxelField();
    rebuildAllChunks();
    placeUnits();
    G.projectiles = []; G.shotImpacts = []; G.flightLog = []; G.shotCount = 0; G.winner = null;
    G.teamTurnCount = [0, 0]; G.roundNum = 1; G.lastImpact = null; G.settleT = 0; G.aiTimer = 0;
    G.ammo = { 0: { melon: 3, egg: 3 }, 1: { melon: 3, egg: 3 } };   // limited ammo resets per match
    G.selAmmo = { 0: "pumpkin", 1: "pumpkin" };
    updateAmmoChips();
    fit();
    cam.aftermath = null;
    camGoto("overview", true);      // match starts on the whole-island view…
    cam.holdT = CAM_HOLD_START;     // …for a beat, then flies behind shooter 1
    cam.wantAim = false;
    beginTurn(0);
    showToast("Splash the armadillos into the pond!");
  }
  document.getElementById("playBtn").addEventListener("click", startMatch);
  document.getElementById("againBtn").addEventListener("click", startMatch);
  fit();

  // ─────────────────────────────────────────────────────────────────────────
  // debug / verify hook
  // ─────────────────────────────────────────────────────────────────────────
  function worldToClient(wx, wy, wz) {
    const v = new THREE.Vector3(wx, wy, wz).project(camera);
    const rect = canvas.getBoundingClientRect();
    return { x: (v.x * 0.5 + 0.5) * rect.width + rect.left, y: (-v.y * 0.5 + 0.5) * rect.height + rect.top, z: v.z };
  }

  window.__HAYHEM__ = {
    G,
    startMatch,
    get phase() { return G.phase; },
    get camMode() { return camModeStr(); },
    get activeTeam() { return G.activeTeam; },
    get activeUnitId() { return G.activeUnitId; },
    get muted() { return muted; },
    get critters() { return critters; },
    voxelCount() { return G.voxelCount; },
    waterInfo() { return { waterY: WATER_Y, bedTopY: BED_TOP_Y, pondHalfX: POND_HALF_X, pondHalfZ: POND_HALF_Z, waterVisible: water.visible && water.material.opacity > 0.05 }; },
    setWind(w) { G.wind = w; updateWindHud(); return G.wind; },
    camInfo() {
      const f = new THREE.Vector3(); camera.getWorldDirection(f);
      return {
        mode: camModeStr(), targetMode: cam.targetMode, holdT: cam.holdT,
        pos: [camera.position.x, camera.position.y, camera.position.z],
        look: [cam.look.x, cam.look.y, cam.look.z],
        fwd: [f.x, f.y, f.z]
      };
    },
    forceCamMode(mode, snap) {
      cam.holdT = 0;
      if (mode === "overview") cam.wantAim = false;
      camGoto(mode, snap !== false);
      return camModeStr();
    },
    groundAt(x, z) { return groundYAt(x, z); },
    getAim() {
      return {
        phase: G.phase, activeTeam: G.activeTeam,
        az: aim.az, pitch: aim.pitch, power: aim.power, maxPower: MAX_POWER,
        dir: [aim.dir.x, aim.dir.y, aim.dir.z], previewFrac: PREVIEW_FRAC,
        point: aim.point ? Object.assign({}, aim.point) : null,
        ammo: G.selAmmo[G.activeTeam],
        arcVisible: arcDots[0].visible, flagVisible: aimFlag.visible,
        heightT: sliderT(heightSlider), powerT: sliderT(powerSlider),
        wind: G.wind
      };
    },
    get aimPoint() { return aim.point ? Object.assign({}, aim.point) : null; },
    get projectiles() { return G.projectiles; },
    /** full simulated world arc for current-or-given aim (respects G.wind; ammo-blind) */
    simulate(power, dx, dy, dz) {
      const u = activeUnit(); if (!u) return [];
      const o = muzzleOf(u);
      let dir = aim.dir, pw = aim.power;
      if (power != null) { dir = new THREE.Vector3(dx, dy, dz).normalize(); pw = power; }
      return simulateArc(o, dir, pw, G.wind, 130);
    },
    /** honest preview sim with the SELECTED ammo's physics applied */
    previewShot(power, dx, dy, dz) {
      const u = activeUnit(); if (!u) return { pts: [], endKind: "none", hitUnitId: null, end: null };
      const o = muzzleOf(u);
      let dir = aim.dir, pw = aim.power;
      if (power != null) { dir = new THREE.Vector3(dx, dy, dz).normalize(); pw = power; }
      const velF = AMMO[G.selAmmo[u.team]].velF;
      const sim = simulateShot(o, dir, pw * velF, G.wind, u.id);
      const end = sim.pts[sim.pts.length - 1] || o;
      return { pts: sim.pts, endKind: sim.endKind, hitUnitId: sim.hitUnitId, end };
    },
    previewPts(power, dx, dy, dz) { return this.previewShot(power, dx, dy, dz).pts; },
    /** the visible 40% stub of the honest preview */
    previewStubPts(power, dx, dy, dz) { return trimByLength(this.previewShot(power, dx, dy, dz).pts, PREVIEW_FRAC); },
    tapAim(clientX, clientY) {
      const hit = raycastGround(clientX, clientY);
      if (hit) setAimPoint(hit.x, hit.z);
      return aim.point ? Object.assign({}, aim.point) : null;
    },
    setSliders(heightT, powerT) {
      if (heightT != null) heightSlider.value = String(Math.round(clamp(heightT, 0, 1) * 100));
      if (powerT != null) powerSlider.value = String(Math.round(clamp(powerT, 0, 1) * 100));
      refreshAim();
      return { heightT: sliderT(heightSlider), powerT: sliderT(powerSlider), pitch: aim.pitch, power: aim.power, maxPower: MAX_POWER };
    },
    setAmmo(type) {
      // mirrors the real chip-click path: selection + chip + preview re-sim ONLY.
      // aim point (world), yaw, pitch, power, sliders are never touched here.
      if (AMMO[type] && (AMMO[type].limit === Infinity || G.ammo[G.activeTeam][type] > 0)) {
        G.selAmmo[G.activeTeam] = type;
      }
      updateAmmoChips();
      refreshAim();   // recomputes az from the SAME aim.point + reads the SAME sliders (idempotent)
      return G.selAmmo[G.activeTeam];
    },
    get camOrbit() { return { az: cam.orbitAz, el: cam.orbitEl }; },
    orbitBy(dAz, dEl) { orbitBy(dAz, dEl); return { az: cam.orbitAz, el: cam.orbitEl }; },
    resetOrbit() { resetOrbit(); return { az: cam.orbitAz, el: cam.orbitEl }; },
    /** camera azimuth (radians) around the active shooter in the XZ plane */
    camAzimuth() {
      const u = activeUnit(); if (!u) return null;
      return Math.atan2(camera.position.z - u.z, camera.position.x - u.x);
    },
    /** camera elevation (radians) above the shooter pivot */
    camElevation() {
      const u = activeUnit(); if (!u) return null;
      const px = u.x, py = u.y + ORBIT_PIVOT_UP, pz = u.z;
      const dx = camera.position.x - px, dy = camera.position.y - py, dz = camera.position.z - pz;
      const r = Math.hypot(dx, dy, dz); if (r < 1e-4) return 0;
      return Math.asin(clamp(dy / r, -1, 1));
    },
    ammoCounts() { return JSON.parse(JSON.stringify(G.ammo)); },
    setAmmoCount(team, type, n) { if (G.ammo[team] && type in G.ammo[team]) G.ammo[team][type] = n; updateAmmoChips(); return this.ammoCounts(); },
    fireAt(power, dx, dy, dz) {
      const u = activeUnit(); if (!u) return false;
      if (G.phase === "title") startMatch();
      aim.dir.set(dx, dy, dz).normalize(); aim.power = power;
      aim.pitch = Math.asin(clamp(aim.dir.y, -1, 1));
      aim.az = Math.atan2(aim.dir.z, aim.dir.x);
      G.phase = "aim";
      return fireShot(u);
    },
    forceCarve(x, y, z, r) {
      if (!G.voxels) { buildVoxelField(); rebuildAllChunks(); }
      return carveSphere(x, y, z, r == null ? BLAST_CARVE_R : r);
    },
    forceWaterOut(id) { markOut(id); return !!(G.units[id] && G.units[id].out); },
    enableRagdoll(id) { enableRagdoll(id); return G.units[id] && G.units[id].mode === "ragdoll"; },
    /** shove a unit's ragdoll into the pond (test helper) */
    dunk(id) {
      enableRagdoll(id);
      const c = critters[id]; if (!c) return false;
      const cz = (Math.random() - 0.5) * 2;
      for (const b of c.bodyList) {
        b.type = CANNON.Body.DYNAMIC; b.wakeUp();
        b.position.set(0.1 + (Math.random() - 0.5) * 0.4, WATER_Y - 0.35, cz + (Math.random() - 0.5) * 0.4);
        b.velocity.set(0, -0.5, 0); b.angularVelocity.set(0, 0, 0);
      }
      G.units[id].mode = "ragdoll"; G.units[id].waterT = 0;
      return true;
    },
    blastNear(id, scale) {
      const u = G.units[id]; if (!u) return 0;
      return applyBlast(u.x, u.y + 0.4, u.z, BLAST_KNOCK_R * (scale || 1));
    },
    aiFireNow() { if (G.activeTeam === 1 && G.phase === "aim") camGoto("aim", true); G.aiTimer = 0; aiTakeTurn(); return G.projectiles.length > 0; },
    endTurnNow() { G.settleT = 99; G.phase = G.phase === "won" ? "won" : "settling"; finishTurn(); return G.phase; },
    unitScreenPos(id) {
      const c = critters[id]; if (!c) return null;
      const t = c.bodies.torso.position;
      return worldToClient(t.x, t.y, t.z);
    },
    muzzleOf(id) { const u = G.units[id]; return u ? muzzleOf(u) : null; },
    ragdollBodyCount(id) { const c = critters[id == null ? 0 : id]; return c ? c.bodyList.length : 0; }
  };
})();
</script>
</body>
</html>

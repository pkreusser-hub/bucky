<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>glb-shot viewer</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #cfcfcf; }
  #c { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
"use strict";

// Query params: ?glb=<url>&view=front|three4|top|side&w=..&h=..
// Animation strip mode (optional): &anim=<clipIndex>&frame=<i>&frames=<N>
// When "anim" is present, the AnimationMixer is advanced to frame i/N of the
// clip's duration (looping) before the single screenshot is taken. Calling
// this endpoint once per frame (i=0..N-1) lets glb-shot.js assemble a strip.
const qs = new URLSearchParams(location.search);
const glbUrl = qs.get("glb");
const view = qs.get("view") || "front";
const W = parseInt(qs.get("w") || "900", 10);
const H = parseInt(qs.get("h") || "900", 10);
const animIndex = qs.has("anim") ? parseInt(qs.get("anim"), 10) : null;
const frameIndex = qs.has("frame") ? parseInt(qs.get("frame"), 10) : 0;
const totalFrames = qs.has("frames") ? parseInt(qs.get("frames"), 10) : 6;

window.__shotReady = false;
window.__shotError = null;

const canvas = document.getElementById("c");
canvas.width = W; canvas.height = H;
canvas.style.width = W + "px";
canvas.style.height = H + "px";

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(1);
renderer.setSize(W, H, false);
renderer.setClearColor(0xcfcfcf, 1); // light gray studio background

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xcfcfcf);

const camera = new THREE.PerspectiveCamera(40, W / H, 0.01, 1000);

// Neutral studio lighting: hemisphere fill + key directional light.
const hemi = new THREE.HemisphereLight(0xffffff, 0x555555, 1.0);
scene.add(hemi);
const key = new THREE.DirectionalLight(0xffffff, 0.9);
key.position.set(2, 3, 2.5);
scene.add(key);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.35);
fillLight.position.set(-2.5, 1.5, -2);
scene.add(fillLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.25));

// Box3.setFromObject() does NOT account for GPU skinning on a SkinnedMesh —
// it only transforms the raw local (bind-pose-authored) geometry by the
// object's matrixWorld, ignoring bone deformation entirely. For Meshy's
// rigged GLBs (skeleton wrapped in an "Armature" node scaled 0.01, with
// large compensating scale baked into skeleton.boneInverses), that raw-geometry
// box came out ~20-90x smaller than the actual on-screen skinned silhouette,
// which put the camera far too close and rendered a blank/clipped-through
// close-up of a single body part instead of the whole character. Bones
// themselves ARE positioned correctly in world space post-skinning, so when
// a SkinnedMesh is present, frame off its skeleton's bone world positions
// instead of the mesh geometry's bbox.
function computeWorldBox(object){
  const box = new THREE.Box3();
  let sawSkinned = false;
  object.traverse((o) => {
    if (o.isSkinnedMesh && o.skeleton){
      sawSkinned = true;
      for (const bone of o.skeleton.bones){
        box.expandByPoint(bone.getWorldPosition(new THREE.Vector3()));
      }
    }
  });
  if (!sawSkinned){
    box.setFromObject(object);
  }
  return box;
}

function frameCameraOnObject(object, viewName){
  object.updateMatrixWorld(true);
  const box = computeWorldBox(object);
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);

  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const fitDist = (maxDim / 2) / Math.tan((camera.fov * Math.PI / 180) / 2) * 1.6; // padding

  let dir;
  switch (viewName){
    case "front": dir = new THREE.Vector3(0, 0.15, 1); break;
    case "three4": dir = new THREE.Vector3(0.85, 0.55, 0.85); break;
    case "top": dir = new THREE.Vector3(0, 1, 0.001); break;
    case "side": dir = new THREE.Vector3(1, 0.15, 0); break;
    default: dir = new THREE.Vector3(0, 0.15, 1);
  }
  dir.normalize();

  camera.position.copy(center).addScaledVector(dir, fitDist);
  camera.lookAt(center);
  // near must scale with the object, not a fixed floor: rigged GLBs from
  // Meshy wrap the skeleton in an "Armature" node scaled by 0.01, so a
  // farmer generated at height_meters=1.75 ends up ~0.0175 three.js units
  // tall. A fixed near=0.01 floor was larger than fitDist itself for such
  // objects, clipping straight through the mesh (blank/sliced renders).
  camera.near = fitDist / 100;
  camera.far = fitDist * 100;
  camera.updateProjectionMatrix();
}

if (!glbUrl){
  window.__shotError = "No ?glb= query param supplied.";
} else {
  new THREE.GLTFLoader().load(
    glbUrl,
    (gltf) => {
      const model = gltf.scene;
      scene.add(model);

      if (animIndex !== null){
        const clips = gltf.animations || [];
        const clip = clips[animIndex];
        if (!clip){
          window.__shotError = `No animation clip at index ${animIndex} (file has ${clips.length} clip(s)).`;
          window.__shotReady = true;
          return;
        }
        const mixer = new THREE.AnimationMixer(model);
        const action = mixer.clipAction(clip);
        action.play();
        // Step the mixer to a specific point in the loop: frame i of N spans
        // [0, duration) evenly, e.g. frames=6 -> i=0,1,2,3,4,5 at 0/6..5/6 of duration.
        const t = clip.duration * (frameIndex / totalFrames);
        mixer.update(t);
        model.updateMatrixWorld(true);
      }

      // Framed AFTER the mixer update so a posed (non-rest) frame is
      // measured accurately, not just the bind pose.
      frameCameraOnObject(model, view);

      renderer.render(scene, camera);
      window.__shotReady = true;
    },
    undefined,
    (err) => {
      window.__shotError = "Failed to load GLB: " + (err && err.message ? err.message : String(err));
      window.__shotReady = true; // unblock the waiter so the caller sees the error
    }
  );
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#233357" />
<title>Story Time</title>
<link rel="icon" href="bucky.png" />
<link rel="apple-touch-icon" href="bucky.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<!-- DOMPurify sanitizes the drawn illustration before it ever touches the DOM -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js"></script>
<style>
  /* Built for a six-year-old on an iPad: very large type, very large targets, no typing
     anywhere, and nothing on screen that isn't part of the story. */
  :root {
    --bg: #fff8ec;          /* warm paper */
    --card: #ffffff;
    --ink: #23303f;
    --muted: #6b7789;
    --navy: #233357;
    --red: #ba303e;
    --line: #eadfc9;
    --shadow: 0 2px 6px rgba(80,60,30,.08), 0 12px 28px rgba(80,60,30,.10);
    --pick1: #ffe6a7; --pick2: #cfeccc; --pick3: #d6e6ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: ui-rounded, "SF Pro Rounded", "Nunito", "Segoe UI", system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
    padding: calc(env(safe-area-inset-top) + 10px) 18px calc(env(safe-area-inset-bottom) + 22px);
    max-width: 1100px; margin: 0 auto;
    /* a child resting a palm on the screen shouldn't select text */
    -webkit-user-select: none; user-select: none;
  }

  /* ---------- top bar (small — grown-up controls stay out of the way) ---------- */
  #top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  #top .sp { flex: 1; }
  .tinybtn {
    border: 2px solid var(--line); background: var(--card); color: var(--muted);
    font: inherit; font-size: 15px; font-weight: 800; padding: 8px 14px;
    border-radius: 14px; cursor: pointer; min-height: 44px;
  }
  .tinybtn:active { transform: scale(.96); }

  .view { display: none; }
  .view.on { display: block; }

  /* ---------- pick a story ---------- */
  h1 { font-size: 40px; line-height: 1.15; margin: 6px 0 4px; letter-spacing: -.5px; }
  .sub { font-size: 21px; color: var(--muted); font-weight: 700; margin: 0 0 22px; }
  #starters { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
  @media (min-width: 760px){ #starters { grid-template-columns: repeat(3, 1fr); } }
  .starter {
    background: var(--card); border: 3px solid var(--line); border-radius: 26px;
    padding: 26px 16px 22px; cursor: pointer; font: inherit; color: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    box-shadow: var(--shadow); transition: transform .12s ease, border-color .12s ease;
    min-height: 168px; justify-content: center;
  }
  .starter:active { transform: scale(.96); border-color: var(--navy); }
  .starter .em { font-size: 62px; line-height: 1; }
  .starter .nm { font-size: 21px; font-weight: 800; text-align: center; line-height: 1.25; }

  /* ---------- the story ---------- */
  #art {
    background: #f3ece0; border-radius: 26px; overflow: hidden; margin-bottom: 18px;
    box-shadow: var(--shadow); aspect-ratio: 400 / 260; display: grid; place-items: center;
  }
  #art svg, #art img { width: 100%; height: 100%; display: block; object-fit: cover; }
  /* Landscape iPad: stacked, the picture alone would fill the screen and push the words below
     the fold. Side-by-side instead — picture left, story right, choices across the bottom —
     so a child never has to scroll to find the words or the choices. */
  @media (orientation: landscape) and (min-width: 900px) {
    #storyTop { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch; }
    #art { margin-bottom: 0; align-self: start; }
    #storyCard { margin-bottom: 0; display: flex; flex-direction: column; justify-content: center; }
    #pickWrap { margin-top: 20px; }
  }
  #art.loading::after {
    content: "🎨"; font-size: 54px; animation: bob 1.4s ease-in-out infinite;
  }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-6deg); } 50% { transform: translateY(-10px) rotate(6deg); } }

  #storyCard {
    background: var(--card); border: 3px solid var(--line); border-radius: 26px;
    padding: 26px 26px 22px; box-shadow: var(--shadow); margin-bottom: 20px;
  }
  /* The reading text itself — the most important thing on the page. */
  #text {
    font-size: 30px; line-height: 1.95; font-weight: 700; letter-spacing: .2px;
    max-width: 26ch; margin: 0 auto; text-wrap: pretty;
  }
  @media (max-width: 700px){ #text { font-size: 26px; line-height: 1.85; } }
  /* negative margin cancels the padding so the highlight has breathing room without
     visually widening the gaps between words */
  #text .w { border-radius: 7px; padding: 2px 4px; margin: 0 -4px; transition: background .1s linear; }
  #text .w.now { background: #ffe082; }      /* follows along while it reads aloud */
  #readRow { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
  #tapHint { text-align: center; font-size: 15px; font-weight: 700; color: var(--muted); margin: 12px 0 0; }
  /* voice picker */
  #voiceSheet { position: fixed; inset: 0; background: rgba(40,30,15,.45); z-index: 40;
    display: grid; place-items: center; padding: 20px; }
  #voiceSheet[hidden] { display: none; }
  #vpanel { background: var(--card); border-radius: 26px; padding: 22px; width: min(560px, 100%);
    max-height: 84vh; display: flex; flex-direction: column; box-shadow: var(--shadow); }
  #vpanel h2 { font-size: 26px; margin: 0 0 4px; }
  #vhint { font-size: 16px; color: var(--muted); font-weight: 700; margin: 0 0 14px; }
  #voiceList { overflow-y: auto; -webkit-overflow-scrolling: touch; display: grid; gap: 10px; margin-bottom: 16px; }
  .vrow { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    border: 3px solid var(--line); background: var(--card); border-radius: 18px; padding: 14px 16px;
    font: inherit; cursor: pointer; color: inherit; min-height: 62px; }
  .vrow:active { transform: scale(.98); }
  .vrow.sel { border-color: var(--navy); background: #eef3fb; }
  .vrow .vn { flex: 1; font-size: 19px; font-weight: 800; }
  .vrow .vr { font-size: 14px; font-weight: 700; color: var(--muted); }
  .vrow .vc { font-size: 22px; color: var(--navy); }
  #vnone { font-size: 17px; color: var(--muted); font-weight: 700; line-height: 1.5; }
  #text .w { cursor: pointer; }
  #readBtn {
    border: 0; border-radius: 20px; background: var(--navy); color: #fff;
    font: inherit; font-size: 22px; font-weight: 800; padding: 16px 30px; cursor: pointer;
    min-height: 62px; display: flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 0 #16203a; transition: transform .1s ease, box-shadow .1s ease;
  }
  #readBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #16203a; }
  #readBtn.playing { background: var(--red); box-shadow: 0 4px 0 #7d1f29; }

  .pickTitle { font-size: 23px; font-weight: 800; color: var(--muted); margin: 0 0 14px 4px; }
  #choices { display: grid; gap: 16px; }
  @media (min-width: 760px){ #choices { grid-template-columns: repeat(3, 1fr); } }
  .choice {
    display: flex; align-items: center; gap: 18px; width: 100%; text-align: left;
    border: 3px solid var(--line); border-radius: 24px; padding: 20px 22px;
    font: inherit; cursor: pointer; box-shadow: var(--shadow); color: var(--ink);
    min-height: 96px; transition: transform .12s ease, border-color .12s ease;
  }
  @media (min-width: 760px){ .choice { flex-direction: column; text-align: center; gap: 12px; padding: 24px 16px; } }
  .choice:nth-child(1){ background: var(--pick1); }
  .choice:nth-child(2){ background: var(--pick2); }
  .choice:nth-child(3){ background: var(--pick3); }
  .choice:active { transform: scale(.97); border-color: var(--navy); }
  .choice .em { font-size: 48px; line-height: 1; flex: 0 0 auto; }
  .choice .tx { font-size: 24px; font-weight: 800; line-height: 1.3; }
  .choice[disabled] { opacity: .45; }

  /* thinking + trouble */
  #thinking { text-align: center; padding: 26px 0; font-size: 23px; font-weight: 800; color: var(--muted); }
  #thinking .dots span { display: inline-block; font-size: 34px; animation: hop .9s infinite; }
  #thinking .dots span:nth-child(2){ animation-delay: .15s; }
  #thinking .dots span:nth-child(3){ animation-delay: .3s; }
  @keyframes hop { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-12px); } }
  #oops { text-align: center; font-size: 22px; font-weight: 800; color: var(--muted); padding: 20px; }
  #oops button { margin-top: 14px; }
</style>
</head>
<body>

<!-- voice picker (tap a name to hear it) -->
<div id="voiceSheet" hidden>
  <div id="vpanel" role="dialog" aria-label="Pick a reading voice">
    <h2>Pick a voice</h2>
    <p id="vhint">Tap a name to hear it.</p>
    <div id="voiceList"></div>
    <button class="tinybtn" id="voiceClose">Done</button>
  </div>
</div>

<div id="top">
  <button class="tinybtn" id="backBtn" aria-label="Pick a different story">← Stories</button>
  <div class="sp"></div>
  <button class="tinybtn" id="homeBtn" aria-label="Leave story time">🏡</button>
</div>

<!-- PICK A STORY -->
<section class="view on" id="pickView">
  <h1 id="greet">Story Time</h1>
  <p class="sub">Pick a story to begin.</p>
  <div id="starters"></div>
</section>

<!-- THE STORY -->
<section class="view" id="storyView">
  <div id="storyTop">
    <div id="art" class="loading" aria-hidden="true"></div>
    <div id="storyCard">
      <div id="text"></div>
      <div id="readRow">
      <button id="readBtn">🔊 <span>Read it to me</span></button>
      <button id="speedBtn" class="tinybtn" aria-label="Reading speed">🐢 Slow</button>
      <button id="voiceBtn" class="tinybtn" aria-label="Pick a reading voice">🗣 Voice</button>
    </div>
    <p id="tapHint">Tap any word to hear it.</p>
    </div>
  </div>
  <div id="thinking" style="display:none">
    <div>Writing the next part…</div>
    <div class="dots"><span>🐾</span><span>🐾</span><span>🐾</span></div>
  </div>
  <div id="pickWrap">
    <p class="pickTitle">What happens next?</p>
    <div id="choices"></div>
  </div>
  <div id="oops" style="display:none">
    <div id="oopsMsg">The story got stuck.</div>
    <button class="tinybtn" id="retryBtn">Try again</button>
  </div>
</section>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const API = "/.netlify/functions/farmgpt";
  const FAMILY_PASSWORD = "amenfarms";
  // Who's reading. A grown-up can change it with ?who=Name (remembered on this iPad) so the
  // greeting is personal and the parent Story Log shows whose session it was.
  const WHO_KEY = "storytime_who";
  const qsWho = new URLSearchParams(location.search).get("who");
  if (qsWho) { try { localStorage.setItem(WHO_KEY, qsWho.slice(0, 24)); } catch {} }
  const WHO = (() => { try { return localStorage.getItem(WHO_KEY) || "Benjie"; } catch { return "Benjie"; } })();

  // The child never types. These are the ONLY story openings that exist, and every turn after
  // this is a choice the storyteller itself wrote — so nothing a child can tap ever introduces
  // new instructions into the conversation.
  const STARTERS = [
    { em: "🐐", nm: "The Goat Who Got Out",  seed: "A funny farm story about a goat named Bo who opens his gate and goes exploring around the farm." },
    { em: "🦖", nm: "My Dinosaur Friend",    seed: "A happy story about a kid who finds a small, friendly, polka-dotted dinosaur in the back yard." },
    { em: "🚀", nm: "Trip to the Moon",      seed: "A cheerful story about a kid who builds a cardboard rocket and flies to the moon to have a picnic." },
    { em: "🐙", nm: "Under the Sea",         seed: "A gentle story about a kid in a yellow submarine who makes friends with a silly octopus." },
    { em: "🏴‍☠️", nm: "The Silly Pirates",   seed: "A goofy story about friendly pirates whose treasure map leads to something surprising and sweet." },
    { em: "🐉", nm: "A Very Small Dragon",   seed: "A warm story about a tiny dragon, no bigger than a kitten, who can only puff smoke rings." },
    { em: "🚂", nm: "The Talking Train",     seed: "A happy story about a little train who talks and takes animals on a trip through the hills." },
    { em: "🍪", nm: "The Cookie Mystery",    seed: "A silly mystery about who took the cookies from the kitchen. It turns out to be something funny." },
    { em: "🐻", nm: "Camping With Bear",     seed: "A cozy story about a kid camping in the yard with a big, gentle, marshmallow-loving bear." },
  ];

  // ---------- offline demo mode (?demo=1) ----------
  // The same page, but the story comes from these baked scenes instead of the network, so it
  // can be opened straight off an iPad with no internet at all. Everything else — the type,
  // the read-aloud, the tap targets, the layout — is the real thing. Art here is a literal in
  // this file (our own markup, same trust level as the page), so it skips the sanitizer that
  // model-drawn art must pass through.
  // ?demo=1 forces it; opening the file straight off a device (file://) also switches to the
  // demo automatically, since there's no server there for the live story to call anyway.
  const DEMO = new URLSearchParams(location.search).get("demo") === "1" || location.protocol === "file:";
  const D_ART = {
    farm: `<svg viewBox="0 0 400 260"><rect width="400" height="260" fill="#bfe4f7"/><circle cx="336" cy="46" r="30" fill="#ffd75e"/><ellipse cx="86" cy="52" rx="42" ry="20" fill="#fff"/><ellipse cx="120" cy="46" rx="30" ry="16" fill="#fff"/><rect y="176" width="400" height="84" fill="#8ec96b"/><ellipse cx="60" cy="182" rx="70" ry="16" fill="#7bbb59"/><ellipse cx="330" cy="186" rx="80" ry="18" fill="#7bbb59"/><rect x="248" y="86" width="118" height="94" fill="#d2453f"/><polygon points="240,88 307,44 374,88" fill="#a83430"/><rect x="288" y="126" width="38" height="54" fill="#8f2f2b"/><rect x="86" y="120" width="86" height="52" rx="16" fill="#f4efe6"/><circle cx="72" cy="120" r="27" fill="#f4efe6"/><circle cx="62" cy="112" r="5" fill="#33404f"/><ellipse cx="48" cy="126" rx="12" ry="9" fill="#e6dccb"/><path d="M60 96 q-10 -22 4 -26 q4 16 8 22 z" fill="#e6dccb"/><path d="M84 96 q10 -22 -4 -26 q-4 16 -8 22 z" fill="#e6dccb"/><rect x="96" y="168" width="13" height="30" fill="#d9d2c4"/><rect x="146" y="168" width="13" height="30" fill="#d9d2c4"/><path d="M172 132 q22 -6 20 16" stroke="#e6dccb" stroke-width="9" fill="none" stroke-linecap="round"/><ellipse cx="212" cy="186" rx="20" ry="15" fill="#fff"/><circle cx="228" cy="172" r="11" fill="#fff"/><polygon points="236,172 248,176 236,180" fill="#f2a63b"/><circle cx="231" cy="169" r="2.4" fill="#33404f"/></svg>`,
    barn: `<svg viewBox="0 0 400 260"><rect width="400" height="260" fill="#8f5f3a"/><rect y="196" width="400" height="64" fill="#6f472b"/><rect x="24" y="40" width="60" height="90" fill="#a06b42"/><rect x="316" y="40" width="60" height="90" fill="#a06b42"/><circle cx="200" cy="52" r="26" fill="#ffe08a"/><rect x="96" y="128" width="88" height="40" rx="7" fill="#e8c66a"/><rect x="104" y="140" width="72" height="5" fill="#cfa94d"/><rect x="120" y="90" width="88" height="40" rx="7" fill="#e8c66a"/><rect x="128" y="102" width="72" height="5" fill="#cfa94d"/><rect x="212" y="128" width="88" height="40" rx="7" fill="#e8c66a"/><rect x="220" y="140" width="72" height="5" fill="#cfa94d"/><ellipse cx="250" cy="186" rx="26" ry="17" fill="#f0efe9"/><circle cx="274" cy="172" r="15" fill="#f0efe9"/><polygon points="264,160 268,150 274,160" fill="#f0efe9"/><polygon points="280,160 286,150 289,160" fill="#f0efe9"/><circle cx="270" cy="171" r="2.6" fill="#33404f"/><circle cx="280" cy="171" r="2.6" fill="#33404f"/><path d="M224 186 q-16 6 -12 18" stroke="#f0efe9" stroke-width="7" fill="none" stroke-linecap="round"/></svg>`,
    pond: `<svg viewBox="0 0 400 260"><rect width="400" height="260" fill="#c3e8f7"/><circle cx="60" cy="48" r="26" fill="#ffd75e"/><rect y="150" width="400" height="110" fill="#8ec96b"/><ellipse cx="210" cy="204" rx="150" ry="52" fill="#5bb4d8"/><ellipse cx="210" cy="196" rx="128" ry="40" fill="#79c9e6"/><ellipse cx="150" cy="196" rx="22" ry="16" fill="#fff"/><circle cx="170" cy="182" r="12" fill="#fff"/><polygon points="180,182 192,186 180,190" fill="#f2a63b"/><circle cx="173" cy="179" r="2.4" fill="#33404f"/><ellipse cx="232" cy="206" rx="12" ry="9" fill="#fff"/><circle cx="243" cy="198" r="7" fill="#fff"/><polygon points="249,198 256,200 249,203" fill="#f2a63b"/><ellipse cx="268" cy="212" rx="12" ry="9" fill="#fff"/><circle cx="279" cy="204" r="7" fill="#fff"/><polygon points="285,204 292,206 285,209" fill="#f2a63b"/><rect x="336" y="140" width="7" height="62" fill="#6f9e4f"/><ellipse cx="339" cy="136" rx="9" ry="18" fill="#8a5a34"/><rect x="358" y="152" width="7" height="50" fill="#6f9e4f"/><ellipse cx="361" cy="148" rx="8" ry="15" fill="#8a5a34"/></svg>`,
    flowers: `<svg viewBox="0 0 400 260"><rect width="400" height="260" fill="#cfeafb"/><circle cx="330" cy="44" r="28" fill="#ffd75e"/><rect y="160" width="400" height="100" fill="#8ec96b"/><g fill="#f2c53d"><circle cx="70" cy="168" r="15"/><circle cx="160" cy="182" r="15"/><circle cx="268" cy="170" r="15"/></g><g fill="#e8746a"><circle cx="116" cy="196" r="14"/><circle cx="220" cy="200" r="14"/><circle cx="320" cy="190" r="14"/></g><g fill="#fff"><circle cx="70" cy="168" r="6"/><circle cx="160" cy="182" r="6"/><circle cx="268" cy="170" r="6"/><circle cx="116" cy="196" r="6"/><circle cx="220" cy="200" r="6"/><circle cx="320" cy="190" r="6"/></g><g stroke="#5f9440" stroke-width="5"><path d="M70 182v34"/><path d="M160 196v30"/><path d="M268 184v34"/><path d="M116 210v26"/><path d="M220 214v24"/><path d="M320 204v28"/></g><ellipse cx="196" cy="112" rx="15" ry="11" fill="#f5c243"/><rect x="188" y="103" width="6" height="18" fill="#33404f"/><rect x="200" y="103" width="6" height="18" fill="#33404f"/><ellipse cx="190" cy="98" rx="12" ry="7" fill="#fff" opacity=".8"/><ellipse cx="204" cy="98" rx="12" ry="7" fill="#fff" opacity=".8"/></svg>`,
  };
  // Real first-grade sentences (3-9 words each) so the reading level can be judged too.
  const DEMO_SCENES = {
    s1: { art: "farm", text: "Bo the goat pushed the gate.\nIt swung open with a creak.\nBo ran out into the sun.\nA duck said, \"Quack! Hello!\"",
      choices: [ { em: "🦆", text: "Say hi to the duck", next: "s3" }, { em: "🏚️", text: "Peek in the barn", next: "s2" }, { em: "🌻", text: "Go see the flowers", next: "s4" } ] },
    s2: { art: "barn", text: "The barn smelled like warm hay.\nBig soft bales sat in a row.\nA tiny kitten blinked at Bo.\n\"Mew,\" said the kitten.",
      choices: [ { em: "🐱", text: "Pet the kitten", next: "s5" }, { em: "🌾", text: "Jump on the hay", next: "s5" }, { em: "🚪", text: "Go back outside", next: "s1" } ] },
    s3: { art: "pond", text: "The duck had six little ducklings.\nThey all went splash in the pond.\nBo dipped one hoof in.\nThe water was cold!",
      choices: [ { em: "💦", text: "Splash some more", next: "s5" }, { em: "🌻", text: "Run to the flowers", next: "s4" }, { em: "🏚️", text: "Dry off in the barn", next: "s2" } ] },
    s4: { art: "flowers", text: "The field was full of flowers.\nRed ones. Yellow ones. So many!\nA fat bee buzzed past Bo.\nBo sneezed a very big sneeze.",
      choices: [ { em: "🐝", text: "Follow the buzzy bee", next: "s5" }, { em: "👃", text: "Smell a red flower", next: "s5" }, { em: "🦆", text: "Go find the duck", next: "s3" } ] },
    s5: { art: "farm", text: "Soon the sun went down low.\nBo felt sleepy and warm.\nThe duck walked Bo back home.\n\"Same time tomorrow?\" said the duck.",
      choices: [ { em: "☀️", text: "Play again tomorrow", next: "s1" }, { em: "🌙", text: "Curl up and nap", next: "s2" }, { em: "🍎", text: "Have a snack first", next: "s4" } ] },
  };
  let demoAt = "s1";

  const SAVE_KEY = "storytime_save_v1";
  let story = null;          // { id, title, msgs:[{role,content}], scene:{text,choices}, art }
  let busy = false;
  let speechReady = false;   // iOS needs a real tap before it will ever speak

  // ---------- view switching ----------
  function show(v) {
    for (const id of ["pickView", "storyView"]) $(id).classList.toggle("on", id === v);
    $("backBtn").style.visibility = v === "storyView" ? "visible" : "hidden";
    stopSpeech();
    window.scrollTo(0, 0);
  }

  // ---------- speech (read-aloud with word highlighting) ----------
  // The biggest help for a child at this level: they can hear the sentence and watch the
  // words light up as it goes. Boundary events drive it where supported (most desktop
  // browsers + iOS), with a paced fallback so it always tracks even when they don't fire.
  const synth = window.speechSynthesis;
  let wordEls = [], speaking = false, speakIdx = -1;

  // Reading speed. A beginning reader needs this much slower than natural speech; the child
  // (or a grown-up) can nudge it either way and it sticks on this device.
  const RATE_KEY = "storytime_rate";
  const RATES = [
    { r: 0.42, em: "🐢", nm: "Slowest" },
    { r: 0.55, em: "🐢", nm: "Slow" },
    { r: 0.70, em: "🚶", nm: "Medium" },
    { r: 0.90, em: "🐇", nm: "Fast" },
  ];
  let rateIdx = (() => { try { const n = parseInt(localStorage.getItem(RATE_KEY), 10); return (n >= 0 && n < RATES.length) ? n : 1; } catch { return 1; } })();
  function paintSpeed() { $("speedBtn").textContent = RATES[rateIdx].em + " " + RATES[rateIdx].nm; }
  $("speedBtn").onclick = () => {
    rateIdx = (rateIdx + 1) % RATES.length;
    try { localStorage.setItem(RATE_KEY, String(rateIdx)); } catch {}
    paintSpeed(); stopSpeech();
  };
  paintSpeed();

  // ---- voices ----
  // An iPad usually has a dozen-plus English voices installed (more if extra ones have been
  // downloaded in Settings › Accessibility › Spoken Content › Voices). Let the child pick,
  // and remember it on this device.
  const VOICE_KEY = "storytime_voice";
  let chosenVoice = (() => { try { return localStorage.getItem(VOICE_KEY) || ""; } catch { return ""; } })();
  const REGION = { US: "American", GB: "British", AU: "Australian", IE: "Irish", IN: "Indian",
                   ZA: "South African", NZ: "New Zealand", CA: "Canadian", SG: "Singapore", HK: "Hong Kong" };
  function englishVoices() {
    if (!synth) return [];
    const seen = new Set(), out = [];
    for (const v of (synth.getVoices() || [])) {
      if (!/^en\b|^en[-_]/i.test(v.lang || "")) continue;      // English only
      if (seen.has(v.name)) continue;
      seen.add(v.name); out.push(v);
    }
    return out;
  }
  function pickVoice() {
    const vs = englishVoices();
    if (!vs.length) return null;
    if (chosenVoice) { const v = vs.find((x) => x.name === chosenVoice); if (v) return v; }
    // no choice yet: prefer warm, clear voices that read well for children
    const pref = ["Samantha", "Ava", "Allison", "Susan", "Karen", "Moira", "Daniel",
                  "Google UK English Female", "Google US English"];
    for (const p of pref) { const v = vs.find((x) => x.name === p || x.name.startsWith(p + " ")); if (v) return v; }
    return vs[0];
  }
  function voiceRegion(v) {
    const m = /[-_]([A-Za-z]{2})\b/.exec(v.lang || "");
    return m ? (REGION[m[1].toUpperCase()] || m[1].toUpperCase()) : "";
  }
  function buildVoiceList() {
    const box = $("voiceList");
    box.innerHTML = "";
    const vs = englishVoices();
    if (!vs.length) {
      const p = document.createElement("p"); p.id = "vnone";
      p.textContent = "No reading voices are installed on this device yet. On an iPad you can add them in Settings › Accessibility › Spoken Content › Voices.";
      box.appendChild(p); return;
    }
    const current = pickVoice();
    for (const v of vs) {
      const b = document.createElement("button");
      b.className = "vrow" + (current && v.name === current.name ? " sel" : "");
      b.type = "button";
      b.innerHTML = `<span class="vn"></span><span class="vr"></span><span class="vc"></span>`;
      b.querySelector(".vn").textContent = v.name;
      b.querySelector(".vr").textContent = voiceRegion(v);
      b.querySelector(".vc").textContent = (current && v.name === current.name) ? "✓" : "";
      b.onclick = () => {
        chosenVoice = v.name;
        try { localStorage.setItem(VOICE_KEY, v.name); } catch {}
        buildVoiceList();
        previewVoice();                       // hear it immediately
      };
      box.appendChild(b);
    }
  }
  function previewVoice() {
    if (!synth) return;
    stopSpeech();
    const u = makeUtter("Hi! I can read your story.");
    try { synth.speak(u); } catch {}
  }
  $("voiceBtn").onclick = () => { primeSpeech(); buildVoiceList(); $("voiceSheet").hidden = false; };
  $("voiceClose").onclick = () => { stopSpeech(); $("voiceSheet").hidden = true; };
  $("voiceSheet").onclick = (e) => { if (e.target.id === "voiceSheet") { stopSpeech(); $("voiceSheet").hidden = true; } };
  function primeSpeech() {           // must run inside a real tap for iOS
    if (speechReady || !synth) return;
    try { const u = new SpeechSynthesisUtterance(" "); u.volume = 0; synth.speak(u); speechReady = true; } catch {}
  }
  function setReadBtn(on) {
    $("readBtn").classList.toggle("playing", !!on);
    $("readBtn").querySelector("span").textContent = on ? "Stop" : "Read it to me";
  }
  function stopSpeech() {
    speaking = false;                 // set BEFORE cancel — cancel fires onend on some engines
    speakIdx = -1;
    try { synth && synth.cancel(); } catch {}
    for (const el of wordEls) el.classList.remove("now");
    setReadBtn(false);
  }
  function highlight(i) {
    for (const el of wordEls) el.classList.remove("now");
    if (wordEls[i]) wordEls[i].classList.add("now");
  }
  // Quotes and dashes confuse the synthesizer; the child still sees them on screen.
  const forSpeech = (w) => String(w || "").replace(/[“”„‟"'‘’—–]/g, "").trim();
  function makeUtter(text) {
    const u = new SpeechSynthesisUtterance(text);
    const v = pickVoice(); if (v) u.voice = v;
    u.rate = RATES[rateIdx].r;
    u.pitch = 1.06;
    return u;
  }
  // ONE UTTERANCE PER WORD. Estimating word timing from a single long utterance always drifts
  // out of sync with the highlight; speaking word by word makes the highlight exact by
  // construction — the next word simply cannot start until the previous one has finished.
  // It also reads deliberately, the way you'd read along with a beginning reader.
  function speakNext() {
    if (!speaking) return;
    speakIdx++;
    if (speakIdx >= wordEls.length) { stopSpeech(); return; }
    const el = wordEls[speakIdx];
    const say = forSpeech(el.dataset.w);
    if (!say) { speakNext(); return; }          // punctuation-only token: skip, don't stall
    const u = makeUtter(say);
    highlight(speakIdx);
    u.onstart = () => highlight(speakIdx);      // re-affirm exactly as the audio begins
    u.onend = () => { if (speaking) speakNext(); };
    u.onerror = () => { if (speaking) speakNext(); };
    try { synth.speak(u); } catch { stopSpeech(); }
  }
  function speakScene() {
    if (!synth || !story || !story.scene) return;
    if (speaking) { stopSpeech(); return; }     // the button doubles as Stop
    try { synth.cancel(); } catch {}
    speaking = true; speakIdx = -1;
    setReadBtn(true);
    speakNext();
  }
  // Tap any single word to hear just that word — the "what does this one say?" move a child
  // makes constantly at this level.
  function speakWord(el) {
    stopSpeech();
    const say = forSpeech(el.dataset.w);
    if (!synth || !say) return;
    const u = makeUtter(say);
    u.rate = Math.max(0.35, RATES[rateIdx].r * 0.9);   // a touch slower on its own
    el.classList.add("now");
    const clear = () => el.classList.remove("now");
    u.onend = clear; u.onerror = clear;
    try { synth.speak(u); } catch { clear(); }
  }
  // voices often arrive a moment after load — refresh the list if it's open when they do
  if (synth && typeof synth.onvoiceschanged !== "undefined") {
    synth.onvoiceschanged = () => { if (!$("voiceSheet").hidden) buildVoiceList(); };
  }
  $("readBtn").onclick = () => { primeSpeech(); speakScene(); };

  // ---------- rendering ----------
  function paintText(t) {
    const box = $("text");
    box.innerHTML = "";
    wordEls = [];
    for (const raw of String(t).split(/(\s+)/)) {
      if (!raw) continue;
      if (/^\s+$/.test(raw)) { box.appendChild(document.createTextNode(raw)); continue; }
      const s = document.createElement("span");
      s.className = "w"; s.textContent = raw;
      s.dataset.w = raw;
      s.onclick = () => { primeSpeech(); speakWord(s); };   // tap one word to hear it
      box.appendChild(s); wordEls.push(s);
    }
  }
  function paintChoices(choices) {
    const wrap = $("choices");
    wrap.innerHTML = "";
    $("pickWrap").style.display = choices.length ? "" : "none";
    choices.forEach((c) => {
      const b = document.createElement("button");
      b.className = "choice"; b.type = "button";
      const em = document.createElement("span"); em.className = "em"; em.textContent = c.em || "✨";
      const tx = document.createElement("span"); tx.className = "tx"; tx.textContent = c.text;
      b.append(em, tx);
      b.setAttribute("aria-label", c.text);
      b.onclick = () => { primeSpeech(); pickChoice(c); };
      wrap.appendChild(b);
    });
  }
  function setArt(html, isImage) {
    const el = $("art");
    el.classList.remove("loading");
    el.innerHTML = "";
    if (!html) { el.classList.add("loading"); return; }
    if (isImage) { const im = document.createElement("img"); im.src = html; im.alt = ""; el.appendChild(im); }
    else el.innerHTML = html;
  }
  function setBusy(on) {
    busy = on;
    $("thinking").style.display = on ? "" : "none";
    if (on) { $("pickWrap").style.display = "none"; $("oops").style.display = "none"; }
    for (const b of document.querySelectorAll(".choice")) b.disabled = on;
  }

  // ---------- the story engine ----------
  // Every message that leaves this page is either a starter seed from STARTERS or a choice
  // the storyteller itself wrote. There is no text input anywhere in this page.
  function parseScene(raw) {
    const M = "===CHOICES===";
    const i = String(raw).indexOf(M);
    const text = (i === -1 ? raw : raw.slice(0, i)).replace(/^\s*[\r\n]+/, "").trim();
    const choices = [];
    if (i !== -1) {
      for (const line of raw.slice(i + M.length).split("\n")) {
        const m = line.match(/^\s*\d[.)]\s*(.*)$/);
        if (!m) continue;
        const parts = m[1].split("|");
        if (parts.length >= 2) choices.push({ em: parts[0].trim().slice(0, 4), text: parts.slice(1).join("|").trim() });
        else {
          // model forgot the pipe — take a leading emoji if there is one, else a default
          const t = m[1].trim();
          const lead = t.match(/^(\p{Extended_Pictographic}️?(?:‍\p{Extended_Pictographic}️?)*)\s*(.*)$/u);
          choices.push(lead ? { em: lead[1], text: lead[2].trim() } : { em: "✨", text: t });
        }
      }
    }
    return { text, choices: choices.filter((c) => c.text).slice(0, 3) };
  }
  function sanitizeArt(svg) {
    try {
      const clean = DOMPurify.sanitize(svg, {
        USE_PROFILES: { svg: true, svgFilters: true },
        FORBID_TAGS: ["script", "foreignObject", "image", "text"],
        FORBID_ATTR: ["href", "xlink:href", "onload", "onclick"],
      });
      return /<svg[\s\S]*<\/svg>/i.test(clean) ? clean : null;
    } catch { return null; }
  }
  async function callStream(mode, messages, extra) {
    const r = await fetch(API, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret: FAMILY_PASSWORD, mode, messages, ...(extra || {}) }),
    });
    if (!r.ok) throw new Error("http " + r.status);
    const ct = r.headers.get("content-type") || "";
    if (ct.includes("application/json")) return { json: await r.json() };
    const reader = r.body.getReader(); const dec = new TextDecoder();
    let full = "";
    for (;;) { const { done, value } = await reader.read(); if (done) break; full += dec.decode(value, { stream: true }); }
    full += dec.decode();
    return { text: full };
  }

  async function fetchArt(sceneText) {
    $("art").classList.add("loading");
    try {
      const res = await callStream("kidart",
        [{ role: "user", content: "Draw this page of the story:\n" + sceneText }],
        { scene: sceneText });
      if (res.json && res.json.image) { setArt(res.json.image, true); story.art = { img: res.json.image }; }
      else if (res.text) {
        const clean = sanitizeArt(res.text);
        if (clean) { setArt(clean, false); story.art = { svg: clean }; }
      }
      save();
    } catch { /* a missing picture never blocks the story */ }
  }

  // Offline demo: same render path, canned scene, a short pause so the "writing…" state and
  // the picture pop-in behave exactly like the live version.
  function demoAdvance(nextId) {
    setBusy(true);
    stopSpeech();
    $("art").classList.add("loading");
    setTimeout(() => {
      demoAt = nextId || "s1";
      const d = DEMO_SCENES[demoAt];
      story.scene = { text: d.text, choices: d.choices.map((c) => ({ em: c.em, text: c.text, next: c.next })) };
      paintText(story.scene.text);
      paintChoices(story.scene.choices);
      setBusy(false);
      setArt(null);
      setTimeout(() => setArt(D_ART[d.art], false), 450);   // art lands a beat after the words
    }, 700);
  }

  async function advance(userContent) {
    if (DEMO) return demoAdvance(story && story.pendingNext);
    setBusy(true);
    stopSpeech();
    $("art").classList.add("loading");
    try {
      story.msgs.push({ role: "user", content: userContent });
      const res = await callStream("kidstory", story.msgs, {
        user: WHO, storyId: story.id, storyTitle: story.title,
        sceneIdx: story.msgs.filter((m) => m.role === "assistant").length,
        choice: story.lastChoice || "",
      });
      const raw = res.text || "";
      if (!raw.trim()) throw new Error("empty");
      story.msgs.push({ role: "assistant", content: raw });
      // Keep the sent history small — the last few turns are all this story needs.
      if (story.msgs.length > 14) story.msgs = story.msgs.slice(-14);
      const scene = parseScene(raw);
      story.scene = scene;
      story.art = null;
      paintText(scene.text);
      paintChoices(scene.choices);
      setBusy(false);
      setArt(null);
      save();
      fetchArt(scene.text);
      // never auto-read: the voice only ever starts when the child presses a button
    } catch (e) {
      setBusy(false);
      $("oops").style.display = "";
      $("pickWrap").style.display = story && story.scene && story.scene.choices.length ? "" : "none";
    }
  }

  function pickChoice(c) {
    if (busy) return;
    story.lastChoice = c.text;
    story.pendingNext = c.next || null;   // demo mode routes by id; live mode ignores it
    advance(c.em + " " + c.text);
  }

  function startStory(s) {
    primeSpeech();
    story = { id: "k" + Date.now().toString(36), title: s.nm, msgs: [], scene: null, art: null, lastChoice: "", pendingNext: DEMO ? "s1" : null };
    show("storyView");
    setArt(null);
    paintText("");
    advance(s.seed);
  }

  // ---------- save / resume ----------
  function save() {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(story)); } catch {}
  }
  function loadSaved() {
    try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); return (s && s.scene && Array.isArray(s.msgs)) ? s : null; } catch { return null; }
  }
  function resume(s) {
    story = s;
    show("storyView");
    paintText(s.scene.text);
    paintChoices(s.scene.choices || []);
    if (s.art && s.art.svg) setArt(s.art.svg, false);
    else if (s.art && s.art.img) setArt(s.art.img, true);
    else setArt(null);
  }

  // ---------- pick screen ----------
  function buildStarters() {
    const wrap = $("starters");
    wrap.innerHTML = "";
    const saved = DEMO ? null : loadSaved();   // demo runs don't save or resume
    if (saved) {
      const b = document.createElement("button");
      b.className = "starter"; b.type = "button";
      b.style.background = "#e9f3ff"; b.style.borderColor = "#a9c9ee";
      b.innerHTML = `<span class="em">📖</span><span class="nm"></span>`;
      b.querySelector(".nm").textContent = "Keep reading\n" + saved.title;
      b.querySelector(".nm").style.whiteSpace = "pre-line";
      b.onclick = () => { primeSpeech(); resume(saved); };
      wrap.appendChild(b);
    }
    for (const s of STARTERS) {
      const b = document.createElement("button");
      b.className = "starter"; b.type = "button";
      b.innerHTML = `<span class="em"></span><span class="nm"></span>`;
      b.querySelector(".em").textContent = s.em;
      b.querySelector(".nm").textContent = s.nm;
      b.onclick = () => startStory(s);
      wrap.appendChild(b);
    }
  }

  // ?art=1 — grown-up check: which picture engine is actually live on the server. The Gemini
  // path falls back to a drawing silently, so this is the only way to tell "configured" from
  // "quietly falling back". Costs nothing and generates nothing.
  if (new URLSearchParams(location.search).get("art") === "1" && !DEMO) {
    const bar = document.createElement("div");
    bar.style.cssText = "margin:0 0 14px;padding:12px 16px;border-radius:16px;font-size:16px;font-weight:800;background:#e9f3ff;border:2px solid #a9c9ee";
    bar.textContent = "Checking pictures…";
    $("pickView").insertBefore(bar, $("starters"));
    fetch(API, { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ secret: FAMILY_PASSWORD, mode: "kidart_status" }) })
      .then((r) => r.json())
      .then((s) => {
        if (s.live === "gemini") { bar.textContent = "🎨 Pictures: real generated images (" + s.model + ")"; bar.style.background = "#e6f6ea"; bar.style.borderColor = "#9ed3ae"; }
        else if (s.provider === "gemini" && !s.hasGeminiKey) { bar.textContent = "⚠️ Set to generated images, but GEMINI_API_KEY is missing — falling back to drawings."; bar.style.background = "#fdf0e3"; bar.style.borderColor = "#e8bf88"; }
        else bar.textContent = "✏️ Pictures: drawings (set KID_ART_PROVIDER=gemini for generated images)";
      })
      .catch(() => { bar.textContent = "Couldn't reach the picture service."; });
  }

  $("greet").textContent = WHO ? `Hi ${WHO}!` : "Story Time";
  if (DEMO) document.querySelector(".sub").textContent =
    "Demo — works with no internet. Any story card starts the same sample story.";
  $("backBtn").onclick = () => { buildStarters(); show("pickView"); };
  $("homeBtn").onclick = () => { location.href = "index.html"; };
  $("retryBtn").onclick = () => {
    $("oops").style.display = "none";
    if (!story || !story.msgs.length) return;
    const last = story.msgs[story.msgs.length - 1];
    if (last && last.role === "user") { story.msgs.pop(); advance(last.content); }
  };
  buildStarters();
  show("pickView");

  // test hook
  window.__KIDSTORY__ = {
    STARTERS, parseScene, sanitizeArt,
    get story(){ return story; },
    start: (i) => startStory(STARTERS[i || 0]),
    pick: (i) => { const b = document.querySelectorAll(".choice")[i || 0]; if (b) b.click(); },
    who: WHO, speak: speakScene, stop: stopSpeech,
    get words(){ return wordEls.length; },
  };
})();
</script>
</body>
</html>

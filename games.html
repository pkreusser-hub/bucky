<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#233357" />
<title>BUCKY — Games</title>
<link rel="icon" href="bucky.png" />
<link rel="apple-touch-icon" href="bucky.png" />
<style>
  :root {
    --bg: #eef2fa;
    --card: #ffffff;
    --ink: #15233f;
    --muted: #5d6b86;
    --green: #233357;     /* Old Glory navy — primary */
    --green-d: #18233b;
    --red: #ba303e;       /* Old Glory red — accent */
    --line: #d7e0f0;
    --shadow: 0 1px 3px rgba(35,51,87,.10), 0 6px 16px rgba(35,51,87,.06);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: calc(env(safe-area-inset-bottom) + 78px);   /* clears the fixed bottom nav */
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--green);
    color: #fff;
    padding: calc(env(safe-area-inset-top) + 16px) 16px 14px;
    position: sticky; top: 0; z-index: 20;
    box-shadow: var(--shadow);
  }
  #bar { display: flex; align-items: center; gap: 10px; }
  #bar a {
    color: #fff; text-decoration: none; font-weight: 800; font-size: 15px;
    background: rgba(255,255,255,.16); padding: 7px 12px; border-radius: 9px; flex: 0 0 auto;
  }
  #bar .t { font-size: 18px; font-weight: 800; letter-spacing: .2px; }
  /* candy stripe retired with the 2026-07 app-shell redesign (index.html dropped it too) */
  .stripes { display: none; }
  main { max-width: 760px; margin: 0 auto; padding: 12px; }
  .progress { font-size: 13px; color: var(--muted); margin: 14px 2px 12px; }
  ul.list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  li.dash-grid { background: transparent; border: 0; box-shadow: none; padding: 6px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .dash-tile {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow);
    padding: 18px 12px; cursor: pointer; display: flex; flex-direction: column; gap: 5px; align-items: center;
    text-align: center; text-decoration: none;
  }
  .dash-tile:active { background: var(--done, #e7eefb); }
  .dash-ico { font-size: 30px; line-height: 1; }
  .dash-name { font-weight: 800; font-size: 15px; color: var(--ink); }
  .dash-desc { font-size: 12px; color: var(--muted); }

  /* Live lobby banner cards (bucky-lobby shim) */
  #lobbyBanners { display: flex; flex-direction: column; gap: 10px; margin: 0 0 14px; }
  .lobby-card {
    display: flex; align-items: center; gap: 10px; background: var(--card);
    border: 1px solid var(--line); border-left: 5px solid var(--red); border-radius: 14px;
    box-shadow: var(--shadow); padding: 12px 14px; text-decoration: none; color: var(--ink);
  }
  .lobby-card.static { border-left-color: var(--green); cursor: default; }
  .lobby-ico { font-size: 24px; flex: 0 0 auto; }
  .lobby-text { flex: 1; min-width: 0; font-size: 14px; font-weight: 700; }
  .lobby-join { flex: 0 0 auto; background: var(--red); color: #fff; font-weight: 800; font-size: 13px; padding: 7px 12px; border-radius: 9px; }
</style>
</head>
<body>

<header>
  <div id="bar">
    <a href="index.html">← Bucky</a>
    <span class="t">🎮 Games</span>
  </div>
  <div class="stripes"></div>
</header>

<!-- Persistent BUCKY bottom nav — mirrors index.html's 5-area bar (Old Glory palette) -->
<style>
  #buckyNav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
    display: flex; gap: 2px;
    background: rgba(255,255,255,.9);
    -webkit-backdrop-filter: saturate(1.3) blur(14px); backdrop-filter: saturate(1.3) blur(14px);
    border-top: 1px solid #d7e0f0;
    padding: 6px 8px calc(env(safe-area-inset-bottom) + 6px);
    box-shadow: 0 -2px 16px rgba(35,51,87,.08);
  }
  #buckyNav a {
    flex: 1 1 0; min-width: 0; text-decoration: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 7px 0 5px; border-radius: 13px; color: #5d6b86;
    transition: color .15s ease, background .15s ease, transform .1s ease;
  }
  #buckyNav a .bico { font-size: 22px; line-height: 1; filter: grayscale(.4) opacity(.75); transition: filter .15s ease, transform .12s ease; }
  #buckyNav a .blabel { font-size: 11px; font-weight: 700; letter-spacing: .2px; }
  #buckyNav a:active { transform: scale(.93); }
  #buckyNav a.active { color: #233357; background: #e7eefb; }
  #buckyNav a.active .bico { filter: none; transform: translateY(-1px) scale(1.08); }
  @media (min-width: 700px) { #buckyNav { justify-content: center; gap: 6px; } #buckyNav a { flex: 0 1 132px; } }
</style>
<nav id="buckyNav" aria-label="BUCKY sections"></nav>
<script>
(function () {
  // 7 areas matching index.html's bottom bar (NAV_GROUPS). Both farmgpt + games live
  // under "Play", so Play is the active tab on both pages. Bank is family-only —
  // same BANK_USERS gate as index.html (keep the two lists in sync).
  var BANK_USERS = ["Eleanor", "Isaac", "Dad", "Mom"];
  var me = localStorage.getItem("choreUser") || "";
  var NAV = [
    ["🏠","index.html#dashboard","Home"],
    ["✅","index.html#chores","Chores"],
    ["🛠️","index.html#workorders","Jobs"],
    ["🛒","index.html#shopping","Shop"],
    ["💰","index.html#farmbank","Bank"],
    ["🐐","index.html#goathooves","Farm"],
    ["🎮","games.html","Play"]
  ].filter(function (n) { return n[2] !== "Bank" || BANK_USERS.indexOf(me) >= 0; });
  var here = "games.html", el = document.getElementById("buckyNav");
  NAV.forEach(function (n) {
    var a = document.createElement("a"); a.href = n[1];
    var ico = document.createElement("span"); ico.className = "bico"; ico.textContent = n[0];
    var lbl = document.createElement("span"); lbl.className = "blabel"; lbl.textContent = n[2];
    a.append(ico, lbl); a.title = n[2]; a.setAttribute("aria-label", n[2]);
    if (n[1] === here) a.className = "active";
    el.appendChild(a);
  });
})();
</script>

<main>
  <div id="lobbyBanners"></div>
  <div class="progress">Pick a game!</div>
  <ul class="list">
    <li class="dash-grid" id="gamesGrid"></li>
  </ul>
</main>

<script>
  // Every game the family can play. Add a tile here to add it to the games hub.
  const GAMES = [
    { ico:"🐐", name:"Bucky Jump",     desc:"Jump the fences",              url:"index.html#game" },
    { ico:"🐱", name:"Cat Rescue",     desc:"Save the barn cats",           url:"index.html#catgame" },
    { ico:"🚜", name:"Hay Haul",       desc:"Snake, but tractor & hay",     url:"hayhaul.html" },
    { ico:"🪵", name:"Branch Manager", desc:"Tetris, but with branches",    url:"branchmanager.html" },
    { ico:"🎃", name:"Hayhem",         desc:"farmyard artillery mayhem",    url:"hayhem.html" },
    { ico:"🌽", name:"Pasture Panic",  desc:"3D survive-the-stampede",      url:"pasturepanic.html" },
    { ico:"🐐", name:"Baby Bucky",     desc:"raise & care for a baby goat", url:"goatcare.html" },
    { ico:"🍅", name:"Barnyard Bistro", desc:"cook together — 2-chef co-op", url:"barnyardbistro.html" },
    { ico:"🏁", name:"Farm Kart",      desc:"kart racing on the farm",       url:"farmkart.html" },
    { ico:"🌱", name:"Farm Life",      desc:"one family farm, always growing", url:"farmlife/dist/" }
  ];
  const grid = document.getElementById("gamesGrid");
  for (const g of GAMES){
    const a = document.createElement("a");
    a.className = "dash-tile";
    a.href = g.url;
    const ico = document.createElement("div"); ico.className = "dash-ico"; ico.textContent = g.ico;
    const nm = document.createElement("div"); nm.className = "dash-name"; nm.textContent = g.name;
    const ds = document.createElement("div"); ds.className = "dash-desc"; ds.textContent = g.desc;
    a.append(ico, nm, ds);
    grid.appendChild(a);
  }
</script>

<script type="module">
  // bucky-lobby shim — live lobby banner cards for open/started game lobbies.
  // Duplicated (intentionally) in index.html; this repo has no shared JS module,
  // so keep this copy tiny and in sync with the other one.
  const firebaseConfig = {
    apiKey: "AIzaSyAA1hn-j9_pPuXoaHIzcyyXYJN6EhUccJU",
    authDomain: "amen-farms-app.firebaseapp.com",
    projectId: "amen-farms-app",
    storageBucket: "amen-farms-app.firebasestorage.app",
    messagingSenderId: "321230755979",
    appId: "1:321230755979:web:d362c56aaf7e50b4ab5c8e"
  };
  const FAMILY_PASSWORD = "amenfarms";
  function roomId(pw){
    let h = 0;
    for (const ch of pw.toLowerCase()) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
    return "fam" + h.toString(36);
  }
  // ?fam= override: dev/test hook so automated verification can watch a scratch family
  // collection instead of production (memory: test familyKey for automated writes).
  const familyKey = (new URLSearchParams(location.search).get("fam")) || roomId(FAMILY_PASSWORD);

  const OPEN_LIVE_MS = 45 * 1000;      // "open" lobby heartbeat is every 15s now — 45s window = 3 missed beats before we call it stale
  const STARTED_LIVE_MS = 90 * 1000;   // "started" (mid-game) cards keep the old, more forgiving window
  const STALE_MS = 3 * 60 * 1000;      // lazy-delete docs older than this (dropped from 10min — stale cards were sticking around too long)

  // Per-game card text (2026-07-09: Farm Kart family lobby port). Bistro keeps its original
  // kitchen/chef wording; unknown future games get a neutral generic fallback so a new game
  // doesn't need a games.html change just to appear here.
  const LOBBY_TEXT = {
    barnyardbistro: {
      open: (d) => `${d.hostName || "Someone"}'s kitchen is open! · ${d.playerCount || 1}/${d.maxPlayers || 2} chefs`,
      started: (d) => `🍳 ${d.hostName || "Someone"} is cooking with ${d.playerCount || 1} chefs`
    },
    farmkart: {
      open: (d) => `🏁 ${d.hostName || "Someone"}'s race is forming! · ${d.playerCount || 1}/${d.maxPlayers || 4} racers`,
      started: (d) => `🏁 ${d.hostName || "Someone"}'s race is mid-race!`
    },
    farmlife: {
      open: (d) => `🌱 ${d.hostName || "Someone"} is on the farm! · ${d.playerCount || 1} farming`,
      started: (d) => `🌱 ${d.hostName || "Someone"} is on the farm! · ${d.playerCount || 1} farming`,
      // Farm Life lives at /farmlife/dist/ and derives its room from the family
      // key — no #r= room hash. bistro/farmkart omit `href` and keep the
      // default `<game>.html#r=<roomCode>` join link below.
      href: () => `farmlife/dist/`
    }
  };
  function lobbyText(data, cooking){
    const t = LOBBY_TEXT[data.game];
    if (t) return cooking ? t.started(data) : t.open(data);
    return cooking
      ? `${data.hostName || "Someone"} is hosting ${data.gameName || data.game}!`
      : `${data.hostName || "Someone"} is hosting ${data.gameName || data.game}! · ${data.playerCount || 1}/${data.maxPlayers || 2}`;
  }
  // Per-game JOIN href. A game may supply `LOBBY_TEXT[game].href(data)`; every
  // other game (bistro/farmkart/unknown) falls back to the original
  // `<game>.html#r=<roomCode>` scheme, so this change touches only farmlife.
  function lobbyHref(data){
    const t = LOBBY_TEXT[data.game];
    if (t && typeof t.href === "function") return t.href(data);
    return `${data.game}.html#r=${encodeURIComponent(data.roomCode || "")}`;
  }

  function renderLobbies(docs, fs, col){
    const wrap = document.getElementById("lobbyBanners");
    if (!wrap) return;
    wrap.innerHTML = "";
    const now = Date.now();
    // Defensive dedupe: if multiple docs share the same hostName+game (e.g. a host reconnected
    // and a new doc got created before the old one aged out), only render the freshest one per
    // (hostName, game) pair. The stale-delete sweep above will clean up the rest over time.
    const freshestByKey = new Map();
    for (const d of docs){
      const data = d.data();
      const key = (data.hostName || "") + "|" + (data.game || "");
      const prev = freshestByKey.get(key);
      if (!prev || (data.updatedAt || 0) > (prev.data.updatedAt || 0)) freshestByKey.set(key, { doc: d, data });
    }

    for (const d of docs){
      const data = d.data();
      const age = now - (data.updatedAt || 0);
      if (age >= STALE_MS){ fs.deleteDoc(fs.doc(col, d.id)).catch(()=>{}); continue; }
      const key = (data.hostName || "") + "|" + (data.game || "");
      const freshest = freshestByKey.get(key);
      if (freshest && freshest.doc.id !== d.id) continue;   // superseded by a fresher doc for the same host+game

      const live = data.status === "open" && age < OPEN_LIVE_MS;
      const cooking = data.status === "started" && age < STARTED_LIVE_MS;
      if (!live && !cooking) continue;

      if (live){
        const a = document.createElement("a");
        a.className = "lobby-card";
        a.href = lobbyHref(data);
        const ico = document.createElement("span"); ico.className = "lobby-ico"; ico.textContent = data.ico || "🎮";
        const text = document.createElement("span"); text.className = "lobby-text";
        text.textContent = lobbyText(data, false);
        const join = document.createElement("span"); join.className = "lobby-join"; join.textContent = "JOIN";
        a.append(ico, text, join);
        wrap.appendChild(a);
      } else if (cooking){
        const card = document.createElement("div");
        card.className = "lobby-card static";
        const ico = document.createElement("span"); ico.className = "lobby-ico"; ico.textContent = data.ico || "🎮";
        const text = document.createElement("span"); text.className = "lobby-text";
        text.textContent = lobbyText(data, true);
        card.append(ico, text);
        wrap.appendChild(card);
      }
    }
  }

  async function initLobbies(){
    try {
      const appMod = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const fs = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app = appMod.initializeApp(firebaseConfig, "bucky-lobby");
      const db = fs.getFirestore(app);
      const col = fs.collection(db, "lobbies_" + familyKey);
      fs.onSnapshot(col, (snap) => renderLobbies(snap.docs, fs, col), () => { /* offline/error: page stays static, like today */ });
    } catch (e) {
      // Firebase unreachable/blocked: fail silently, page renders as a plain static page.
    }
  }
  initLobbies();
</script>
</body>
</html>

    // ================== dirt blotches ==================
    function updateDirtVisual(){
      const dirtiness = clamp(state.dirtLevel, 0, 100);
      const showLevel = state.needs.clean < 50 ? clamp((50 - state.needs.clean) / 50, 0, 1) : 0;
      const blotches = goat.userData.dirtBlotches;
      for (let i = 0; i < blotches.length; i++){
        const b = blotches[i];
        // stagger which blotches appear based on dirtiness
        const appear = clamp(showLevel * blotches.length - i, 0, 1);
        b.mesh.material.opacity = appear * 0.75;
        b.mesh.scale.set(b.baseScale * appear, 0.4 * appear, b.baseScale * appear);
      }
    }

    // ================== tools / interaction ==================
    let currentTool = "pet";
    const toolButtons = Array.from(document.querySelectorAll(".toolBtn"));
    toolButtons.forEach(btn => {
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        currentTool = btn.dataset.tool;
        toolButtons.forEach(b => b.classList.toggle("active", b === btn));
        onToolSwitch();
      });
    });
    function onToolSwitch(){
      if (bottleMesh) bottleMesh.visible = false;
      if (brushMesh) brushMesh.visible = false;
      if (hayHeldMesh) hayHeldMesh.visible = false;
      isPetting = false; isBrushing = false; holdingBottle = false; holdingHay = false;
    }

    // held prop meshes
    const bottleMesh = (() => {
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.18, 10), new THREE.MeshPhongMaterial({ color:0xffffff, transparent:true, opacity:0.9 }));
      body.position.y = 0.09;
      g.add(body);
      const neckM = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.03, 0.06, 8), mat(0xe8e8e8));
      neckM.position.y = 0.21;
      g.add(neckM);
      const teat = new THREE.Mesh(new THREE.ConeGeometry(0.018, 0.05, 8), mat(0xd8a878));
      teat.position.y = 0.26;
      g.add(teat);
      const milk = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.055, 0.13, 10), mat(0xfffdf0));
      milk.position.y = 0.07;
      g.add(milk);
      g.visible = false;
      scene.add(g);
      return g;
    })();
    const brushMesh = (() => {
      const g = new THREE.Group();
      const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.16, 8), mat(0x8a5a34));
      handle.rotation.z = Math.PI/2.2;
      g.add(handle);
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 0.06), mat(0x3a3a3a, true));
      head.position.set(0.09, 0.035, 0);
      g.add(head);
      g.visible = false;
      scene.add(g);
      return g;
    })();
    // held hay clump: follows the pointer while the hay tool is dragged, like the bottle
    // and brush props above, so the player can see where a drop will land BEFORE releasing
    const hayHeldMesh = (() => {
      const g = new THREE.Group();
      for (let i = 0; i < 5; i++){
        const wisp = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.16, 0.02), mat(0xe0c257, true));
        wisp.position.set((Math.random()-0.5)*0.1, 0.08, (Math.random()-0.5)*0.1);
        wisp.rotation.set((Math.random()-0.5)*0.5, Math.random()*Math.PI, (Math.random()-0.5)*0.5);
        g.add(wisp);
      }
      g.visible = false;
      scene.add(g);
      return g;
    })();

    let isPetting = false, isBrushing = false, holdingBottle = false, holdingHay = false;
    let lastPetPos = null, petStrokeAccum = 0;
    let hayInTrough = false;
    let ballObj = null;

    const raycaster = new THREE.Raycaster();
    const pointerNDC = new THREE.Vector2();
    const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
    const stagePt = new THREE.Vector3();

    function pointerToNDC(e){
      const r = renderer.domElement.getBoundingClientRect();
      pointerNDC.x = ((e.clientX - r.left) / r.width) * 2 - 1;
      pointerNDC.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    }
    function raycastGoat(e){
      pointerToNDC(e);
      raycaster.setFromCamera(pointerNDC, camera);
      const hits = raycaster.intersectObject(goat, true);
      return hits.length > 0 ? hits[0] : null;
    }
    const _lastGroundPt = new THREE.Vector3(0, 0, -0.3);   // fallback: goat's spawn point
    function raycastGround(e){
      pointerToNDC(e);
      raycaster.setFromCamera(pointerNDC, camera);
      const pt = new THREE.Vector3();
      const hit = raycaster.ray.intersectPlane(groundPlane, pt);
      // a cursor/finger above the horizon (common when dragging a held prop near the top
      // of the screen) makes the ray miss the ground plane entirely; three.js leaves `pt`
      // untouched in that case, which silently reused whatever a fresh Vector3 defaults to
      // (world origin) — teleporting the held prop there instead of just not moving it
      if (!hit) return _lastGroundPt.clone();
      _lastGroundPt.copy(pt);
      return pt;
    }
    // Issue #2 ("the scrub brush only seems to work some of the time"): the original hit
    // test compared a GROUND-PLANE point (y=0) against dirt blotches sitting ~0.4-0.6 up
    // on the goat's body. Any first fix that still measures "did the pointer ray reach
    // near the goat" via the GROUND plane inherits the same failure mode: a ray aimed at
    // the goat's head/back (well above ground) continues past the visible body and hits
    // the ground plane meters further away (verified: aiming at the head from the game's
    // eye-level 3/4 camera lands the ground intersection ~2.8 units past the goat's root,
    // vs the goat's own ~0.3 unit body radius) — so a ground-distance test alone still
    // misses most of the goat's visible silhouette. Test against a SPHERE centered on the
    // goat's mid-body height instead (closest point on the pointer ray to that sphere's
    // center, per the task's explicit "ray-to-goat-bounding-sphere" suggestion) — this is
    // camera-angle-agnostic: aiming anywhere at the goat's visible body, head, or rear
    // all correctly report a hit regardless of how far past it the ground plane sits.
    const GOAT_SPHERE_RADIUS = 0.45;
    const _sphereCenter = new THREE.Vector3(), _rayToCenter = new THREE.Vector3(), _closest = new THREE.Vector3();
    function rayHitsGoatSphere(e){
      pointerToNDC(e);
      raycaster.setFromCamera(pointerNDC, camera);
      _sphereCenter.set(GOAT.pos.x, 0.35, GOAT.pos.z);   // mid-body height, world space
      const ray = raycaster.ray;
      // closest point on the ray to the sphere center: project (center-origin) onto the
      // ray direction (already normalized by three.js), clamped to t>=0 (in front of camera)
      _rayToCenter.copy(_sphereCenter).sub(ray.origin);
      const t = Math.max(0, _rayToCenter.dot(ray.direction));
      _closest.copy(ray.direction).multiplyScalar(t).add(ray.origin);
      const dist = _closest.distanceTo(_sphereCenter);
      return dist <= GOAT_SPHERE_RADIUS;
    }

    function speechBubble(text){
      const el = document.getElementById("speech");
      el.textContent = text;
      const headPos = new THREE.Vector3();
      goat.userData.head.getWorldPosition(headPos);
      headPos.y += 0.25;
      const proj = headPos.clone().project(camera);
      const r = renderer.domElement.getBoundingClientRect();
      const x = (proj.x * 0.5 + 0.5) * r.width;
      const y = (-proj.y * 0.5 + 0.5) * r.height;
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.style.opacity = "1";
      el.style.transform = "translate(-50%,-100%) scale(1)";
      clearTimeout(speechBubble._t);
      speechBubble._t = setTimeout(() => { el.style.opacity = "0"; }, 1400);
    }

    // ---- pointer interaction ----
    let pointerDown = false;
    renderer.domElement.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      pointerDown = true;
      const hit = raycastGoat(e);
      if (currentTool === "pet"){
        if (hit){
          isPetting = true; lastPetPos = e; petStrokeAccum = 0;
          GOAT.forcedUntil = Date.now() + 600;
          GOAT.lookTarget = hit.point.clone();
        } else {
          // tap elsewhere with pet tool but hitting goat via quick tap check below
        }
        if (hit) { /* petting begins */ }
        else {
          // simple tap-to-look if they tap near but miss; ignore
        }
      } else if (currentTool === "bottle"){
        // position at the cursor's ground point IMMEDIATELY (not just on the next
        // pointermove) — otherwise the bottle briefly sits at its stale last-used spot
        // (default: world origin, near the goat's spawn point), which could let the
        // feeding state machine see it as already "arrived" for a frame before the
        // player has dragged it anywhere.
        const pt0 = raycastGround(e);
        bottleMesh.position.set(pt0.x, 0.5, pt0.z);
        bottleMesh.visible = true;
        holdingBottle = true;
        GOAT.forcedUntil = Date.now() + 30000;
      } else if (currentTool === "hay"){
        // pick up a hay clump at the cursor's ground point immediately (same
        // stale-position fix as bottle/brush above), then drag/tap to place it
        const pt0 = raycastGround(e);
        hayHeldMesh.position.set(pt0.x, 0, pt0.z);
        hayHeldMesh.visible = true;
        holdingHay = true;
      } else if (currentTool === "brush"){
        // same stale-position bug the bottle branch above already documents/fixes: set
        // the brush mesh AND run the hit test immediately on pointerdown, not just on the
        // next pointermove — otherwise a plain tap-without-drag (no move event ever fires)
        // never scrubs at all, which is part of why brushing felt unreliable.
        const pt0 = raycastGround(e);
        brushMesh.position.set(pt0.x, 0.45, pt0.z);
        brushMesh.visible = true;
        isBrushing = true;
        GOAT.forcedUntil = Date.now() + 600;
        scrubDirt(e, pt0);
      } else if (currentTool === "ball"){
        tossBall();
      }
      if (hit && currentTool !== "hay" && currentTool !== "ball"){
        // acknowledge a tap on the goat regardless of tool -> look + baa, but only if not actively stroking
      }
    });
    renderer.domElement.addEventListener("pointermove", (e) => {
      if (currentTool === "bottle" && holdingBottle){
        const pt = raycastGround(e);
        // position bottle near where pointer projects, floating at goat mouth height
        bottleMesh.position.set(pt.x, 0.5, pt.z);
      } else if (currentTool === "brush" && isBrushing){
        const pt = raycastGround(e);
        brushMesh.position.set(pt.x, 0.45, pt.z);
        scrubDirt(e, pt);
      } else if (currentTool === "hay" && holdingHay){
        const pt = raycastGround(e);
        hayHeldMesh.position.set(pt.x, 0.12 + Math.sin(Date.now()/180)*0.02, pt.z);
      } else if (currentTool === "pet" && isPetting && pointerDown){
        const hit = raycastGoat(e);
        if (hit){
          GOAT.lookTarget = hit.point.clone();   // head tracks the petting hand/finger
          if (lastPetPos){
            const dx = e.clientX - lastPetPos.clientX, dy = e.clientY - lastPetPos.clientY;
            petStrokeAccum += Math.hypot(dx, dy);
            if (petStrokeAccum > 26){
              petStrokeAccum = 0;
              const p = hit.point.clone(); p.y += 0.1;
              heartBurst(p, 1);
              state.needs.play = clamp(state.needs.play + 0.6, 0, 100);
              saveState();
            }
          }
        }
        lastPetPos = e;
        GOAT.leaning = clamp(GOAT.leaning + 0.05, 0, 1);
      }
    });
    function endPointer(e){
      pointerDown = false;
      if (isPetting){
        isPetting = false;
        GOAT.forcedUntil = Date.now() + 200;
        GOAT.lookTarget = null;
      }
      if (isBrushing){
        isBrushing = false;
      }
      if (holdingBottle){
        holdingBottle = false;
        bottleMesh.visible = false;
        GOAT.forcedUntil = 0;
        GOAT.lookTarget = null;
        if (GOAT._bottleFull){
          GOAT._bottleFull = false;
          setGoatState("jump");   // happy hop celebration once a full bottle-feeding wraps up
        }
      }
      if (holdingHay){
        holdingHay = false;
        hayHeldMesh.visible = false;
        dropHayAt(hayHeldMesh.position.clone());
      }
    }
    window.addEventListener("pointerup", endPointer);
    window.addEventListener("pointercancel", endPointer);

    // simple tap detection (goat look + baa) — separate lightweight listener, ignores drags
    let tapStart = null;
    renderer.domElement.addEventListener("pointerdown", (e) => { tapStart = { x:e.clientX, y:e.clientY, t:Date.now() }; });
    renderer.domElement.addEventListener("pointerup", (e) => {
      if (!tapStart) return;
      const dx = e.clientX - tapStart.x, dy = e.clientY - tapStart.y;
      const dt = Date.now() - tapStart.t;
      tapStart = null;
      if (Math.hypot(dx,dy) < 8 && dt < 350){
        const hit = raycastGoat(e);
        if (hit) speechBubble("Baaa!");
      }
    });

    // Issue #3: hay must land IN the trough. Footprint = the trough's own rim box
    // (0.9 x 0.4 in its local XZ) plus a small margin, tested in the trough's own rotated
    // frame (troughGroup.rotation.y = 0.5) so a drop anywhere near the visible box hits,
    // not just a raw world-axis-aligned approximation.
    const TROUGH_HALF_X = 0.9/2, TROUGH_HALF_Z = 0.4/2, TROUGH_MARGIN = 0.22;
    const _troughLocal = new THREE.Vector3();
    function isPointInTrough(pt){
      _troughLocal.copy(pt).sub(troughGroup.position);
      const ry = -troughGroup.rotation.y;
      const cos = Math.cos(ry), sin = Math.sin(ry);
      const lx = _troughLocal.x * cos - _troughLocal.z * sin;
      const lz = _troughLocal.x * sin + _troughLocal.z * cos;
      return Math.abs(lx) <= TROUGH_HALF_X + TROUGH_MARGIN && Math.abs(lz) <= TROUGH_HALF_Z + TROUGH_MARGIN;
    }

    function fillTrough(){
      hayInTrough = true;
      troughGroup.userData.hayMesh.visible = true;
      GOAT.forcedUntil = Date.now() + 6000;
      GOAT.eatTarget = "trough";
    }
    // a drop outside the trough: the held hay clump tumbles to the ground and fades,
    // no stat effect, just a gentle nudge toward the trough
    function missHay(pt){
      for (let i = 0; i < 5; i++){
        spawnParticle("puff", pt.clone().setY(0.15), {
          vel: new THREE.Vector3((Math.random()-0.5)*0.8, 0.5+Math.random()*0.4, (Math.random()-0.5)*0.8),
          maxLife: 0.7 + Math.random()*0.3, grav: -1.0, scale: 0.9 + Math.random()*0.5
        });
      }
      speechBubbleAt(pt, "Put the hay in the trough! 🌾");
    }
    // like speechBubble() but anchored to an arbitrary world point instead of the goat's
    // head (the hint should appear where the player actually dropped the hay)
    function speechBubbleAt(worldPos, text){
      const el = document.getElementById("speech");
      el.textContent = text;
      const proj = worldPos.clone().add(new THREE.Vector3(0,0.3,0)).project(camera);
      const r = renderer.domElement.getBoundingClientRect();
      const x = (proj.x * 0.5 + 0.5) * r.width;
      const y = (-proj.y * 0.5 + 0.5) * r.height;
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.style.opacity = "1";
      el.style.transform = "translate(-50%,-100%) scale(1)";
      clearTimeout(speechBubble._t);
      speechBubble._t = setTimeout(() => { el.style.opacity = "0"; }, 1600);
    }
    function dropHayAt(pt){
      if (isPointInTrough(pt)) fillTrough();
      else missHay(pt);
    }

    // Root cause of "brush only works some of the time": scrubDirt() compared a
    // GROUND-PLANE point (pt, always y=0 — see raycastGround) against each blotch's
    // WORLD position, which sits ~0.4-0.6 up on the goat's body. A straight 3D
    // distanceTo() burns nearly the whole 0.5 threshold on that vertical gap alone,
    // leaving almost no horizontal slack — so brushing only registered when the
    // pointer's ground projection happened to land almost exactly under the goat's
    // belly. A first attempt at fixing this (flat XZ distance from the ground point to
    // GOAT.pos) turned out to share the same flaw: aiming at the goat's HEAD/back from
    // the game's real eye-level 3/4 camera sends the ground-plane ray several units past
    // the goat's actual body (measured ~2.8 units past root for a head-aimed ray) before
    // it reaches y=0, so a ground-based distance test still misses most strokes. Fixed
    // per the task's explicit suggestion: test the pointer RAY itself against a bounding
    // sphere centered on the goat's mid-body (rayHitsGoatSphere, see its own comment) —
    // this is correct regardless of where on the (elevated) goat body the player aims,
    // since it never routes through the ground plane at all. Blotch opacity gating is
    // ALSO not part of the hit test — brushing a clean goat (or one whose blotches
    // haven't faded in yet) still registers as a successful stroke, it just has nothing
    // left to visibly scrub.
    function scrubDirt(e, pt){
      if (!rayHitsGoatSphere(e)) return false;
      const blotches = goat.userData.dirtBlotches;
      let scrubbed = false;
      for (const b of blotches){
        if (b.mesh.material.opacity <= 0.02) continue;
        scrubbed = true;
        b.mesh.material.opacity = Math.max(0, b.mesh.material.opacity - 0.06);
      }
      if (scrubbed){
        bubblePop(pt.clone().setY(0.4));
        state.needs.clean = clamp(state.needs.clean + 0.5, 0, 100);
        if (Math.random() < 0.15) sparkleBurst(pt.clone().setY(0.4), 4);
        saveState();
        if (state.needs.clean >= 90 && !GOAT._justShook){
          GOAT._justShook = true;
          setGoatState("shake");
          sparkleBurst(GOAT.pos.clone().setY(0.5), 14);
          setTimeout(()=>{ GOAT._justShook = false; }, 8000);
        }
      }
    }

    // ---- ball physics ----
    function tossBall(){
      if (ballObj){ scene.remove(ballObj.mesh); ballObj.mesh.geometry.dispose(); ballObj.mesh.material.dispose(); ballObj = null; }
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.12, 10, 8), mat(0xe85050, true));
      const start = camera.position.clone(); start.y = 0.6;
      mesh.position.copy(start);
      scene.add(mesh);
      ballObj = {
        mesh,
        vel: new THREE.Vector3(-start.x*0.35, 2.6, -3.4),
        idleT: 0,
        lastBounce: 0
      };
    }
    function updateBall(dt){
      if (!ballObj) return;
      ballObj.vel.y += -6 * dt;
      ballObj.mesh.position.addScaledVector(ballObj.vel, dt);
      const p = ballObj.mesh.position;
      if (p.y < 0.12){
        p.y = 0.12;
        ballObj.vel.y = Math.abs(ballObj.vel.y) * 0.55;
        ballObj.vel.x *= 0.75; ballObj.vel.z *= 0.75;
        if (Math.abs(ballObj.vel.y) < 0.3) ballObj.vel.y = 0;
      }
      const halfW = STALL_W/2 - 0.15, halfD = STALL_D/2 - 0.15;
      if (p.x < -halfW){ p.x = -halfW; ballObj.vel.x *= -0.6; }
      if (p.x > halfW){ p.x = halfW; ballObj.vel.x *= -0.6; }
      if (p.z < -halfD){ p.z = -halfD; ballObj.vel.z *= -0.6; }
      if (p.z > halfD){ p.z = halfD; ballObj.vel.z *= -0.6; }
      const speed = ballObj.vel.length();
      if (speed < 0.15) ballObj.idleT += dt; else ballObj.idleT = 0;
      if (ballObj.idleT > 20){
        scene.remove(ballObj.mesh); ballObj.mesh.geometry.dispose(); ballObj.mesh.material.dispose();
        ballObj = null;
      }
    }
    function headbuttBall(){
      if (!ballObj) return;
      const dx = ballObj.mesh.position.x - GOAT.pos.x, dz = ballObj.mesh.position.z - GOAT.pos.z;
      const dir = new THREE.Vector3(dx, 0, dz).normalize();
      ballObj.vel.x = dir.x * 2.6 + (Math.random()-0.5)*0.6;
      ballObj.vel.z = dir.z * 2.6 + (Math.random()-0.5)*0.6;
      ballObj.vel.y = 1.4;
      state.needs.play = clamp(state.needs.play + 4, 0, 100);
      saveState();
      if (Math.random() < 0.5) setGoatState("pronk");
      sparkleBurst(ballObj.mesh.position.clone(), 4);
    }

    // ================== main animation / behavior tick ==================
    let lastFrame = null;

    function updateBehavior(dt, now){
      const mood = moodValue();
      const night = isNight();
      GOAT.stateT += dt;

      // blinking
      goat.userData.head // noop to keep reference warm
      GOAT.blinkTimer -= dt;
      if (GOAT.blinking > 0){
        GOAT.blinking -= dt / 0.12;
        setBlink(Math.max(0, Math.sin(Math.min(1, GOAT.stateT) * Math.PI)));
      }
      if (GOAT.blinkTimer <= 0 && GOAT.state !== "sleep" && GOAT.state !== "lie"){
        GOAT.blinkTimer = 3 + Math.random()*3;
        GOAT.blinkPhase = 0;
        GOAT._blinking = true;
        GOAT._blinkT = 0;
      }
      if (GOAT._blinking){
        GOAT._blinkT += dt;
        const b = Math.sin(Math.min(1, GOAT._blinkT/0.22) * Math.PI);
        setBlink(b);
        if (GOAT._blinkT >= 0.22){ GOAT._blinking = false; setBlink(0); }
      } else if (GOAT.state !== "lie" && !isPetting){
        setBlink(0);
      }

      // ear twitch idle detail
      GOAT.earTwitchTimer -= dt;
      if (GOAT.earTwitchTimer <= 0){
        GOAT.earTwitchTimer = 4 + Math.random()*4;
        GOAT._earFlick = 0.3;
      }
      if (GOAT._earFlick > 0){ GOAT._earFlick -= dt; JOINT.earL = Math.sin(GOAT._earFlick*20)*0.15; }
      else JOINT.earL = 0;

      const sad = mood < 30;
      const veryHappy = mood > 75;

      // decide behavior transitions when not forced by a tool
      const forced = now < GOAT.forcedUntil;
      if (!forced){
        if (holdingBottle || isPetting || isBrushing) { /* handled elsewhere */ }
        else if (night && GOAT.state !== "eat" && GOAT.state !== "shake"){
          if (GOAT.state !== "lie") setGoatState("lie");
        } else if (ballObj && new THREE.Vector3(ballObj.mesh.position.x-GOAT.pos.x,0,ballObj.mesh.position.z-GOAT.pos.z).length() < 2.6){
          setGoatState("walk");
          GOAT.target = ballObj.mesh.position.clone().setY(0);
        } else if (hayInTrough && GOAT.eatTarget === "trough" && GOAT.pos.distanceTo(troughGroup.position) >= 0.6){
          // walk toward the trough only while still out of eating range — once within
          // 0.6 (the same threshold the eating block below checks), stop re-issuing a
          // walk target so state can actually leave "walk" and the eating block can run
          // (previously this re-armed "walk" every single frame forever, even standing
          // right at the trough, since nothing here ever checked arrival distance)
          setGoatState("walk");
          GOAT.target = troughGroup.position.clone();
        } else {
          GOAT.idleTimer -= dt;
          if (GOAT.state === "idle" && GOAT.idleTimer <= 0){
            GOAT.idleTimer = 5 + Math.random()*10;
            if (Math.random() < 0.25 && !sad){
              setGoatState("pronk");
            } else {
              GOAT.target = pickRoamTarget();
              setGoatState("walk");
            }
          } else if (GOAT.state === "walk" && GOAT.target){
            const d = GOAT.target.clone().sub(GOAT.pos); d.y = 0;
            if (d.length() < 0.08){
              setGoatState(sad ? "sadidle" : "idle");
              GOAT.target = null;
            }
          } else if (GOAT.state !== "walk" && GOAT.state !== "idle" && GOAT.state !== "sadidle"){
            // finished a one-off animation (pronk/jump/shake) -> back to idle
            if (GOAT.stateT > 1.0) setGoatState(sad ? "sadidle" : "idle");
          }
        }
      }

      // bottle feeding: goat WALKS TO the bottle and STOPS to drink — no more feeding
      // on the move. Sub-state machine (GOAT.feedState): "walking" while pathing to a
      // stop point ~0.8 units from the bottle (facing it); "arrived" once within that
      // stop distance AND stationary, which is the ONLY state that fills the food stat.
      // If the bottle drifts >0.6 units from where we last planted feet, feeding pauses
      // and the goat re-paths to the new spot, resuming on arrival — same stat effects
      // as before, only the physical behavior (walk-then-stand vs. feed-while-approaching)
      // changed, per the user's explicit ask.
      const FEED_STOP_DIST = 0.8, FEED_RESUME_DIST = 0.6;
      if (holdingBottle){
        const bp = bottleMesh.position.clone().setY(0);
        GOAT.lookTarget = bottleMesh.position;   // head tracks the bottle while approaching/feeding
        if (!GOAT.feedState || GOAT.feedAnchor == null){
          GOAT.feedState = "walking";
          GOAT.feedAnchor = bp.clone();
        }
        // bottle moved away from the spot we last arrived/pathed to -> pause + re-path
        if (GOAT.feedAnchor.distanceTo(bp) > FEED_RESUME_DIST){
          GOAT.feedState = "walking";
          GOAT.feedAnchor = bp.clone();
        }
        if (GOAT.feedState === "walking"){
          // stop point: FEED_STOP_DIST short of the bottle, along the line from the
          // goat's current position to it, so the goat approaches and faces the bottle
          const toBottle = bp.clone().sub(GOAT.pos); toBottle.y = 0;
          const fullDist = toBottle.length();
          let stopPoint;
          if (fullDist > FEED_STOP_DIST){
            stopPoint = GOAT.pos.clone().addScaledVector(toBottle.clone().normalize(), fullDist - FEED_STOP_DIST);
          } else {
            stopPoint = GOAT.pos.clone();   // already closer than the stop distance
          }
          if (fullDist <= FEED_STOP_DIST + 0.05){
            // arrived: plant feet, face the bottle exactly, start the feeding pose
            GOAT.feedState = "arrived";
            GOAT.target = null;
            setGoatState("eat");
            GOAT.jawTimer = 0;
          } else {
            setGoatState("walk");
            GOAT.target = stopPoint;
          }
        }
        if (GOAT.feedState === "arrived"){
          // re-check distance every frame (bottle may drift a little without crossing
          // the FEED_RESUME_DIST re-path threshold) — only feed while truly within reach
          const dist = GOAT.pos.distanceTo(bp);
          if (dist > FEED_STOP_DIST + 0.15){
            GOAT.feedState = "walking";
          } else {
            setGoatState("eat");
            // face the bottle precisely while stationary
            const toBottle = bp.clone().sub(GOAT.pos); toBottle.y = 0;
            if (toBottle.lengthSq() > 0.0001){
              const targetFacing = Math.atan2(toBottle.x, toBottle.z);
              let da = targetFacing - GOAT.facing;
              da = Math.atan2(Math.sin(da), Math.cos(da));
              GOAT.facing += da * Math.min(1, dt*6);
            }
            // pitch down toward the bottle nipple height — positive neckX/headX is the
            // "look down" direction on this rig (matches sadidle's droopy-head pose);
            // the pre-fix negative values flipped the head backward through the pivot
            JOINT.neckX = 0.16; JOINT.headX = 0.12;
            GOAT.jawTimer = (GOAT.jawTimer||0) + dt;
            JOINT.jawX = Math.sin(GOAT.jawTimer*15.7) * 0.06;   // ~2.5Hz suckle bob (15.7 rad/s = 2.5Hz * 2π)
            JOINT.tailWag += dt*10;   // happy faster wag while feeding
            const wasFull = state.needs.food >= 100;
            state.needs.food = clamp(state.needs.food + dt * 9, 0, 100);
            if (!wasFull && state.needs.food >= 100){
              GOAT._bottleFull = true;   // happy hop celebration the instant the bottle tops off the stat
            }
            const headWorld = new THREE.Vector3(); goat.userData.head.getWorldPosition(headWorld);
            if (Math.floor(GOAT.jawTimer*3) !== Math.floor((GOAT.jawTimer-dt)*3)){
              bubblePop(headWorld.clone());
            }
            saveState();
          }
        }
      } else if (GOAT.feedState){
        // bottle removed -> return to normal wandering
        GOAT.feedState = null;
        GOAT.feedAnchor = null;
      }

      // eating hay in trough
      if (GOAT.eatTarget === "trough" && GOAT.state !== "walk"){
        const troughPos = troughGroup.position;
        if (GOAT.pos.distanceTo(troughPos) < 0.6){
          setGoatState("eat");
          JOINT.neckX = 0.3; JOINT.headX = 0.45;   // head down into the trough (see bottle-feed fix above)
          GOAT.jawTimer = (GOAT.jawTimer||0) + dt;
          JOINT.jawX = Math.sin(GOAT.jawTimer*8) * 0.08;
          GOAT._eatFeedT = (GOAT._eatFeedT||0) + dt;
          if (GOAT._eatFeedT > 3){
            state.needs.food = clamp(state.needs.food + 25, 0, 100);
            saveState();
            GOAT.eatTarget = null;
            hayInTrough = false;
            troughGroup.userData.hayMesh.visible = false;
            GOAT._eatFeedT = 0;
            setGoatState("jump");   // happy hop celebration on a completed meal
          }
        }
      }

      // pet interaction shaping
      if (isPetting){
        setGoatState("happy");
        GOAT.leaning = clamp(GOAT.leaning + dt*2, 0, 1);
        setBlink(0.9);
      } else {
        GOAT.leaning = clamp(GOAT.leaning - dt*2, 0, 1);
      }
      if (isBrushing){
        setGoatState("happy");
      }

      // headbutt trigger when close to ball while walking toward it and state settles
      if (ballObj){
        const flatDist = new THREE.Vector3(ballObj.mesh.position.x-GOAT.pos.x,0,ballObj.mesh.position.z-GOAT.pos.z).length();
        if (flatDist < 0.32 && (now - (GOAT._lastHeadbutt||0)) > 900){
          GOAT._lastHeadbutt = now;
          headbuttBall();
        }
      }

      // movement toward target
      if (GOAT.state === "walk" && GOAT.target){
        const d = GOAT.target.clone().sub(GOAT.pos); d.y = 0;
        const dist = d.length();
        if (dist > 0.02){
          d.normalize();
          const targetFacing = Math.atan2(d.x, d.z);
          let da = targetFacing - GOAT.facing;
          da = Math.atan2(Math.sin(da), Math.cos(da));
          GOAT.facing += da * Math.min(1, dt*6);
          const spd = GOAT.speed * (1 - Math.min(0.5, mood < 40 ? 0.3 : 0));
          GOAT.pos.addScaledVector(d, spd * dt);
          GOAT.walkPhase += dt * 7 * spd;
          // issue #1c: swing amplitude trimmed ~20% (0.55->0.44, knee 0.7->0.56 to match)
          // so the leg's extreme-swing angle no longer outpaces what the overlap band +
          // hip cover can visually cover — motion charm over amplitude, per the fix plan.
          const swing = 0.44;
          JOINT.hipFL = Math.sin(GOAT.walkPhase) * swing;
          JOINT.hipBR = Math.sin(GOAT.walkPhase) * swing;
          JOINT.hipFR = Math.sin(GOAT.walkPhase+Math.PI) * swing;
          JOINT.hipBL = Math.sin(GOAT.walkPhase+Math.PI) * swing;
          JOINT.kneeFL = Math.max(0, Math.sin(GOAT.walkPhase - 0.6)) * 0.56;
          JOINT.kneeBR = Math.max(0, Math.sin(GOAT.walkPhase - 0.6)) * 0.56;
          JOINT.kneeFR = Math.max(0, Math.sin(GOAT.walkPhase+Math.PI - 0.6)) * 0.56;
          JOINT.kneeBL = Math.max(0, Math.sin(GOAT.walkPhase+Math.PI - 0.6)) * 0.56;
          JOINT.bodyY = 0.02 + Math.abs(Math.sin(GOAT.walkPhase*2)) * 0.015;
          // slight body roll (opposite the swinging fore/hind pair) — reads as a natural
          // gait sway and helps sell the walk even where the overlap band/cover run out
          JOINT.bodyTiltX = Math.sin(GOAT.walkPhase) * 0.035;
          JOINT.tailWag += dt*4;
          if (GOAT.feedState === "walking" && GOAT.lookTarget){
            applyHeadTracking(GOAT.lookTarget, dt);   // glance toward the bottle while trotting over
          } else {
            // slight head counter-bob against the body bob, opposite phase reads as
            // a natural trot instead of a rigid stiff-necked walk
            JOINT.neckX = -Math.sin(GOAT.walkPhase*2) * 0.05;
            JOINT.headX = 0;
          }
        }
      } else if (GOAT.state === "idle" || GOAT.state === "sadidle"){
        const t = now/1000;
        const weightShift = Math.sin(t*0.8) * 0.04;
        JOINT.hipFL = weightShift; JOINT.hipBR = -weightShift;
        JOINT.hipFR = -weightShift*0.6; JOINT.hipBL = weightShift*0.6;
        JOINT.kneeFL = JOINT.kneeFR = JOINT.kneeBL = JOINT.kneeBR = 0;
        JOINT.bodyY = 0.02 + Math.sin(t*1.3) * (GOAT.state === "sadidle" ? 0.003 : 0.008);
        JOINT.bodyTiltX = 0;   // don't inherit the walk gait's roll once stopped
        GOAT.lookTimer -= dt;
        if (GOAT.lookTimer <= 0){
          GOAT.lookTimer = 2 + Math.random()*3;
          GOAT.lookAngle = (Math.random()-0.5) * 0.8;
        }
        if (GOAT.state === "sadidle"){
          JOINT.neckX = 0.35; JOINT.headX = 0.2;
          JOINT.earL = 0.25; JOINT.earR = 0.25;
          JOINT.tailWag = 0;
        } else if (GOAT.lookTarget){
          applyHeadTracking(GOAT.lookTarget, dt);   // petting: look at the hand/finger
          JOINT.tailX = Math.sin(t*0.5)*0.1;
        } else {
          JOINT.neckY = GOAT.lookAngle * 0.6;
          JOINT.headX = 0;
          JOINT.tailX = Math.sin(t*0.5)*0.1;
        }
      } else if (GOAT.state === "pronk"){
        const p = Math.min(1, GOAT.stateT / 0.7);
        const bounce = Math.sin(p*Math.PI);
        JOINT.bodyY = 0.02 + bounce*0.18;
        const tuck = bounce*1.1;
        JOINT.hipFL = JOINT.hipFR = -tuck; JOINT.hipBL = JOINT.hipBR = tuck*0.8;
        JOINT.kneeFL = JOINT.kneeFR = tuck*1.3; JOINT.kneeBL = JOINT.kneeBR = tuck*1.1;
        JOINT.tailWag += dt*10;
        if (bounce > 0.85 && !GOAT._pronkLanded){ GOAT._pronkLanded = true; }
        if (p >= 1){
          GOAT._pronkLanded = false;
          strawPuff(GOAT.pos.clone().setY(0.05), 5);
        }
      } else if (GOAT.state === "jump"){
        const p = Math.min(1, GOAT.stateT / 0.6);
        let bounce;
        if (p < 0.3){ bounce = -0.06 * (p/0.3); } // crouch
        else if (p < 0.75){ const q=(p-0.3)/0.45; bounce = -0.06 + q*0.3; }
        else { const q=(p-0.75)/0.25; bounce = 0.24 * (1-q); }
        JOINT.bodyY = 0.02 + bounce;
        JOINT.hipFL = JOINT.hipFR = JOINT.hipBL = JOINT.hipBR = bounce > 0 ? -0.6 : 0.3;
        if (p >= 1 && GOAT.lastLanded === false){
          strawPuff(GOAT.pos.clone().setY(0.02), 6);
          GOAT.lastLanded = true;
        } else if (p < 1) GOAT.lastLanded = false;
      } else if (GOAT.state === "lie"){
        const p = Math.min(1, GOAT.stateT / 0.8);
        // The GLB rig's legs are single rigid segments (no true knee bend), so the
        // procedural rig's full recline (body sinks 0.28, legs rotate ~110st) — which
        // relies on hip+knee ROTATING A JOINTED leg out of the way — instead swings a
        // rigid limb through empty space and reads as broken (legs vanish into/through
        // the body and floor). Settle for a believable "tucked down" crouch instead: a
        // shallower sink and gentler fold that still clearly reads as resting.
        const sink = goat.userData.isGLB ? 0.12 : 0.28;
        const foldScale = goat.userData.isGLB ? 0.4 : 1;
        JOINT.bodyY = 0.02 - p*sink;
        JOINT.hipFL = JOINT.hipFR = -1.9*p*foldScale; JOINT.kneeFL = JOINT.kneeFR = 2.1*p*foldScale;
        JOINT.hipBL = JOINT.hipBR = 1.7*p*foldScale; JOINT.kneeBL = JOINT.kneeBR = -1.9*p*foldScale;
        JOINT.neckX = 0.2*p; JOINT.headX = 0.1*p;
        JOINT.earL = 0.2*p; JOINT.earR = 0.2*p;
        if (p >= 1){
          setBlink(1);
          goat.userData.zGroup.visible = true;
          const t = now/1000;
          goat.userData.zSprites.forEach((s, i) => {
            s.material.opacity = 0.85;
            s.position.set(0.15 + i*0.08, 0.55 + i*0.12 + Math.sin(t*0.8+i)*0.03, 0);
          });
        }
      } else if (GOAT.state === "eat"){
        JOINT.bodyY = 0.02;
        JOINT.hipFL = JOINT.hipFR = JOINT.hipBL = JOINT.hipBR = 0;
      } else if (GOAT.state === "happy"){
        const t = now/1000;
        JOINT.tailWag += dt*14;
        JOINT.earL = -0.3; JOINT.earR = -0.3;
        JOINT.bodyY = 0.02 + Math.max(0, Math.sin(t*6))*0.03 * GOAT.leaning;
        JOINT.neckX = -0.15 * GOAT.leaning;
        JOINT.headX = -0.1 * GOAT.leaning;
        JOINT.bodyTiltX = Math.sin(t*3) * 0.03 * GOAT.leaning;
      } else if (GOAT.state === "shake"){
        const p = Math.min(1, GOAT.stateT / 0.9);
        JOINT.bodyTiltX = Math.sin(p*Math.PI*6) * 0.35 * (1-p);
        JOINT.earL = Math.sin(p*Math.PI*6)*0.4;
        JOINT.earR = -Math.sin(p*Math.PI*6)*0.4;
        if (p >= 1) JOINT.bodyTiltX = 0;
      }

      // clear sleep Z's when not lying
      if (GOAT.state !== "lie"){
        goat.userData.zGroup.visible = false;
      }

      // if not lying/sleeping, hips settle toward 0 for idle-adjacent states handled above already

      // face direction
      goat.rotation.y = GOAT.facing;
      goat.position.set(GOAT.pos.x, 0, GOAT.pos.z);

      lerpJoints(dt);
      applyJointsToMesh();
      updateDirtVisual();

      // shadow follow (child of goat root already, stays local)
    }

    // ================== HUD update ==================
    const mFood = document.getElementById("mFood"), mClean = document.getElementById("mClean"), mPlay = document.getElementById("mPlay");
    const moodRow = document.getElementById("moodRow");
    const clockEl = document.getElementById("clock");

    function meterColor(v){
      if (v > 60) return "#4ecb5c";
      if (v > 30) return "#e0a92c";
      return "#e85050";
    }
    function updateHUD(){
      mFood.style.width = state.needs.food + "%"; mFood.style.background = meterColor(state.needs.food);
      mClean.style.width = state.needs.clean + "%"; mClean.style.background = meterColor(state.needs.clean);
      mPlay.style.width = state.needs.play + "%"; mPlay.style.background = meterColor(state.needs.play);
      const mood = moodValue();
      let label = "❤️ Happy";
      if (mood < 30) label = "💔 Sad";
      else if (mood < 60) label = "🧡 Okay";
      else if (mood > 85) label = "💕 Overjoyed";
      moodRow.textContent = label;
      hudAge.textContent = ageText();
      let h, m;
      if (photoHour != null){ h = photoHour; m = 0; }
      else { const d = new Date(); h = d.getHours(); m = d.getMinutes(); }
      clockEl.textContent = h + ":" + String(m).padStart(2,"0");
    }

    // ================== butterfly update ==================
    function updateButterfly(dt, now){
      if (!butterflyState.active){
        butterflyState.t -= dt;
        if (butterflyState.t <= 0 && !isNight()){
          butterflyState.active = true;
          butterfly.visible = true;
          const startX = -STALL_W/2 - 0.3;
          butterflyState.startTime = now;
        }
      } else {
        const t = (now - butterflyState.startTime) / 1000;
        const p = t / 9; // 9s flight
        if (p >= 1){
          butterflyState.active = false;
          butterfly.visible = false;
          butterflyState.next = 10 + Math.random()*20;
          butterflyState.t = butterflyState.next;
        } else {
          const x = -STALL_W/2 - 0.3 + p * (STALL_W + 0.6);
          const z = -0.5 + Math.sin(p*Math.PI*3) * 1.2;
          const y = 0.9 + Math.sin(p*Math.PI*5) * 0.25 + Math.sin(t*2)*0.05;
          butterfly.position.set(x, y, z);
          const flap = Math.sin(t*18);
          butterfly.userData.wL.rotation.y = Math.PI/2 + flap*0.9;
          butterfly.userData.wR.rotation.y = -Math.PI/2 - flap*0.9;
        }
      }
    }

    // ================== render loop ==================
    let lightT = dayBlend();
    function frame(ts){
      requestAnimationFrame(frame);
      if (lastFrame === null) lastFrame = ts;
      let dt = (ts - lastFrame) / 1000;
      if (dt > 0.1) dt = 0.1;
      lastFrame = ts;
      const now = Date.now();

      // periodic real-time decay re-check (in case tab was hidden and just resumed)
      applyElapsedDecay();

      lightT += ((dayBlend()) - lightT) * Math.min(1, dt*0.5);
      applyLighting(lightT);

      if (PHOTO) photoPoseTick();
      updateBehavior(dt, now);
      updateParticles(dt);
      updateBall(dt);
      updateButterfly(dt, now);
      updateHUD();

      // camera follows the kid — smoothed look-at with gentle parallax + idle sway
      // (disabled in photo mode unless cam=game, so fixed photo presets aren't fought each frame)
      if (!PHOTO || photoCam === "game"){
        camSwayT += dt;
        const camK = Math.min(1, dt * 2.2);
        camLook.x += (goat.position.x - camLook.x) * camK;
        camLook.z += (goat.position.z - camLook.z) * camK;
        camera.position.x = camBase.x + camLook.x * 0.45 + Math.sin(camSwayT*0.25) * 0.08;
        camera.position.y = camBase.y + Math.sin(camSwayT*0.18) * 0.03;
        camera.position.z = camBase.z + camLook.z * 0.18;
        camera.lookAt(camLook.x, 0.55, camLook.z);
      } else {
        applyPhotoCamera();
      }

      // held props follow their target position already set on pointermove; keep bottle upright
      if (bottleMesh.visible) bottleMesh.rotation.z = Math.sin(now/300)*0.05;

      renderer.render(scene, camera);

      // periodic save so lastSeen stays reasonably fresh even without interaction
      if (now - (frame._lastSave||0) > 15000){ frame._lastSave = now; saveState(); }
    }
    requestAnimationFrame(frame);

    // save on unload / visibility change (covers closing tab / backgrounding)
    window.addEventListener("beforeunload", saveState);
    document.addEventListener("visibilitychange", () => { if (document.hidden) saveState(); else applyElapsedDecay(); });

    // initial pick
    GOAT.target = pickRoamTarget();
    setGoatState("idle");

    // ================== photo mode: pose / camera / settle ==================
    // Everything below only runs when ?photo=1. It forces a pose and camera, lets
    // physics/lerps settle synchronously, then flags window.__photoReady so a
    // headless capture script knows the frame is safe to screenshot.
    let photoCam = "three4";
    const photoHeadWorld = new THREE.Vector3();
    function applyPhotoCamera(){
      // closeup looks at the goat's actual head position each frame (it moves with poses)
      goat.userData.head.getWorldPosition(photoHeadWorld);
      if (photoCam === "front"){
        camera.position.set(0, 0.7, 1.4);
        camera.lookAt(0, 0.45, -0.2);
      } else if (photoCam === "side"){
        camera.position.set(1.6, 0.7, -0.2);
        camera.lookAt(0, 0.45, -0.2);
      } else if (photoCam === "three4"){
        camera.position.set(1.25, 0.8, 1.0);
        camera.lookAt(0, 0.4, -0.2);
      } else if (photoCam === "closeup"){
        camera.position.set(0.6, 0.72, 0.65);
        camera.lookAt(photoHeadWorld);
      }
      // cam=game falls through to the normal follow-cam block in frame()
    }

    let photoPose = null;
    // Keeps looping poses alive under forcedUntil=Infinity, which otherwise blocks the
    // normal "animation finished -> idle" and "pick a new walk target" transitions.
    function photoPoseTick(){
      if (!photoPose) return;
      if (photoPose === "walk"){
        if (!GOAT.target || GOAT.pos.distanceTo(GOAT.target) < 0.08) GOAT.target = pickRoamTarget();
      } else if (photoPose === "pronk"){
        // setGoatState() no-ops when the state is already "pronk", so reset stateT
        // directly to replay the ~0.7s bounce cycle indefinitely
        if (GOAT.stateT > 0.7) GOAT.stateT = 0;
      } else if (photoPose === "stand"){
        for (const key in JOINT) JOINT[key] = 0; // hold a perfectly neutral stance every tick
      } else if (photoPose === "eat"){
        // the base "eat" state only zeroes hips; head-down munching normally comes from
        // the bottle/trough feeding code, so drive it directly here for a bare pose=eat shot
        JOINT.neckX = 0.16; JOINT.headX = 0.12;
        GOAT._photoJawT = (GOAT._photoJawT || 0) + (1/60);
        JOINT.jawX = Math.sin(GOAT._photoJawT * 8) * 0.08;
      }
    }

    if (PHOTO){
      const p = _photoParams;

      // ---- pose ----
      const pose = p.get("pose") || "stand";
      const poseState = { stand:"idle", lie:"lie", walk:"walk", pronk:"pronk", eat:"eat", happy:"happy" }[pose] || "idle";
      setGoatState(poseState);
      GOAT.forcedUntil = Infinity; // free-roam AI must never override a photo pose
      photoPose = pose;
      if (pose === "stand"){
        // zero every joint target so the goat holds a plain, neutral standing pose
        for (const key in JOINT) JOINT[key] = 0;
      } else if (pose === "walk"){
        GOAT.target = pickRoamTarget();
      }
      // pronk/happy are left animating live (their per-state code in updateBehavior
      // drives JOINT targets every frame based on GOAT.state and GOAT.stateT); walk
      // and pronk get re-armed each tick by photoPoseTick() so they loop indefinitely

      // ---- position / facing ----
      const rot = p.has("rot") ? parseFloat(p.get("rot")) : 0.9;
      const px = p.has("x") ? parseFloat(p.get("x")) : 0;
      const pz = p.has("z") ? parseFloat(p.get("z")) : -0.2;
      GOAT.facing = isNaN(rot) ? 0.9 : rot;
      GOAT.pos.set(isNaN(px) ? 0 : px, 0, isNaN(pz) ? -0.2 : pz);
      goat.rotation.y = GOAT.facing;
      goat.position.set(GOAT.pos.x, 0, GOAT.pos.z);

      // ---- camera preset ----
      photoCam = p.get("cam") || "three4";

      // ---- lighting: snap instantly, no 2s lerp ----
      lightT = dayBlend();
      applyLighting(lightT);

      // ---- settle: synchronously step the sim so lerped joints/camera land in place ----
      const settleSeconds = p.has("settle") ? parseFloat(p.get("settle")) : 1.5;
      const settleSteps = Math.max(0, Math.round((isNaN(settleSeconds) ? 1.5 : settleSeconds) * 60));
      const settleNow = Date.now();
      for (let i = 0; i < settleSteps; i++){
        photoPoseTick();
        updateBehavior(1/60, settleNow);
        updateParticles(1/60);
      }
      if (photoCam !== "game") applyPhotoCamera();

      window.__photoReady = true;
    }
  })();
  </script>
</body>

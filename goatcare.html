<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>BUCKY — Baby Bucky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0a3161; --red:#b31942; --shell1:#c34a37; --shell2:#8f2d21; --shell3:#6f1f15;
         --cream:#f4e7cf; --creamDk:#d9c7a6; --ink:#26301f; --lcd:#b9c8a2; --lcdOff:#a3b18c; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{ margin:0; height:100%; background:#101d10; color:#fff;
             font-family:-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #bar{ position:fixed; top:0; left:0; right:0; height:46px; display:flex; align-items:center; gap:10px;
        padding:0 12px; background:var(--navy); z-index:30; }
  #bar a{ color:#fff; text-decoration:none; font-weight:800; font-size:15px;
          background:rgba(255,255,255,.15); padding:7px 12px; border-radius:9px; }
  #bar .t{ font-weight:800; letter-spacing:.5px; font-size:14px; }

  /* ================= device shell ================= */
  #wrap{ position:fixed; top:46px; left:0; right:0; bottom:0; display:flex;
         align-items:center; justify-content:center;
         background:radial-gradient(ellipse at 50% 30%, #1b2e1a 0%, #101d10 70%); }
  #device{
    --dw: min(380px, 94vw, calc((100vh - 66px) * 0.68), calc((100dvh - 66px) * 0.68));
    width:var(--dw); font-size:calc(var(--dw) / 20);   /* 1em = 5% of device width */
    aspect-ratio: 10 / 14; position:relative;
    display:flex; flex-direction:column; align-items:center;
    padding:.9em .95em .7em;
    background:linear-gradient(155deg, var(--shell1) 0%, var(--shell2) 62%, var(--shell3) 100%);
    border-radius:2.6em 2.6em 3.2em 3.2em;
    box-shadow: inset 0 .14em .1em rgba(255,235,205,.35), inset 0 -0.2em .3em rgba(0,0,0,.35),
                inset .12em 0 .2em rgba(255,255,255,.08), 0 1.2em 2.4em rgba(0,0,0,.55);
    border:.18em solid #58170f;
  }
  #brand{ font-family:'Luckiest Guy','Arial Black',sans-serif; font-size:1.28em; letter-spacing:.14em;
          color:#63190f; text-shadow:0 .06em 0 rgba(255,232,200,.42), 0 -0.05em .05em rgba(0,0,0,.4);
          margin:.1em 0 .35em; }
  #muteBtn{ position:absolute; top:.8em; right:.9em; width:1.9em; height:1.9em; border-radius:50%;
            border:0; font-size:.9em; background:rgba(0,0,0,.25); color:#ffe9c9; cursor:pointer;
            box-shadow:inset 0 .1em .15em rgba(0,0,0,.4), 0 .06em 0 rgba(255,255,255,.15); z-index:3; }
  #muteBtn:active{ transform:scale(.92); }

  /* ================= LCD ================= */
  #bezel{ width:100%; aspect-ratio:3/2; position:relative; border-radius:.9em;
          background:#22261c; padding:.55em;
          box-shadow: inset 0 .15em .35em rgba(0,0,0,.85), 0 .07em 0 rgba(255,235,205,.25); }
  /* SNES ART PASS: full-color screen — the LCD green + pixel-grid overlay are gone; just a
     dark bezel-backed screen with crisp upscaled pixels and a hint of glass glare. */
  #screen{ position:relative; width:100%; height:100%; overflow:hidden; border-radius:.35em;
           background:#0c1014;
           box-shadow: inset 0 0 1.2em rgba(0,0,0,.55); }
  #lcd{ position:absolute; inset:0; width:100%; height:100%; display:block;
        image-rendering:pixelated; image-rendering:crisp-edges; }
  .glare{ position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(112deg, rgba(255,255,255,.12) 0%, rgba(255,255,255,.03) 26%, transparent 40%); }
  #dimmer{ position:absolute; inset:0; pointer-events:none; background:rgba(8,12,36,.28);
           opacity:0; transition:opacity .6s; }
  #flash{ position:absolute; inset:0; pointer-events:none; background:#f6ffe8; opacity:0; }
  #flash.go{ animation:flashA .55s ease-out; }
  @keyframes flashA{ 0%{opacity:.95} 100%{opacity:0} }

  /* SNES ART PASS: toast is now a dark chip so it reads over the colorful scene. */
  #toast{ position:absolute; left:50%; transform:translateX(-50%); bottom:3%; width:max-content;
          max-width:92%; text-align:center; pointer-events:none; padding:.18em .55em;
          border-radius:.4em; background:rgba(20,14,10,.75);
          font-family:'Courier New',monospace; font-weight:900; font-size:.78em; letter-spacing:.06em;
          color:#fff; opacity:0; transition:opacity .25s; }
  #toast.show{ opacity:1; }
  #banner{ position:absolute; left:4%; right:4%; top:26%; pointer-events:none; text-align:center;
           background:rgba(38,48,31,.92); border-radius:.4em; padding:.5em .3em .45em;
           opacity:0; transform:scale(.7); transition:opacity .25s, transform .25s; }
  #banner.show{ opacity:1; transform:scale(1); }
  #bnTitle{ font-family:'Luckiest Guy','Arial Black',sans-serif; font-size:1.05em; letter-spacing:.08em;
            color:#d8e6bb; }
  #bnSub{ font-family:'Courier New',monospace; font-weight:900; font-size:.66em; color:#a9bd85; margin-top:.15em; }

  /* ================= plate + buttons ================= */
  #plate{ margin:.5em 0 .45em; background:linear-gradient(180deg,var(--cream),var(--creamDk));
          color:#5c2c17; border-radius:.5em; padding:.28em .9em; font-weight:800; font-size:.78em;
          box-shadow: inset 0 -0.12em .12em rgba(0,0,0,.18), 0 .1em .2em rgba(0,0,0,.3);
          white-space:nowrap; max-width:100%; overflow:hidden; text-overflow:ellipsis; }
  #plate .age{ font-weight:700; opacity:.75; }

  #controls{ width:100%; flex:1; min-height:0; position:relative; }
  #btnRow{ display:grid; grid-template-columns:repeat(4,1fr); gap:.55em; width:100%; }
  .pbtn{ border:0; border-radius:.85em; padding:.5em .1em .45em; cursor:pointer;
         background:linear-gradient(180deg,#fdf3de,var(--cream) 45%,var(--creamDk));
         box-shadow:0 .28em 0 #8d6b45, 0 .45em .7em rgba(0,0,0,.4), inset 0 .1em 0 #fff;
         display:flex; flex-direction:column; align-items:center; gap:.12em;
         transition:transform .06s, box-shadow .06s; touch-action:manipulation; }
  .pbtn:active{ transform:translateY(.22em); box-shadow:0 .08em 0 #8d6b45, 0 .2em .4em rgba(0,0,0,.4), inset 0 .1em 0 #fff; }
  .pbtn .ico{ font-size:1.25em; line-height:1.1; }
  .pbtn .lbl{ font-size:.5em; font-weight:900; letter-spacing:.08em; color:#6b3a1d; }
  #bMed{ position:absolute; left:50%; transform:translateX(-50%); bottom:0; width:44%; display:none;
         background:linear-gradient(180deg,#eaf6da,#d2e8bb 45%,#b3cf97); animation:medPulse 1.1s infinite; }
  #bMed:active{ transform:translateX(-50%) translateY(.22em); }
  #bMed .lbl{ color:#3c5a20; }
  #bMed.show{ display:flex; }
  @keyframes medPulse{ 0%,100%{ filter:brightness(1);} 50%{ filter:brightness(1.12);} }


  #playRow{ display:none; grid-template-columns:1fr auto 1fr; gap:.55em; align-items:stretch; width:100%; }
  #playRow.show{ display:grid; }
  #playRow .arrow .ico{ font-size:1.6em; }
  #mgDots{ display:flex; align-items:center; gap:.3em; padding:0 .2em; }
  #mgDots span{ width:.55em; height:.55em; border-radius:50%; background:rgba(0,0,0,.35);
                box-shadow:inset 0 .06em .08em rgba(0,0,0,.5); }
  #mgDots span.hit{ background:#ffd23f; box-shadow:0 0 .35em rgba(255,210,63,.8); }
  #mgDots span.miss{ background:#7d8d68; }

  #speaker{ margin-top:.55em; width:38%; height:1.05em; border-radius:.5em; opacity:.85;
    background:radial-gradient(circle at 50% 50%, rgba(0,0,0,.5) 22%, transparent 25%);
    background-size:.42em .42em; background-position:center; }

  /* ================= overlays ================= */
  .overlay{ position:fixed; inset:0; top:46px; background:rgba(6,16,8,.82); z-index:20; display:none;
            align-items:center; justify-content:center; flex-direction:column; padding:0 20px; text-align:center; }
  .overlay.show{ display:flex; }
  .overlay h1{ font-size:26px; margin:0 0 10px; font-family:'Luckiest Guy','Arial Black',sans-serif;
               font-weight:400; letter-spacing:1px; text-shadow:0 3px 0 rgba(0,0,0,.35); color:#fff6da; }
  .overlay .desc{ font-size:14px; color:#d7ead2; max-width:340px; margin-bottom:14px; line-height:1.5; }
  .overlay input[type=text]{ font-size:16px; padding:10px 14px; border-radius:10px; border:0;
               width:min(260px,80vw); text-align:center; margin-bottom:12px; font-weight:700;
               user-select:text; -webkit-user-select:text; }
  .overlay button.big{ font-size:18px; font-family:'Luckiest Guy','Arial Black',sans-serif; color:#3a2800;
                    background:linear-gradient(180deg,#ffe27a,#ffc832 55%,#eda51e); border:0; border-radius:14px;
                    padding:13px 30px 10px; margin:6px 0; cursor:pointer; letter-spacing:1px;
                    box-shadow:0 5px 0 #a86f10, 0 8px 18px rgba(0,0,0,.45); transition:transform .08s; }
  .overlay button.big:active{ transform:translateY(3px); box-shadow:0 2px 0 #a86f10, 0 4px 10px rgba(0,0,0,.45); }
</style>
</head>
<body>
  <div id="bar"><a href="index.html">← BUCKY</a><span class="t">🐐 Baby Bucky</span></div>

  <div id="wrap">
    <div id="device">
      <button id="muteBtn" title="Sound on/off">🔊</button>
      <div id="brand">BABY BUCKY</div>
      <div id="bezel">
        <div id="screen">
          <canvas id="lcd" width="96" height="64"></canvas>
          <div class="glare"></div>
          <div id="dimmer"></div>
          <div id="flash"></div>
          <div id="banner"><div id="bnTitle"></div><div id="bnSub"></div></div>
          <div id="toast"></div>
        </div>
      </div>
      <div id="plate"><span id="plateName">…</span> <span class="age" id="plateAge"></span></div>
      <div id="controls">
        <div id="btnRow">
          <button class="pbtn" id="bFeed"><span class="ico" id="feedIco">🍼</span><span class="lbl">FEED</span></button>
          <button class="pbtn" id="bPlay"><span class="ico">🎾</span><span class="lbl">PLAY</span></button>
          <button class="pbtn" id="bClean"><span class="ico">🧹</span><span class="lbl">CLEAN</span></button>
          <button class="pbtn" id="bLights"><span class="ico">💤</span><span class="lbl">LIGHTS</span></button>
        </div>
        <div id="playRow">
          <button class="pbtn arrow" id="bLeft"><span class="ico">⬅️</span><span class="lbl">LEFT</span></button>
          <div id="mgDots"><span></span><span></span><span></span></div>
          <button class="pbtn arrow" id="bRight"><span class="ico">➡️</span><span class="lbl">RIGHT</span></button>
        </div>
        <button class="pbtn" id="bMed"><span class="ico">💊</span><span class="lbl">MEDICINE</span></button>
      </div>
      <div id="speaker"></div>
    </div>
  </div>

  <div id="nameOverlay" class="overlay">
    <h1>🐐 A New Kid!</h1>
    <div class="desc">A little goat egg just arrived at the barn.<br>What should we name the baby inside?</div>
    <input type="text" id="nameInput" maxlength="14" placeholder="Bucky Jr.">
    <button class="big" id="nameBtn">Adopt!</button>
  </div>

<script>
(() => {
  'use strict';
  // ======================================================================
  //  BABY BUCKY — LCD virtual pet.  All game time flows through now().
  // ======================================================================
  const MIN = 60e3, HOUR = 3600e3, DAY = 86400e3;

  // single source of game time — every timestamp in the game flows through here
  function now(){ return Date.now(); }

  // ---------------- tuning ----------------
  const STAGE_AT   = [0, 10*MIN, 2*DAY, 5*DAY, 9*DAY];     // egg, baby, kid, young, adult
  const STAGE_NAME = ['EGG', 'BABY', 'KID', 'YOUNG GOAT', 'ADULT'];
  const RATE = { hu:.5, ha:.4, cl:.2, en:.25 };            // meter loss per awake daytime hour
  const POOP_DIRT_RATE = .4;                               // extra clean loss /h per poop
  const SLEEP_MULT = .3, SLEEP_CLEAN_MULT = .5, NIGHT_MULT = .35;
  const ENERGY_REGEN = .5;                                 // per hour asleep
  const SICK_AFTER = 3*HOUR;                               // at zero hunger/clean this long -> sick
  const KIND_GAP = 30*MIN;                                 // gaps longer than this get kind catch-up
  const FEED_FILL = 1.6, FULL_AT = 3.5;
  const MAX_POOPS = 3;
  const POOP_SLOTS = [16, 70, 28];
  const isNight = h => (h >= 21 || h < 7);

  // ---------------- persistence ----------------
  const KEY = 'bb2State';
  let S = null;
  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k, v){ try{ localStorage.setItem(k, v); }catch(e){} }
  function save(){ if (!S) return; S.lastSeen = now(); lsSet(KEY, JSON.stringify(S)); }
  function newState(name){
    return { v:1, name, birthTs: now(), m:{ hu:2.5, ha:2.5, cl:4, en:4 },
             lastSeen: now(), poops:[], nextPoopAt: 0, sick:false, zeroSince:null,
             lights:true, mute:false, seenStage:0 };
  }
  function load(){
    const raw = lsGet(KEY);
    if (!raw) return false;
    try{ S = JSON.parse(raw); }catch(e){ return false; }
    if (!S || !S.birthTs || !S.m) { S = null; return false; }
    const elapsed = now() - S.lastSeen;
    if (elapsed > 0) applyElapsed(elapsed, true);           // kind offline catch-up
    S.zeroSince = null;
    if (!S.nextPoopAt || S.nextPoopAt < now()) S.nextPoopAt = now() + poopInterval();
    return true;
  }

  // ---------------- stage ----------------
  function stageIdx(){
    const age = now() - S.birthTs;
    let s = 0;
    for (let i = 0; i < STAGE_AT.length; i++) if (age >= STAGE_AT[i]) s = i;
    return s;
  }
  function ageText(){
    const age = now() - S.birthTs;
    if (stageIdx() === 0) return 'still an egg…';
    const d = Math.floor(age / DAY);
    if (d <= 0) return 'hatched today!';
    return d === 1 ? '1 day old' : d + ' days old';
  }

  // ---------------- decay / catch-up engine ----------------
  function poopInterval(){
    return (S.m.hu >= 2.5 ? (2 + Math.random()*2) : (4 + Math.random()*3)) * HOUR;
  }
  // Simulates `ms` of elapsed pet time ending at now(). kind=true -> offline
  // rules: damage floored at min(pre,1) per meter, at most 1 new poop, never
  // newly sick. kind=false -> live rules (uncapped, sick timers advance).
  function applyElapsed(ms, kind){
    if (!S || ms <= 0) return;
    const pre = { hu:S.m.hu, ha:S.m.ha, cl:S.m.cl, en:S.m.en, poops:S.poops.length };
    const endT = now();
    let simT = endT - ms;
    let steps = Math.ceil(ms / (15*MIN));
    if (steps > 5000) steps = 5000;                          // ~52 days is plenty
    const chunk = ms / steps;
    let newPoops = 0;
    for (let i = 0; i < steps; i++){
      simT += chunk;
      const hrs = chunk / HOUR;
      const night = isNight(new Date(simT).getHours());
      const asleep = !S.lights;
      const nMult = night ? NIGHT_MULT : 1;
      const sMult = asleep ? SLEEP_MULT : 1;
      const dirt = RATE.cl + POOP_DIRT_RATE * S.poops.length;
      S.m.hu = Math.max(0, S.m.hu - RATE.hu * nMult * sMult * hrs);
      S.m.ha = Math.max(0, S.m.ha - RATE.ha * nMult * sMult * hrs);
      S.m.cl = Math.max(0, S.m.cl - dirt * nMult * (asleep ? SLEEP_CLEAN_MULT : 1) * hrs);
      if (asleep) S.m.en = Math.min(4, S.m.en + ENERGY_REGEN * hrs);
      else        S.m.en = Math.max(0, S.m.en - RATE.en * nMult * hrs);
      // poop schedule (eggs don't poop)
      if (stageIdx() > 0 && S.nextPoopAt && simT >= S.nextPoopAt){
        if (S.poops.length < MAX_POOPS && (!kind || newPoops < 1)){
          S.poops.push(POOP_SLOTS[S.poops.length % POOP_SLOTS.length]);
          newPoops++;
        }
        S.nextPoopAt = simT + poopInterval();
      }
      // sick timers (live only)
      if (!kind){
        if (S.m.hu <= 0 || S.m.cl <= 0){
          if (S.zeroSince == null) S.zeroSince = simT;
          else if (!S.sick && simT - S.zeroSince >= SICK_AFTER){
            S.sick = true; sfx('sad'); toast(S.name + ' feels icky…');
          }
        } else S.zeroSince = null;
      }
    }
    if (kind){
      // kindness caps: never come back to worse than "pretty hungry + one poop + maybe sad"
      for (const k of ['hu','ha','cl','en']){
        const floor = Math.min(pre[k], k === 'en' ? 2.5 : 1);   // wakes up rested-ish
        if (S.m[k] < floor) S.m[k] = floor;
      }
      if (S.poops.length > pre.poops + 1) S.poops.length = pre.poops + 1;
      S.zeroSince = null;                                    // sick never *starts* while away
    }
  }

  // ---------------- audio (tiny square-wave chirps) ----------------
  let AC = null;
  function ac(){
    if (!AC){ try{ AC = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){} }
    if (AC && AC.state === 'suspended') AC.resume().catch(()=>{});
    return AC;
  }
  const MELODY = {
    press:   [[880,.05]],
    boop:    [[330,.09]],
    eat:     [[660,.06],[520,.06],[660,.06],[520,.06],[700,.07]],
    refuse:  [[392,.1],[311,.16]],
    sweep:   [[440,.05],[554,.05],[659,.05],[880,.08]],
    bath:    [[659,.06],[784,.06],[988,.09]],
    win:     [[523,.07],[659,.07],[784,.12]],
    lightsOff:[[523,.08],[392,.08],[262,.16]],
    lightsOn:[[262,.08],[392,.08],[523,.14]],
    med:     [[659,.06],[880,.06],[1047,.12]],
    fanfare: [[523,.09],[659,.09],[784,.09],[1047,.22]],
    hatch:   [[392,.07],[523,.07],[659,.07],[784,.09],[1047,.2]],
    sad:     [[294,.14],[262,.2]],
  };
  function sfx(name){
    if (!S ? false : S.mute) return;
    const ctx = ac(); if (!ctx) return;
    const seq = MELODY[name]; if (!seq) return;
    let t = ctx.currentTime + 0.01;
    for (const [f, d] of seq){
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'square'; o.frequency.value = f;
      g.gain.setValueAtTime(0.045, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + d);
      o.connect(g).connect(ctx.destination);
      o.start(t); o.stop(t + d + .02);
      t += d + .015;
    }
  }

  // ======================================================================
  //  SPRITES — palette-indexed pixel grids, all drawn in code.
  //  SNES ART PASS (user pivot): the monochrome LCD palette is gone — full
  //  16-bit-style color. Sprite GEOMETRY (builders, positions, 96×64 logical
  //  grid) is untouched; only palette semantics + a generated dark outline
  //  changed, plus a layered SMW-style background drawn in render().
  // ======================================================================
  const PAL = [ null,
    '#f8f0dc',  //  1 cream       — goat body, egg shell
    '#c9964e',  //  2 tan         — horns, hooves, hay, beard
    '#54381f',  //  3 dark brown  — closed eyes, fine lines
    '#e23d3d',  //  4 red         — hearts
    '#4a76e8',  //  5 blue        — zzz, rain, tears, bubbles
    '#241812',  //  6 near-black  — open eyes, nostril, crack lines
    '#f0a0b4',  //  7 pink        — nose, pill half
    '#3a2a1c',  //  8 warm outline— auto-outline around goat/egg
    '#ffd23f',  //  9 yellow      — sun, moon, sparkle, hay glints
    '#58c04a',  // 10 (a) green   — egg spots (Yoshi-style), sick spots
    '#8a5a2e',  // 11 (b) brown   — poop, broom handle, dirt specks
    '#ffffff',  // 12 (c) white   — clouds, bottle, pill half
    '#eaddbe',  // 13 (d) soft    — belly shade, muzzle
  ];
  const SKY_DAY_TOP = '#4a88f0', SKY_DAY_LOW = '#6fb0ff';
  const SKY_NGT_TOP = '#141c4a', SKY_NGT_LOW = '#243070';
  const SCREEN_OFF = '#0c1014';

  function makeGrid(w, h){
    const d = new Uint8Array(w*h);
    return {
      w, h, d,
      px(x, y, c){ x|=0; y|=0; if (x>=0 && y>=0 && x<w && y<h) d[y*w+x] = c; },
      rect(x, y, rw, rh, c){ for (let j=0;j<rh;j++) for (let i=0;i<rw;i++) this.px(x+i, y+j, c); },
    };
  }
  function fromRows(rows){
    const g = makeGrid(rows[0].length, rows.length);
    for (let y=0;y<rows.length;y++) for (let x=0;x<rows[y].length;x++){
      const ch = rows[y][x]; if (ch !== '.') g.d[y*g.w+x] = parseInt(ch, 36);   // a=10, b=11, c=12…
    }
    return g;
  }
  // SNES ART PASS: pads a sprite by 1px and traces a warm dark outline (index 8) into every
  // empty cell that touches a filled one — the classic 16-bit colored-outline look, generated
  // so none of the proportion-table geometry had to be redrawn.
  function outlined(g){
    const o = makeGrid(g.w + 2, g.h + 2);
    for (let y=0;y<g.h;y++) for (let x=0;x<g.w;x++){
      const c = g.d[y*g.w+x]; if (c) o.d[(y+1)*o.w + (x+1)] = c;
    }
    for (let y=0;y<o.h;y++) for (let x=0;x<o.w;x++){
      if (o.d[y*o.w+x]) continue;
      const filled = (xx, yy) => xx>=0 && yy>=0 && xx<o.w && yy<o.h &&
                                 o.d[yy*o.w+xx] && o.d[yy*o.w+xx] !== 8;
      if (filled(x-1,y) || filled(x+1,y) || filled(x,y-1) || filled(x,y+1)) o.d[y*o.w+x] = 8;
    }
    return o;
  }

  // stage proportions (1..4)
  const SP = [ null,
    { bw: 9, bh: 5, hw: 7, hh: 6, leg: 3, neck: 0, horn: 0, beard: 0 },
    { bw:11, bh: 5, hw: 6, hh: 5, leg: 4, neck: 1, horn: 1, beard: 0 },
    { bw:13, bh: 6, hw: 6, hh: 6, leg: 5, neck: 2, horn: 2, beard: 0 },
    { bw:15, bh: 7, hw: 7, hh: 6, leg: 5, neck: 3, horn: 3, beard: 2 },
  ];
  // poses: idle | eat | sleep | happy | sad | sleepy | sick | refuse
  function buildGoat(st, pose, f){
    const p = SP[st];
    const hornPad = Math.max(p.horn, 2) + 1;
    const W = p.bw + p.hw + 4;
    const gh = hornPad + Math.max(p.hh - 2 + p.neck, 1) + p.bh + p.leg + 1;
    const g = makeGrid(W, gh);
    const sleeping = (pose === 'sleep');
    const happy    = (pose === 'happy');
    const sad      = (pose === 'sad' || pose === 'sick' || pose === 'sleepy');
    const sick     = (pose === 'sick');
    const eat      = (pose === 'eat');
    const refuse   = (pose === 'refuse');

    const ground = gh - 1;
    let legLen = p.leg, bob = 0;
    if (pose === 'idle' && f % 2 === 1) legLen -= 1;
    if (happy){ bob = -(f % 2 === 0 ? 3 : 1); legLen -= 1; }

    let bodyY0, bodyX0 = 2;
    if (sleeping){ legLen = 0; bodyY0 = ground - p.bh; }
    else bodyY0 = ground - legLen - p.bh + 1;
    bodyY0 += bob;
    const bodyY1 = bodyY0 + p.bh - 1;
    const bodyX1 = bodyX0 + p.bw - 1;

    if (!sleeping){
      const fx1 = bodyX1 - 2, bx1 = bodyX0 + 1, spread = happy ? 1 : 0;
      for (let i=0;i<legLen;i++){
        g.px(bx1 - spread, bodyY1 + 1 + i, 1); g.px(bx1+1 - spread, bodyY1 + 1 + i, 1);
        g.px(fx1 + spread, bodyY1 + 1 + i, 1); g.px(fx1+1 + spread, bodyY1 + 1 + i, 1);
      }
      if (legLen > 0){
        g.px(bx1 - spread, bodyY1 + legLen, 2); g.px(bx1+1 - spread, bodyY1 + legLen, 2);
        g.px(fx1 + spread, bodyY1 + legLen, 2); g.px(fx1+1 + spread, bodyY1 + legLen, 2);
      }
    } else {
      g.px(bodyX0+2, ground, 2); g.px(bodyX0+3, ground, 2);
      g.px(bodyX1-3, ground, 2); g.px(bodyX1-2, ground, 2);
    }

    const bh2 = p.bh + (refuse ? 1 : 0);
    g.rect(bodyX0, bodyY0, p.bw, bh2, 1);
    g.px(bodyX0, bodyY0, 0); g.px(bodyX1, bodyY0, 0);
    g.px(bodyX0, bodyY0 + bh2 - 1, 0); g.px(bodyX1, bodyY0 + bh2 - 1, 0);
    g.rect(bodyX0+2, bodyY0 + bh2 - 1, p.bw - 4, 1, refuse ? 3 : 13);
    if (sick){ g.px(bodyX0+3, bodyY0+1, 10); g.px(bodyX0+6, bodyY0+2, 10); }   // green sick spots

    const tailUp = (f % 2 === 0) && !sad && !sleeping;
    const ty = tailUp ? bodyY0 - 1 : bodyY0 + 1;
    g.px(bodyX0 - 1, ty, 1); g.px(bodyX0 - 1, ty + 1, 1);

    let headX0 = bodyX1 - 2, headY1;
    if (sleeping)      headY1 = bodyY0 + 1;
    else if (eat){     headY1 = bodyY1 + Math.min(legLen, 2); headX0 = bodyX1 - 1; }
    else               headY1 = bodyY0 + 1 - p.neck + (sad ? 1 : 0) + (refuse ? -1 : 0);
    const headY0 = headY1 - p.hh + 1;
    const shake = (refuse && f % 2 === 1) ? -1 : 0;
    headX0 += shake;
    const headX1 = headX0 + p.hw - 1;
    if (!sleeping && !eat && headY1 < bodyY0 - 1)
      g.rect(headX0 + 1, headY1 + 1, Math.min(4, p.hw - 2), bodyY0 - headY1 - 1, 1);
    g.rect(headX0, headY0, p.hw, p.hh, 1);
    g.px(headX0, headY0, 0); g.px(headX1, headY0, 0);
    if (headY1 < bodyY0) g.px(headX0, headY1, 0);
    g.rect(headX1 - 2, headY1 - 1, 3, 2, 13);   // soft muzzle
    g.px(headX1, headY1, 0);
    g.px(headX1 - 1, headY1 - 1, 1);
    g.px(headX1, headY1 - 1, 7);                // pink nose tip
    if (eat && f % 2 === 0){ g.px(headX1 - 1, headY1, 6); g.px(headX1 - 2, headY1, 6); }
    if (happy){ g.px(headX1 - 1, headY1, 6); }
    if (sad){ g.px(headX1 - 2, headY1, 6); }

    const eyeX = headX1 - 3, eyeY = headY0 + 1;
    if (sleeping || refuse){ g.px(eyeX, eyeY + 1, 3); g.px(eyeX + 1, eyeY + 1, 3); }
    else if (happy){ g.px(eyeX, eyeY + 1, 6); g.px(eyeX + 1, eyeY, 6); }
    else if (pose === 'sleepy'){ g.px(eyeX, eyeY + 1, 6); }
    else if (sad){ g.px(eyeX, eyeY + 1, 6); g.px(eyeX - 1, eyeY + 3, 5); }
    else { g.px(eyeX, eyeY, 6); g.px(eyeX, eyeY + 1, 6); }

    const earDroop = sad ? 2 : (f % 2);
    const eY = headY0 + 1 + earDroop;
    g.px(headX0 - 1, eY, 1); g.px(headX0 - 2, eY, 1);
    g.px(headX0 - 1, eY + 1, 1); g.px(headX0 - 2, eY + 1, 1); g.px(headX0 - 3, eY + 1, 1);

    if (p.horn > 0){
      const hx = headX0 + 2;
      for (let i=1;i<=p.horn;i++){
        g.px(hx, headY0 - i, 2);
        if (p.horn >= 3 && i === p.horn) g.px(hx - 1, headY0 - i, 2);
      }
      if (p.horn >= 2) for (let i=1;i<=p.horn;i++){
        g.px(hx + 2, headY0 - i, 2);
        if (p.horn >= 3 && i === p.horn) g.px(hx + 3, headY0 - i, 2);
      }
    }
    if (p.beard > 0 && !eat)
      for (let i=1;i<=p.beard;i++) g.px(headX1 - 1, headY1 + i, 2);
    return g;
  }

  // SNES ART PASS: the egg is now a FILLED white egg with big green spots (a friendly Yoshi-egg
  // nod) instead of the old LCD outline ring — same footprint, wobble and crack timing.
  function buildEgg(pose, f){
    const g = makeGrid(13, 14);
    const cx = 6, wob = (pose === 'idle' && f % 2 === 1) ? 1 : 0;
    const rows = [2,3,4,5,5,6,6,6,6,6,5,4];
    for (let y=0;y<rows.length;y++){
      const r = rows[y], yy = y + 1, off = (y < 5 ? wob : 0);
      for (let x=-r;x<=r;x++) g.px(cx + x + off, yy, 12);
    }
    // big green spots
    g.rect(cx-3, 4, 2, 2, 10); g.rect(cx+2, 8, 2, 2, 10);
    g.rect(cx-1, 10, 2, 1, 10); g.px(cx+3, 3, 10); g.px(cx-4, 8, 10);
    if (pose === 'crack'){
      g.px(cx, 3, 6); g.px(cx+1, 4, 6); g.px(cx, 5, 6);
      if (f >= 1){ g.px(cx-1, 4, 6); g.px(cx-2, 5, 6); g.px(cx+2, 3, 6); }
      if (f >= 2){
        for (let x=cx-3;x<=cx+3;x++){ g.px(x, 1, 0); g.px(x, 2, 0); }
        for (let x=cx-3;x<=cx+3;x++) g.px(x, 3, (x % 2) ? 12 : 0);   // jagged open top
        g.px(cx-1, 5, 6); g.px(cx+1, 5, 6);
      }
    }
    return g;
  }

  const SPRITES = {
    poop:   fromRows(["..b..",".3b..",".33b.","bbbb."]),
    heart:  fromRows([".4.4.","44444","44444",".444.","..4.."]),
    moon:   fromRows(["..999",".99..","999..","999..",".99..","..999"]),
    sun:    fromRows(["9..9..9","..999..",".9...9.","99.9.99",".9...9.","..999..","9..9..9"]),
    cloud:  fromRows(["..cccccc..",".cccccccc.","cccccccccc",".cccccccc."]),
    bottle: fromRows([".22.",".77.","8cc8","8cc8","8cc8","8cc8","8888"]),
    hay:    fromRows(["..292..",".29292.","2929292","9292929"]),
    broom:  fromRows(["....bb","...bb.","..bb..",".22...","2222..","222..."]),
    pill:   fromRows([".88.","8cc8","8778",".88."]),
    bubble: fromRows([".55.","5..5","5..5",".55."]),
    icoFood:fromRows([".11.",".33.","1331","1331","1441","1111"]),
    icoHappy:fromRows(["11.11","11111","11111",".111.","..1.."]),
    icoClean:fromRows(["..1..",".111.","11.11",".111.","..1.."]),
    icoEnergy:fromRows(["...11","..11.",".1111","..11.",".11..","11..."]),
    zzz:    fromRows(["555",".5.","555"]),
  };

  // pose sprite cache — SNES ART PASS: cached POST-outline so the trace runs once per pose.
  const goatCache = {};
  function goatSprite(st, pose, f){
    const k = st + pose + (f % 2);
    return goatCache[k] || (goatCache[k] = outlined(buildGoat(st, pose, f % 2)));
  }

  // ======================================================================
  //  RENDERING
  // ======================================================================
  const cv = document.getElementById('lcd');
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const LW = 96, LH = 64, GROUND_Y = 58;

  function drawGrid(g, x0, y0){
    x0 = Math.round(x0); y0 = Math.round(y0);   // keep pixels crisp
    for (let y=0;y<g.h;y++) for (let x=0;x<g.w;x++){
      const c = g.d[y*g.w+x];
      if (c){ ctx.fillStyle = PAL[c]; ctx.fillRect(x0+x, y0+y, 1, 1); }
    }
  }
  // SNES ART PASS: horizontally mirrored draw (the goat sprite faces right; walking left flips it).
  function drawGridFlip(g, x0, y0){
    x0 = Math.round(x0); y0 = Math.round(y0);
    for (let y=0;y<g.h;y++) for (let x=0;x<g.w;x++){
      const c = g.d[y*g.w+x];
      if (c){ ctx.fillStyle = PAL[c]; ctx.fillRect(x0 + (g.w - 1 - x), y0+y, 1, 1); }
    }
  }
  // SNES ART PASS: single-color draw — used to tint the HUD meter icons white on the dark band.
  function drawGridTint(g, x0, y0, color){
    ctx.fillStyle = color;
    x0 = Math.round(x0); y0 = Math.round(y0);
    for (let y=0;y<g.h;y++) for (let x=0;x<g.w;x++){
      if (g.d[y*g.w+x]) ctx.fillRect(x0+x, y0+y, 1, 1);
    }
  }

  // meters row: 4 groups of icon + 4 pips — SNES ART PASS: white icons + a color per meter on a
  // translucent dark band so the HUD reads on top of the bright sky.
  const METER_X = [1, 25, 49, 73];
  const METER_ICO = ['icoFood','icoHappy','icoClean','icoEnergy'];
  const METER_KEY = ['hu','ha','cl','en'];
  const METER_COL = ['#ff9838', '#ff5a8a', '#48c8f8', '#ffd23f'];
  function drawMeters(blinkOn){
    ctx.fillStyle = 'rgba(20,14,10,.42)';
    ctx.fillRect(0, 0, LW, 10);
    for (let i=0;i<4;i++){
      drawGridTint(SPRITES[METER_ICO[i]], METER_X[i], 2, '#ffffff');
      const v = Math.round(S.m[METER_KEY[i]]);
      for (let p=0;p<4;p++){
        const px = METER_X[i] + 7 + p*4, py = 2;
        if (p < v && !(v <= 1 && !blinkOn)){
          ctx.fillStyle = METER_COL[i]; ctx.fillRect(px, py, 3, 5);
        } else {
          ctx.fillStyle = 'rgba(255,255,255,.34)';
          ctx.fillRect(px, py, 3, 1); ctx.fillRect(px, py+4, 3, 1);
          ctx.fillRect(px, py, 1, 5); ctx.fillRect(px+2, py, 1, 5);
        }
      }
    }
  }

  // SNES ART PASS: layered Super-Mario-World-style backdrop — flat two-band sky, drifting
  // clouds, rounded outlined hills on the horizon, a bright scalloped grass strip and warm
  // dirt below it. Day/night follows the LIGHTS toggle (night gets stars, slower clouds).
  const STARS = [[8,14],[22,20],[40,13],[61,17],[74,22],[89,15],[30,26],[55,25]];
  function drawHill(cx, r, fill, line){
    ctx.fillStyle = fill;
    for (let dy=0;dy<=r;dy++){
      const half = Math.round(Math.sqrt(r*r - dy*dy));
      ctx.fillRect(cx - half, GROUND_Y - 1 - dy, half*2 + 1, 1);
    }
    ctx.fillStyle = line;
    for (let a=0;a<=Math.PI;a+=Math.PI/(r*2)){
      ctx.fillRect(Math.round(cx + Math.cos(a)*r), Math.round(GROUND_Y - 1 - Math.sin(a)*r), 1, 1);
    }
  }
  function drawBackground(t){
    const day = S.lights || stageIdx() === 0;
    ctx.fillStyle = day ? SKY_DAY_TOP : SKY_NGT_TOP; ctx.fillRect(0, 0, LW, 26);
    ctx.fillStyle = day ? SKY_DAY_LOW : SKY_NGT_LOW; ctx.fillRect(0, 26, LW, GROUND_Y - 26);
    if (!day){
      ctx.fillStyle = '#e8ecff';
      for (const [sx, sy] of STARS) if ((Math.floor(t/700) + sx) % 5) ctx.fillRect(sx, sy, 1, 1);
    }
    drawGrid(day ? SPRITES.sun : SPRITES.moon, 84, 12);
    const cw = SPRITES.cloud.w, speed = day ? 2.0 : 0.9;
    drawGrid(SPRITES.cloud, ((t/1000 * speed) % (LW + cw + 24)) - cw - 6, 13);
    drawGrid(SPRITES.cloud, ((t/1000 * speed * 0.6 + 62) % (LW + cw + 30)) - cw - 12, 22);
    drawHill(14, 13, '#3da048', '#2e7a38');
    drawHill(78, 8, '#58c04a', '#3da048');
    ctx.fillStyle = '#46b448'; ctx.fillRect(0, GROUND_Y - 1, LW, 3);
    ctx.fillStyle = '#58c85a';
    for (let x=0;x<LW;x+=4) ctx.fillRect(x + (x % 8 ? 1 : 0), GROUND_Y - 2, 2, 1);
    ctx.fillStyle = '#a8703c'; ctx.fillRect(0, GROUND_Y + 2, LW, LH - GROUND_Y - 2);
    ctx.fillStyle = '#8a5a2e';
    ctx.fillRect(9, 61, 2, 1); ctx.fillRect(31, 62, 2, 1);
    ctx.fillRect(57, 61, 2, 1); ctx.fillRect(84, 62, 2, 1);
  }

  // ---------------- effects ----------------
  let fx = [];
  function spawnFx(kind, x, y, vx, vy, life){ fx.push({ kind, x, y, vx, vy, born: now(), life }); }
  function burstHearts(cx, cy, n){
    for (let i=0;i<n;i++) spawnFx('heart', cx + (Math.random()*16-8), cy - Math.random()*4,
      (Math.random()-.5)*3, -5 - Math.random()*4, 1400);
  }
  function confettiBurst(){
    for (let i=0;i<36;i++) spawnFx('confetti', Math.random()*LW, -2 - Math.random()*18,
      (Math.random()-.5)*4, 10 + Math.random()*14, 2600);
  }
  function drawFx(t){
    fx = fx.filter(p => t - p.born < p.life);
    for (const p of fx){
      const dt = (t - p.born) / 1000;
      const x = Math.round(p.x + p.vx * dt), y = Math.round(p.y + p.vy * dt);
      if (p.kind === 'heart')        drawGrid(SPRITES.heart, x - 2, y - 2);
      else if (p.kind === 'zzz')     drawGrid(SPRITES.zzz, x, y);
      else if (p.kind === 'bubble')  drawGrid(SPRITES.bubble, x, y);
      else if (p.kind === 'confetti'){ ctx.fillStyle = ['#e23d3d','#ffd23f','#58c04a','#4a76e8','#ff8fd0'][p.born % 5]; ctx.fillRect(x, y, 1, 1); }
      else if (p.kind === 'crumb'){  ctx.fillStyle = PAL[2]; ctx.fillRect(x, Math.round(y + 8*dt*dt), 1, 1); }
      else if (p.kind === 'rain'){   ctx.fillStyle = PAL[5]; ctx.fillRect(x, y, 1, 2); }
      else if (p.kind === 'sparkle'){
        ctx.fillStyle = Math.floor(t/160) % 2 ? '#ffd23f' : '#ffffff';
        ctx.fillRect(x, y, 1, 1); ctx.fillRect(x-1, y, 1, 1); ctx.fillRect(x+1, y, 1, 1);
        ctx.fillRect(x, y-1, 1, 1); ctx.fillRect(x, y+1, 1, 1);
      }
    }
  }

  // ======================================================================
  //  GAME FLOW
  // ======================================================================
  let act = null;              // {type:'eat'|'refuse'|'sweep'|'bath'|'med'|'hatch', t0, dur}
  let mg = null;               // minigame {round, correct, phase, dir, guess, t0}
  let celebQ = [];             // queued {kind:'hatch'|'grow', stage}
  let bannerUntil = 0, lastFxAt = 0, lastPose = 'idle';
  let bootT0 = 0;              // power-on animation start (0 = not started)

  const el = id => document.getElementById(id);
  const toastEl = el('toast');
  let toastTimer = 0;
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1700);
  }
  function flash(){ const f = el('flash'); f.classList.remove('go'); void f.offsetWidth; f.classList.add('go'); }
  function banner(title, sub, ms){
    el('bnTitle').textContent = title; el('bnSub').textContent = sub;
    el('banner').classList.add('show');
    bannerUntil = now() + ms;
  }

  function goatCx(){ return 44; }
  function busy(){ return !!act || !!mg || celebQ.length > 0 || el('banner').classList.contains('show'); }

  // ---------------- actions ----------------
  function actionGuard(){
    if (!S || !bootDone()) return 'no';
    if (stageIdx() === 0) { toast('The egg wiggles…'); sfx('boop'); return 'no'; }
    if (act || mg) return 'no';
    return 'ok';
  }
  function doFeed(){
    if (actionGuard() !== 'ok') return;
    if (!S.lights){ toast('Shh… ' + S.name + ' is sleeping'); sfx('boop'); return; }
    if (S.m.hu >= FULL_AT){
      act = { type:'refuse', t0: now(), dur: 1600 };
      sfx('refuse'); toast('So full!'); save(); return;
    }
    act = { type:'eat', t0: now(), dur: 2300 };
    S.m.hu = Math.min(4, S.m.hu + FEED_FILL);
    S.m.ha = Math.min(4, S.m.ha + 0.25);           // food is joy

    if (S.nextPoopAt > now() + 3*HOUR) S.nextPoopAt = now() + (1.5 + Math.random()*1.5) * HOUR;
    sfx('eat'); save();
  }
  function doPlay(){
    if (actionGuard() !== 'ok') return;
    if (!S.lights){ toast('Shh… ' + S.name + ' is sleeping'); sfx('boop'); return; }
    mg = { round: 0, correct: 0, phase: 'pick', dir: 0, guess: 0, t0: now() };
    el('btnRow').style.display = 'none';
    el('playRow').classList.add('show');
    for (const d of el('mgDots').children) d.className = '';
    toast('Which way will ' + S.name + ' hop?');
    sfx('press');
  }
  function mgGuess(dir){
    if (!mg || mg.phase !== 'pick') return;
    mg.guess = dir;
    mg.dir = Math.random() < 0.5 ? -1 : 1;
    mg.phase = 'hop'; mg.t0 = now();
    sfx('press');
  }
  function mgTick(t){
    if (!mg) return;
    if (mg.phase === 'hop' && t - mg.t0 > 900){
      const hit = mg.guess === mg.dir;
      el('mgDots').children[mg.round].className = hit ? 'hit' : 'miss';
      if (hit){ mg.correct++; sfx('win'); burstHearts(goatCx(), 34, 3); }
      else sfx('boop');
      mg.round++;
      if (mg.round >= 3){ mg.phase = 'done'; mg.t0 = t; }
      else { mg.phase = 'pick'; mg.t0 = t; }
    } else if (mg.phase === 'done' && t - mg.t0 > 600){
      S.m.ha = Math.min(4, S.m.ha + 1 + mg.correct * 0.75);
      toast(mg.correct >= 2 ? 'Great game! +happy' : 'Fun! +happy');
      if (mg.correct >= 2) burstHearts(goatCx(), 30, 5);
      mg = null;
      el('playRow').classList.remove('show');
      el('btnRow').style.display = '';
      save();
    }
  }
  function doClean(){
    if (actionGuard() !== 'ok') return;
    if (!S.lights){ toast('Shh… ' + S.name + ' is sleeping'); sfx('boop'); return; }
    if (S.poops.length > 0){
      act = { type:'sweep', t0: now(), dur: 1300, n: S.poops.length };
      sfx('sweep');
    } else {
      act = { type:'bath', t0: now(), dur: 1700 };
      S.m.cl = Math.min(4, S.m.cl + 2);
      for (let i=0;i<6;i++) spawnFx('bubble', goatCx() - 10 + Math.random()*20, 34 + Math.random()*14,
        (Math.random()-.5)*2, -3 - Math.random()*3, 1500);
      sfx('bath'); toast('Brush brush!');
      save();
    }
  }
  function doLights(){
    if (!S || !bootDone() || mg) return;
    S.lights = !S.lights;
    el('dimmer').style.opacity = S.lights ? 0 : 1;
    sfx(S.lights ? 'lightsOn' : 'lightsOff');
    toast(S.lights ? 'Rise and shine!' : 'Night night…');
    save();
  }
  function doMed(){
    if (!S || !S.sick || act || mg) return;
    S.sick = false; S.zeroSince = null;
    S.m.ha = Math.min(4, S.m.ha + 0.5);
    act = { type:'med', t0: now(), dur: 1500 };
    burstHearts(goatCx(), 30, 4);
    sfx('med'); toast('All better!'); save();
  }

  // ---------------- celebrations ----------------
  function processCelebrations(t){
    if (!celebQ.length || act || bannerUntil > t || !bootDone()) return;
    const c = celebQ[0];
    if (c.kind === 'hatch' && !c.started){
      c.started = true;
      act = { type:'hatch', t0: t, dur: 1600 };
      return;
    }
    celebQ.shift();
    flash(); confettiBurst();
    if (c.kind === 'hatch'){
      sfx('hatch');
      banner('IT HATCHED!', 'say hi to ' + S.name.toUpperCase() + '!', 2600);
    } else {
      sfx('fanfare');
      banner(S.name.toUpperCase() + ' GREW UP!', 'now a ' + STAGE_NAME[c.stage] + '!', 2600);
    }
  }

  // ---------------- tick (logic) ----------------
  let lastTick = 0, lastSave = 0;
  function tick(t){
    if (!S) return;
    const dt = t - lastTick;
    lastTick = t;
    if (dt <= 0) return;
    if (dt > KIND_GAP){ applyElapsed(dt, true); }          // long gap: kind catch-up
    else applyElapsed(dt, false);                          // live decay

    // stage crossings -> celebrate once each
    const cs = stageIdx();
    if (cs > S.seenStage){
      celebQ.push({ kind: S.seenStage === 0 && cs === 1 ? 'hatch' : 'grow', stage: cs });
      S.seenStage = cs;
      save();
    }
    // finish transient acts
    if (act && t - act.t0 >= act.dur){
      if (act.type === 'sweep'){
        S.m.cl = Math.min(4, S.m.cl + 1 + 0.5 * act.n);
        S.poops = [];
        toast('All clean!'); save();
      }
      if (act.type === 'eat') save();
      act = null;
    }
    mgTick(t);
    processCelebrations(t);
    if (t - lastSave > 5000){ lastSave = t; save(); }
  }

  // ---------------- pose + scene ----------------
  function moodStr(){
    if (!S) return '';
    if (S.sick) return 'sick';
    if (S.m.hu <= 1 || S.m.ha <= 1 || S.m.cl <= 1) return 'sad';
    if (S.m.en <= 1) return 'sleepy';
    return 'happy';
  }
  function currentPose(t){
    if (act){
      if (act.type === 'eat')    return 'eat';
      if (act.type === 'refuse') return 'refuse';
      if (act.type === 'med')    return 'happy';
      if (act.type === 'bath')   return 'idle';
    }
    if (mg && mg.phase === 'hop') return 'happy';
    if (mg && mg.phase === 'done') return 'happy';
    if (!S.lights) return 'sleep';
    const m = moodStr();
    if (m === 'sick') return 'sick';
    if (m === 'sad') return 'sad';
    if (m === 'sleepy') return 'sleepy';
    return 'idle';
  }

  function bootDone(){ return bootT0 > 0 && now() - bootT0 > 1050; }

  // ---- SNES ART PASS: idle wander — the goat occasionally strolls a few steps left or
  // right along the grass (render-local, purely cosmetic). Walking left mirrors the sprite.
  let wanderX = 0, wanderTarget = 0, nextWanderAt = 0, prevRenderT = 0;

  function render(){
    const t = now();
    requestAnimationFrame(render);
    const rdt = prevRenderT ? Math.min(0.1, (t - prevRenderT) / 1000) : 0;
    prevRenderT = t;
    if (!S){ ctx.fillStyle = SCREEN_OFF; ctx.fillRect(0, 0, LW, LH); return; }
    tick(t);

    // ---- power-on animation ----
    if (bootT0 > 0 && t - bootT0 < 1050){
      const bt = t - bootT0;
      if (bt < 300 || (bt >= 650 && bt < 800)){ ctx.fillStyle = SCREEN_OFF; ctx.fillRect(0,0,LW,LH); }
      else if (bt < 650){ ctx.fillStyle = '#f8f8f8'; ctx.fillRect(0,0,LW,LH); }   // console flash
      else { ctx.fillStyle = SKY_DAY_LOW; ctx.fillRect(0,0,LW,LH); }
      return;
    }

    const frame = Math.floor(t / 450);
    drawBackground(t);
    drawMeters(frame % 2 === 0);

    // poops
    for (const px of S.poops) drawGrid(SPRITES.poop, px, GROUND_Y - 4);

    const st = stageIdx();
    if (st === 0){
      const eggPose = (act && act.type === 'hatch') ? 'crack' : 'idle';
      const ef = eggPose === 'crack' ? Math.min(2, Math.floor((t - act.t0) / 550)) : frame;
      const g = outlined(buildEgg(eggPose, ef));
      drawGrid(g, goatCx() - (g.w >> 1), GROUND_Y - g.h + 1);
      lastPose = 'egg';
    } else if (act && act.type === 'hatch'){
      const ef = Math.min(2, Math.floor((t - act.t0) / 550));
      const g = outlined(buildEgg('crack', ef));
      drawGrid(g, goatCx() - (g.w >> 1), GROUND_Y - g.h + 1);
      lastPose = 'hatch';
    } else {
      const pose = currentPose(t);
      lastPose = pose;

      // wander: only while awake, healthy-ish and not doing anything else
      const canWander = !act && !mg && S.lights && pose === 'idle';
      if (canWander){
        if (t >= nextWanderAt){
          wanderTarget = Math.round((Math.random() * 2 - 1) * 20);
          nextWanderAt = t + 3500 + Math.random() * 6500;
        }
      } else {
        wanderTarget = wanderX;                          // freeze mid-stroll
        nextWanderAt = Math.max(nextWanderAt, t + 1500); // and don't restart immediately
      }
      const wdx = wanderTarget - wanderX;
      const walking = canWander && Math.abs(wdx) > 0.5;
      if (walking) wanderX += Math.sign(wdx) * Math.min(Math.abs(wdx), 8 * rdt);

      const g = goatSprite(st, pose, frame);
      let gx = goatCx() + Math.round(wanderX) - (g.w >> 1);
      if (mg && mg.phase === 'hop'){
        const p = Math.min(1, (t - mg.t0) / 900);
        gx += Math.round(Math.sin(p * Math.PI) * 11) * mg.dir;
      }
      (walking && wdx < 0 ? drawGridFlip : drawGrid)(g, gx, GROUND_Y - g.h + 1);

      // food during eating
      if (act && act.type === 'eat'){
        if (st === 1) drawGrid(SPRITES.bottle, gx + g.w - 1, GROUND_Y - 9);
        else          drawGrid(SPRITES.hay, gx + g.w - 2, GROUND_Y - 3);
        if (t - lastFxAt > 260){ lastFxAt = t; spawnFx('crumb', gx + g.w - 2 + Math.random()*4, GROUND_Y - 6, 0, 4, 700); }
      }
      // broom during sweep
      if (act && act.type === 'sweep'){
        const p = (t - act.t0) / act.dur;
        const bx = Math.round(-8 + p * (LW + 10));
        drawGrid(SPRITES.broom, bx, GROUND_Y - 5);
        S.poops = S.poops.filter(px => px > bx - 2);
        ctx.fillStyle = PAL[3];
        ctx.fillRect(bx - 2, GROUND_Y - 2 + (frame % 2), 1, 1);
        ctx.fillRect(bx - 4, GROUND_Y - 4 - (frame % 2), 1, 1);
      }
      // bath sparkles
      if (act && act.type === 'bath' && t - lastFxAt > 300){
        lastFxAt = t;
        spawnFx('sparkle', gx + 2 + Math.random()*(g.w - 4), GROUND_Y - g.h + 4 + Math.random()*8, 0, -1, 700);
      }
      // medicine pill
      if (act && act.type === 'med') drawGrid(SPRITES.pill, gx + g.w + 1, GROUND_Y - 16);
      // sick rain cloud
      if (S.sick && pose !== 'sleep'){
        drawGrid(SPRITES.cloud, gx + 1, 13);
        if (t - lastFxAt > 340){ lastFxAt = t; spawnFx('rain', gx + 2 + Math.random()*8, 18, 0, 9, 900); }
      }
      // zzz while sleeping / sleepy suggestion
      if ((pose === 'sleep' || pose === 'sleepy') && t - lastFxAt > 1200){
        lastFxAt = t;
        spawnFx('zzz', gx + g.w - 3, GROUND_Y - g.h - 2, 2.5, -3, 1600);
      }
    }
    drawFx(t);

    // ---- HTML chrome updates ----
    if (bannerUntil && t > bannerUntil){ bannerUntil = 0; el('banner').classList.remove('show'); }
    if (frame !== render._f){
      render._f = frame;
      el('plateName').textContent = S.name;
      el('plateAge').textContent = '· ' + ageText();
      el('feedIco').textContent = stageIdx() <= 1 ? '🍼' : '🌾';
      el('bMed').classList.toggle('show', !!S.sick);
      el('muteBtn').textContent = S.mute ? '🔇' : '🔊';
      el('dimmer').style.opacity = (S.lights || stageIdx() === 0) ? 0 : 1;
    }
  }

  // ======================================================================
  //  BOOT + INPUT
  // ======================================================================
  function powerOn(){ bootT0 = now(); setTimeout(() => sfx('press'), 700); }

  function adopt(){
    const nm = (el('nameInput').value || '').trim() || 'Bucky Jr.';
    S = newState(nm);
    S.nextPoopAt = now() + STAGE_AT[1] + poopInterval();
    save();
    el('nameOverlay').classList.remove('show');
    powerOn();
  }
  el('nameBtn').addEventListener('click', adopt);
  el('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') adopt(); });

  el('bFeed').addEventListener('click', doFeed);
  el('bPlay').addEventListener('click', doPlay);
  el('bClean').addEventListener('click', doClean);
  el('bLights').addEventListener('click', doLights);
  el('bMed').addEventListener('click', doMed);
  el('bLeft').addEventListener('click', () => mgGuess(-1));
  el('bRight').addEventListener('click', () => mgGuess(1));
  el('muteBtn').addEventListener('click', () => {
    if (!S) return;
    S.mute = !S.mute; save();
    el('muteBtn').textContent = S.mute ? '🔇' : '🔊';
    if (!S.mute) sfx('press');
  });

  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (el('nameOverlay').classList.contains('show')) return;
    if (mg && mg.phase === 'pick'){
      if (e.key === 'ArrowLeft'){ mgGuess(-1); return; }
      if (e.key === 'ArrowRight'){ mgGuess(1); return; }
    }
    if (e.key === '1') doFeed();
    else if (e.key === '2') doPlay();
    else if (e.key === '3') doClean();
    else if (e.key === '4') doLights();
    else if (e.key === '5') doMed();
  });

  window.addEventListener('pagehide', save);
  document.addEventListener('visibilitychange', () => { if (document.hidden) save(); });

  // resume audio on first interaction (autoplay policy)
  document.addEventListener('pointerdown', () => ac(), { once: true });

  // ---- start ----
  if (load()){
    lastTick = now();
    powerOn();
  } else {
    el('nameOverlay').classList.add('show');
    el('nameInput').value = '';
  }
  lastTick = now();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>

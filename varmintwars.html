<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>BUCKY — Varmint Wars</title>
<style>
  :root{ --navy:#0a3161; --red:#b31942; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:#0d1b2a; color:#fff; font-family:-apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #bar{ position:fixed; top:0; left:0; right:0; height:46px; display:flex; align-items:center; gap:10px; padding:0 12px;
        background:var(--navy); z-index:10; }
  #bar a{ color:#fff; text-decoration:none; font-weight:800; font-size:15px; background:rgba(255,255,255,.15); padding:7px 12px; border-radius:9px; }
  #bar .t{ font-weight:800; letter-spacing:.5px; }
  #stage{ position:absolute; top:46px; left:0; right:0; bottom:0; display:flex; align-items:center; justify-content:center; }
  canvas{ display:block; touch-action:none; border-radius:10px; box-shadow:0 4px 24px rgba(0,0,0,.6); cursor:crosshair; }
</style>
</head>
<body>
  <div id="bar"><a href="index.html">← BUCKY</a><span class="t">🛶 Varmint Wars</span></div>
  <div id="stage"><canvas id="game"></canvas></div>
  <script>
  (() => {
    // ================== constants ==================
    const W = 960, H = 540;
    const WATER_Y = 380;
    const GRAV = 0.32;
    const FRAME_MS = 1000 / 60;
    const SAVE_KEY = "varmintWarsSave";
    const MAX_LEVEL = 8;

    const WEAPONS = {
      egg:     { name:"Egg",     dmg: 25, radius: 6,  splash: 0,  knock: 1.0, color:"#f5edd8", cost: 0 },
      tomato:  { name:"Tomato",  dmg: 45, radius: 8,  splash: 0,  knock: 1.4, color:"#d8342a", cost: 150, pack: 5 },
      pumpkin: { name:"Pumpkin", dmg: 70, radius: 13, splash: 70, knock: 2.2, color:"#e0862c", cost: 300, pack: 3 }
    };
    const RAFTS = [
      { name:"Hay Raft",    w: 150, top: WATER_Y - 26, resist: 1.0, cost: 0 },
      { name:"Wood Dock",   w: 185, top: WATER_Y - 38, resist: 0.7, cost: 400 },
      { name:"Stock Tank",  w: 210, top: WATER_Y - 48, resist: 0.45, cost: 1000 }
    ];
    const VARMINTS = {
      armadillo: { hp: 60,  weight: 0.8, dmg: 15, acc: 0.55, r: 17, money: 60 },
      turtle:    { hp: 130, weight: 1.6, dmg: 25, acc: 0.6,  r: 19, money: 90 },
      coyote:    { hp: 90,  weight: 1.0, dmg: 22, acc: 0.85, r: 18, money: 80 },
      boss:      { hp: 320, weight: 2.6, dmg: 34, acc: 0.8,  r: 30, money: 400 }
    };
    // enemy raft groups per level: arrays of {x, w, crew:[types]}
    const LEVELS = [
      { rafts: [ { x: 760, w: 150, crew: ["armadillo","armadillo"] } ] },
      { rafts: [ { x: 700, w: 120, crew: ["armadillo"] }, { x: 850, w: 130, crew: ["armadillo","armadillo"] } ] },
      { rafts: [ { x: 720, w: 150, crew: ["armadillo","turtle"] }, { x: 880, w: 100, crew: ["armadillo"] } ] },
      { rafts: [ { x: 700, w: 150, crew: ["turtle","armadillo"] }, { x: 870, w: 120, crew: ["turtle"] } ] },
      { rafts: [ { x: 690, w: 130, crew: ["coyote"] }, { x: 840, w: 150, crew: ["coyote","armadillo"] } ] },
      { rafts: [ { x: 670, w: 150, crew: ["turtle","coyote"] }, { x: 850, w: 150, crew: ["coyote","turtle"] } ] },
      { rafts: [ { x: 660, w: 160, crew: ["coyote","coyote"] }, { x: 850, w: 150, crew: ["turtle","coyote"] } ] },
      { rafts: [ { x: 700, w: 130, crew: ["coyote"] }, { x: 840, w: 170, crew: ["boss"] }, { x: 930, w: 90, crew: ["coyote"] } ] }
    ];

    // ================== canvas ==================
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    canvas.width = W; canvas.height = H;
    let viewScale = 1;
    function fitCanvas(){
      const stage = document.getElementById("stage");
      viewScale = Math.min(stage.clientWidth / W, stage.clientHeight / H) * 0.98;
      canvas.style.width = Math.floor(W * viewScale) + "px";
      canvas.style.height = Math.floor(H * viewScale) + "px";
    }
    window.addEventListener("resize", fitCanvas);

    // ================== save ==================
    // snapshot of the spendable inventory, captured when a level begins so a failed run can be reverted to it
    function invSnap(s){ return { money: s.money, raftTier: s.raftTier, tomatoes: s.tomatoes, pumpkins: s.pumpkins }; }
    function defaultSave(){ const s = { level: 1, money: 0, raftTier: 0, tomatoes: 0, pumpkins: 0 }; s.levelStart = invSnap(s); return s; }
    function loadSave(){
      try { const v = JSON.parse(localStorage.getItem(SAVE_KEY)); if (v && v.level) return v; } catch(e){}
      return null;
    }
    function writeSave(){ localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }

    // ================== game state ==================
    let save = loadSave() || defaultSave();
    let state = "title";          // title | intro | aim | projectile | enemyTurn | shop | victory | defeat | complete
    let crew = [], enemies = [], enemyRafts = [];
    let projectile = null, particles = [], floatTexts = [];
    let weapon = "egg";
    let aiming = false, aimStart = null, aimCur = null;
    let enemyDelay = 0, nextEnemyIdx = 0;   // round-robin pointer so enemies alternate shots with the player
    let time = 0;
    let levelEarnings = 0;
    let shopMsg = "";

    function playerRaft(){ return RAFTS[save.raftTier]; }

    function setupLevel(){
      const raft = playerRaft();
      // both crew centered on the raft (raft is centered at x=130); after a hit they walk back to these spots
      crew = [
        { kind:"farmer", baseX: 143, x: 143, hp: 100, maxHp: 100, r: 20, alive: true, sink: 0 },
        { kind:"goat",   baseX: 113, x: 113, hp: 80,  maxHp: 80,  r: 16, alive: true, sink: 0 }
      ];
      enemies = []; enemyRafts = [];
      const cfg = LEVELS[save.level - 1];
      for (const rc of cfg.rafts){
        // tall "tower" platforms (Raft Wars style): a narrow standing surface high above the water,
        // so a solid hit knocks a varmint clean off the edge into the pond
        const topW = Math.min(rc.w, 104);      // narrow standing surface (knock-off boundary)
        const colW = Math.round(topW * 0.66);  // supporting column (also blocks projectiles)
        enemyRafts.push({ x: rc.x, w: rc.w, topW, colW, top: WATER_Y - 82 });
        const n = rc.crew.length;
        rc.crew.forEach((kind, i) => {
          const spread = topW * 0.56;
          const ex = rc.x - spread/2 + (n === 1 ? spread/2 : spread * i / (n - 1));
          const spec = VARMINTS[kind];
          enemies.push({ kind, x: ex, baseX: ex, raft: enemyRafts.length - 1,
            hp: spec.hp, maxHp: spec.hp, r: spec.r, alive: true, sink: 0 });
        });
      }
      projectile = null; particles = []; floatTexts = [];
      weapon = "egg";
      levelEarnings = 0;
      enemyDelay = 0; nextEnemyIdx = 0;
    }

    // ================== helpers ==================
    function crewY(c){ return playerRaft().top - c.r + Math.sin(time * 0.03) * 2; }
    function enemyY(e){ const rf = enemyRafts[e.raft]; return rf.top - e.r + Math.sin(time * 0.03 + e.raft) * 2; }
    function aliveEnemies(){ return enemies.filter(e => e.alive); }
    function aliveCrew(){ return crew.filter(c => c.alive); }
    function shooter(){ return crew.find(c => c.kind === "farmer" && c.alive) || aliveCrew()[0]; }

    function addFloatText(x, y, text, color){ floatTexts.push({ x, y, text, color: color || "#ffd23f", life: 0 }); }
    function splash(x, big){
      for (let i = 0; i < (big ? 26 : 14); i++){
        particles.push({ x, y: WATER_Y, vx: (Math.random()-0.5) * (big?7:4.5), vy: -(2 + Math.random() * (big?7:4.5)),
          life: 0, maxLife: 30 + Math.random()*20, color: "rgba(180,220,240,.9)", r: 2 + Math.random()*2.5 });
      }
    }
    function burst(x, y, color, n){
      for (let i = 0; i < n; i++){
        const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 4;
        particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1.5,
          life: 0, maxLife: 22 + Math.random()*16, color, r: 1.5 + Math.random()*2.5 });
      }
    }

    function damageEnemy(e, dmg, knockVx, splashHit){
      if (!e.alive) return;
      e.hp -= dmg;
      const spec = VARMINTS[e.kind];
      e.x += (knockVx / spec.weight) * 2.4;
      save.money += 10; levelEarnings += 10;
      addFloatText(e.x, enemyY(e) - 30, "+$10");
      burst(e.x, enemyY(e), splashHit ? "#e0862c" : "#d8342a", 10);
      const rf = enemyRafts[e.raft];
      const off = e.x < rf.x - rf.topW/2 - 2 || e.x > rf.x + rf.topW/2 + 2;   // knocked off the narrow perch
      if (e.hp <= 0 || off){
        e.alive = false;
        splash(e.x, true);
        save.money += spec.money; levelEarnings += spec.money;
        addFloatText(e.x, enemyY(e) - 46, "+$" + spec.money, "#7df58a");
      }
    }
    function damageCrew(c, dmg, knockVx){
      if (!c.alive) return;
      c.hp -= dmg;
      c.x += knockVx * 2.4 * playerRaft().resist;
      burst(c.x, crewY(c), "#d8342a", 8);
      const raft = playerRaft();
      const left = 130 - raft.w/2, right = 130 + raft.w/2;   // player raft is centered at x=130
      if (c.hp <= 0 || c.x < left - 4 || c.x > right + 4){
        c.alive = false;
        splash(c.x, true);
      }
    }

    // ================== firing ==================
    function fireProjectile(fromX, fromY, vx, vy, type, fromPlayer){
      projectile = { x: fromX, y: fromY, vx, vy, type, fromPlayer, trail: [] };
    }

    function playerFire(dx, dy){
      const s = shooter(); if (!s) return;
      const power = Math.min(Math.hypot(dx, dy) / 9, 19);
      const a = Math.atan2(dy, dx);
      if ((save.tomatoes <= 0 && weapon === "tomato") || (save.pumpkins <= 0 && weapon === "pumpkin")) weapon = "egg";
      if (weapon === "tomato"){ save.tomatoes--; }
      if (weapon === "pumpkin"){ save.pumpkins--; }
      writeSave();
      fireProjectile(s.x + 14, crewY(s) - 10, Math.cos(a) * power, Math.sin(a) * power, weapon, true);
      state = "projectile";
    }

    function enemyFire(e){
      const targets = aliveCrew(); if (!targets.length) return;
      const t = targets[(Math.random() * targets.length) | 0];
      const spec = VARMINTS[e.kind];
      const sx = e.x - 12, sy = enemyY(e) - 10;
      const tx = t.x, ty = crewY(t);
      // ballistic solution with fixed flight time, then error by accuracy (later levels tighten a bit)
      const T = 55 + Math.random() * 14;
      const acc = Math.min(0.97, spec.acc + save.level * 0.015);
      const err = (1 - acc) * 130;
      const ex = tx + (Math.random()-0.5) * 2 * err;
      let vx = (ex - sx) / T;
      let vy = (ty - sy - 0.5 * GRAV * T * T) / T;
      fireProjectile(sx, sy, vx, vy, "mud", false);
    }

    function projectileSpec(type){
      if (type === "mud") return { dmg: 0, radius: 7, splash: 0, knock: 1.0, color:"#7a6248" };
      return WEAPONS[type];
    }

    // ================== simulation ==================
    function stepProjectile(){
      const p = projectile; if (!p) return;
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 14) p.trail.shift();
      p.vy += GRAV;
      p.x += p.vx; p.y += p.vy;
      const spec = projectileSpec(p.type);

      if (p.fromPlayer){
        for (const e of aliveEnemies()){
          const ey = enemyY(e);
          if (Math.hypot(p.x - e.x, p.y - ey) < e.r + spec.radius){
            if (spec.splash){ explode(p.x, p.y, spec); } else { damageEnemy(e, spec.dmg, p.vx * spec.knock, false); }
            endProjectile(); return;
          }
        }
        for (const rf of enemyRafts){
          if (p.y > rf.top && p.y < WATER_Y && p.x > rf.x - rf.colW/2 && p.x < rf.x + rf.colW/2){
            if (spec.splash){ explode(p.x, p.y, spec); } else { burst(p.x, p.y, "#a98d5f", 6); }
            endProjectile(); return;
          }
        }
      } else {
        const dspec = VARMINTS[projectileSourceKind || "armadillo"];
        for (const c of aliveCrew()){
          const cy = crewY(c);
          if (Math.hypot(p.x - c.x, p.y - cy) < c.r + spec.radius){
            damageCrew(c, enemyShotDmg, p.vx * 1.0);
            endProjectile(); return;
          }
        }
        const raft = playerRaft();
        if (p.y > raft.top && p.y < WATER_Y && p.x > 130 - raft.w/2 && p.x < 130 + raft.w/2){
          burst(p.x, p.y, "#a98d5f", 6);
          endProjectile(); return;
        }
      }

      if (p.y > WATER_Y){
        if (spec.splash && p.fromPlayer) explode(p.x, WATER_Y - 4, spec);
        splash(p.x, false);
        endProjectile(); return;
      }
      if (p.x < -60 || p.x > W + 60 || p.y > H + 60){ endProjectile(); return; }
    }

    function explode(x, y, spec){
      burst(x, y, "#e0862c", 26);
      burst(x, y, "#ffd23f", 16);
      for (const e of aliveEnemies()){
        const d = Math.hypot(e.x - x, enemyY(e) - y);
        if (d < spec.splash + e.r){
          const fall = Math.max(0.35, 1 - d / (spec.splash + e.r));
          damageEnemy(e, spec.dmg * fall, (e.x - x >= 0 ? 1 : -1) * 7 * fall * spec.knock, true);
        }
      }
    }

    let projectileSourceKind = null, enemyShotDmg = 0;
    function endProjectile(){
      projectile = null;
      if (state !== "projectile" && state !== "enemyTurn") return;
      if (!aliveEnemies().length){
        // level cleared
        save.money += 150; levelEarnings += 150;
        writeSave();
        state = save.level >= MAX_LEVEL ? "complete" : "victory";
        return;
      }
      if (!aliveCrew().length){ state = "defeat"; return; }
      // strict back-and-forth: after the player's shot exactly one varmint fires, then it's the player's turn again
      if (state === "projectile"){
        enemyDelay = 45;
        state = "enemyTurn";
      } else if (state === "enemyTurn"){
        state = "aim";
      }
    }

    // pick the next living enemy in round-robin order so every varmint gets its turns over successive rounds
    function pickNextEnemy(){
      for (let k = 0; k < enemies.length; k++){
        const idx = (nextEnemyIdx + k) % enemies.length;
        if (enemies[idx].alive){ nextEnemyIdx = (idx + 1) % enemies.length; return enemies[idx]; }
      }
      return null;
    }

    function stepFrame(){
      time++;
      // living crew stroll back to their spot on the raft after being knocked around
      for (const c of crew){ if (c.alive) c.x += (c.baseX - c.x) * 0.06; }
      for (const pt of particles){ pt.vy += 0.18; pt.x += pt.vx; pt.y += pt.vy; pt.life++; }
      particles = particles.filter(pt => pt.life < pt.maxLife && pt.y < H + 20);
      for (const ft of floatTexts) ft.life++;
      floatTexts = floatTexts.filter(ft => ft.life < 60);

      if (state === "aim" && !aliveCrew().length){ state = "defeat"; }   // safety net — normally caught in endProjectile
      if (state === "projectile" || state === "enemyTurn"){
        if (projectile) stepProjectile();
        else if (state === "enemyTurn"){
          if (enemyDelay > 0){ enemyDelay--; }
          else {
            const e = pickNextEnemy();
            if (e){
              projectileSourceKind = e.kind;
              enemyShotDmg = VARMINTS[e.kind].dmg;
              enemyFire(e);   // fires one shot; when it resolves, endProjectile() hands the turn back to the player
            } else { state = "aim"; }
          }
        }
      }
    }

    // ================== drawing ==================
    function drawBackground(){
      const sky = ctx.createLinearGradient(0, 0, 0, WATER_Y);
      sky.addColorStop(0, "#8ecdf2"); sky.addColorStop(1, "#cfe8f5");
      ctx.fillStyle = sky; ctx.fillRect(0, 0, W, WATER_Y);
      // sun
      ctx.fillStyle = "#fff3c2"; ctx.beginPath(); ctx.arc(830, 70, 34, 0, Math.PI*2); ctx.fill();
      // distant shoreline: barn + silo
      ctx.fillStyle = "#b9d9a8"; ctx.fillRect(0, WATER_Y - 46, W, 46);
      ctx.fillStyle = "#a24238";
      ctx.fillRect(390, WATER_Y - 92, 92, 48);
      ctx.beginPath(); ctx.moveTo(382, WATER_Y - 92); ctx.lineTo(436, WATER_Y - 122); ctx.lineTo(490, WATER_Y - 92); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#c4c9cf";
      ctx.fillRect(500, WATER_Y - 116, 26, 72);
      ctx.beginPath(); ctx.arc(513, WATER_Y - 116, 13, Math.PI, 0); ctx.fill();
      // fence posts
      ctx.fillStyle = "#8a6a44";
      for (let x = 40; x < W; x += 90) ctx.fillRect(x, WATER_Y - 58, 5, 14);
      // water
      const water = ctx.createLinearGradient(0, WATER_Y, 0, H);
      water.addColorStop(0, "#4d90b8"); water.addColorStop(1, "#27516e");
      ctx.fillStyle = water; ctx.fillRect(0, WATER_Y, W, H - WATER_Y);
      ctx.strokeStyle = "rgba(255,255,255,.28)"; ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++){
        const y = WATER_Y + 14 + i * 28;
        ctx.beginPath();
        for (let x = 0; x <= W; x += 16){
          const yy = y + Math.sin(x * 0.03 + time * 0.04 + i) * 3;
          x === 0 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
        }
        ctx.stroke();
      }
    }

    function drawPlayerRaft(){
      const raft = playerRaft();
      const bob = Math.sin(time * 0.03) * 2;
      const top = raft.top + bob, left = 130 - raft.w/2;
      if (save.raftTier === 0){
        ctx.fillStyle = "#c9a227";
        ctx.fillRect(left, top, raft.w, WATER_Y - raft.top + 4);
        ctx.strokeStyle = "#9a7a1a"; ctx.lineWidth = 2;
        for (let i = 1; i < 3; i++){ ctx.beginPath(); ctx.moveTo(left, top + i*9); ctx.lineTo(left + raft.w, top + i*9); ctx.stroke(); }
      } else if (save.raftTier === 1){
        ctx.fillStyle = "#8a6a44";
        ctx.fillRect(left, top, raft.w, 14);
        ctx.fillStyle = "#6e5233";
        for (let i = 0; i < 3; i++) ctx.fillRect(left + 14 + i * (raft.w-34)/2, top + 14, 10, WATER_Y - raft.top - 8);
      } else {
        ctx.fillStyle = "#9aa5ad";
        ctx.fillRect(left, top, raft.w, WATER_Y - raft.top + 2);
        ctx.strokeStyle = "#6c7880"; ctx.lineWidth = 2;
        ctx.strokeRect(left + 3, top + 3, raft.w - 6, WATER_Y - raft.top - 4);
      }
    }
    function drawEnemyRaft(rf){
      const bob = Math.sin(time * 0.03 + enemyRafts.indexOf(rf)) * 2;
      const topY = rf.top + bob;
      // supporting column: a stack of crates rising from the water to the perch
      const cl = rf.x - rf.colW/2;
      const rows = Math.max(1, Math.ceil((WATER_Y - topY) / 22));
      for (let r = 0; r < rows; r++){
        const y = WATER_Y - (r + 1) * 22;
        ctx.fillStyle = r % 2 ? "#8a6a44" : "#79593a";
        ctx.fillRect(cl, y, rf.colW, 21);
        ctx.strokeStyle = "#54402a"; ctx.lineWidth = 2;
        ctx.strokeRect(cl + 0.5, y + 0.5, rf.colW - 1, 20);
        ctx.beginPath();  // crate cross-slats
        ctx.moveTo(cl, y); ctx.lineTo(cl + rf.colW, y + 21);
        ctx.moveTo(cl + rf.colW, y); ctx.lineTo(cl, y + 21);
        ctx.stroke();
      }
      // narrow standing plank on top
      const pl = rf.x - rf.topW/2;
      ctx.fillStyle = "#a5824e"; ctx.fillRect(pl, topY - 5, rf.topW, 8);
      ctx.fillStyle = "#6e5333"; ctx.fillRect(pl, topY + 3, rf.topW, 3);
      ctx.strokeStyle = "rgba(0,0,0,.2)"; ctx.lineWidth = 1;
      ctx.strokeRect(pl + 0.5, topY - 4.5, rf.topW - 1, 7);
    }

    function drawFarmer(x, y){
      ctx.fillStyle = "#3b6ea5"; ctx.fillRect(x - 9, y - 4, 18, 22);           // overalls
      ctx.fillStyle = "#e8b88a"; ctx.beginPath(); ctx.arc(x, y - 14, 9, 0, Math.PI*2); ctx.fill();  // head
      ctx.fillStyle = "#d9b23c";                                               // straw hat
      ctx.fillRect(x - 12, y - 22, 24, 4);
      ctx.fillRect(x - 7, y - 29, 14, 8);
    }
    function drawGoat(x, y){
      ctx.fillStyle = "#e8e4da"; ctx.fillRect(x - 12, y - 4, 24, 14);
      ctx.beginPath(); ctx.arc(x + 11, y - 8, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#b9b2a4";
      ctx.beginPath(); ctx.moveTo(x + 8, y - 14); ctx.lineTo(x + 5, y - 21); ctx.lineTo(x + 11, y - 15); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#e8e4da"; ctx.fillRect(x - 10, y + 10, 4, 6); ctx.fillRect(x + 6, y + 10, 4, 6);
    }
    function drawArmadillo(x, y){
      ctx.fillStyle = "#9d9484"; ctx.beginPath(); ctx.ellipse(x, y, 16, 11, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#7c7466"; ctx.lineWidth = 2;
      for (let i = -1; i <= 1; i++){ ctx.beginPath(); ctx.moveTo(x + i*7, y - 10); ctx.lineTo(x + i*7, y + 10); ctx.stroke(); }
      ctx.fillStyle = "#8b8272"; ctx.beginPath(); ctx.ellipse(x - 17, y + 2, 6, 4, 0, 0, Math.PI*2); ctx.fill();
    }
    function drawTurtle(x, y, r){
      const s = r / 19;
      ctx.fillStyle = "#4e7d46"; ctx.beginPath(); ctx.ellipse(x, y, 17*s, 12*s, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#3a6134"; ctx.beginPath(); ctx.ellipse(x, y - 3*s, 12*s, 8*s, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#7ba05b"; ctx.beginPath(); ctx.arc(x - 19*s, y - 2*s, 6*s, 0, Math.PI*2); ctx.fill();
      // beak
      ctx.fillStyle = "#5b7d43"; ctx.beginPath(); ctx.moveTo(x - 24*s, y - 4*s); ctx.lineTo(x - 29*s, y - 1*s); ctx.lineTo(x - 24*s, y + 2*s); ctx.closePath(); ctx.fill();
    }
    function drawCoyote(x, y){
      ctx.fillStyle = "#b09468"; ctx.fillRect(x - 11, y - 6, 22, 16);
      ctx.beginPath(); ctx.arc(x - 12, y - 10, 8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x - 16, y - 16); ctx.lineTo(x - 17, y - 25); ctx.lineTo(x - 11, y - 17); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x - 10, y - 17); ctx.lineTo(x - 8, y - 25); ctx.lineTo(x - 4, y - 16); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#8f764e"; ctx.beginPath(); ctx.moveTo(x - 19, y - 9); ctx.lineTo(x - 26, y - 6); ctx.lineTo(x - 19, y - 5); ctx.closePath(); ctx.fill();
    }

    function drawHpBar(x, y, w, frac, color){
      ctx.fillStyle = "rgba(0,0,0,.4)"; ctx.fillRect(x - w/2, y, w, 5);
      ctx.fillStyle = color; ctx.fillRect(x - w/2, y, w * Math.max(0, frac), 5);
    }

    function drawCharacters(){
      for (const c of crew){
        if (!c.alive) continue;
        const y = crewY(c);
        if (c.kind === "farmer") drawFarmer(c.x, y); else drawGoat(c.x, y);
        drawHpBar(c.x, y - 40, 36, c.hp / c.maxHp, "#7df58a");
      }
      for (const e of enemies){
        if (!e.alive) continue;
        const y = enemyY(e);
        if (e.kind === "armadillo") drawArmadillo(e.x, y);
        else if (e.kind === "coyote") drawCoyote(e.x, y);
        else drawTurtle(e.x, y, e.r);
        drawHpBar(e.x, y - (e.kind === "boss" ? 52 : 38), e.kind === "boss" ? 60 : 36, e.hp / e.maxHp, "#f2726a");
      }
    }

    function drawProjectile(){
      const p = projectile; if (!p) return;
      const spec = projectileSpec(p.type);
      ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 2;
      ctx.beginPath();
      p.trail.forEach((t, i) => i === 0 ? ctx.moveTo(t.x, t.y) : ctx.lineTo(t.x, t.y));
      ctx.stroke();
      ctx.fillStyle = spec.color;
      ctx.beginPath();
      if (p.type === "egg") ctx.ellipse(p.x, p.y, spec.radius * 0.8, spec.radius, 0, 0, Math.PI*2);
      else ctx.arc(p.x, p.y, spec.radius, 0, Math.PI*2);
      ctx.fill();
      if (p.type === "pumpkin"){ ctx.fillStyle = "#4a6e30"; ctx.fillRect(p.x - 1.5, p.y - spec.radius - 4, 3, 5); }
    }

    function drawAim(){
      if (!aiming || state !== "aim") return;
      const s = shooter(); if (!s) return;
      const sx = s.x + 14, sy = crewY(s) - 10;
      const dx = aimCur.x - aimStart.x, dy = aimCur.y - aimStart.y;
      const power = Math.min(Math.hypot(dx, dy) / 9, 19);
      const a = Math.atan2(dy, dx);
      // dotted preview arc
      let px = sx, py = sy, vx = Math.cos(a) * power, vy = Math.sin(a) * power;
      ctx.fillStyle = "rgba(255,255,255,.8)";
      for (let i = 0; i < 26; i++){
        vy += GRAV; px += vx; py += vy;
        if (i % 2 === 0){ ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI*2); ctx.fill(); }
        if (py > WATER_Y) break;
      }
      // power bar
      ctx.fillStyle = "rgba(0,0,0,.4)"; ctx.fillRect(30, 30, 120, 12);
      ctx.fillStyle = power > 16 ? "#f2726a" : "#7df58a";
      ctx.fillRect(30, 30, 120 * power / 19, 12);
    }

    function drawParticles(){
      for (const pt of particles){
        ctx.fillStyle = pt.color;
        ctx.globalAlpha = Math.max(0, 1 - pt.life / pt.maxLife);
        ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.font = "bold 15px sans-serif"; ctx.textAlign = "center";
      for (const ft of floatTexts){
        ctx.globalAlpha = Math.max(0, 1 - ft.life / 60);
        ctx.fillStyle = ft.color;
        ctx.fillText(ft.text, ft.x, ft.y - ft.life * 0.6);
      }
      ctx.globalAlpha = 1;
    }

    function drawHud(){
      ctx.fillStyle = "rgba(10,25,40,.55)";
      ctx.fillRect(0, 0, W, 24);
      ctx.fillStyle = "#ffd23f"; ctx.font = "bold 14px monospace"; ctx.textAlign = "left";
      ctx.fillText("$" + save.money, 10, 17);
      ctx.fillStyle = "#fff";
      ctx.fillText("Level " + save.level + " / " + MAX_LEVEL, 110, 17);
      ctx.textAlign = "right";
      ctx.fillText(state === "aim" ? "YOUR TURN — drag to aim" : (state === "enemyTurn" ? "VARMINTS' TURN" : ""), W - 10, 17);
      ctx.textAlign = "left";

      // weapon selector
      const items = [
        { key:"egg",     label:"🥚 ∞" },
        { key:"tomato",  label:"🍅 " + save.tomatoes },
        { key:"pumpkin", label:"🎃 " + save.pumpkins }
      ];
      items.forEach((it, i) => {
        const bx = 12 + i * 86, by = H - 44;
        const owned = it.key === "egg" || (it.key === "tomato" ? save.tomatoes > 0 : save.pumpkins > 0);
        ctx.fillStyle = weapon === it.key ? "rgba(255,210,63,.9)" : "rgba(10,25,40,.55)";
        ctx.fillRect(bx, by, 78, 32);
        ctx.fillStyle = weapon === it.key ? "#12253a" : (owned ? "#fff" : "rgba(255,255,255,.35)");
        ctx.font = "bold 15px sans-serif";
        ctx.fillText(it.label, bx + 10, by + 21);
      });
    }

    function overlayBox(){
      ctx.fillStyle = "rgba(8,20,34,.72)";
      ctx.fillRect(0, 0, W, H);
    }
    function bigText(text, y, size, color){
      ctx.fillStyle = color || "#fff"; ctx.font = "bold " + size + "px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(text, W/2, y);
    }
    function button(id, x, y, w, h, label, primary){
      uiButtons.push({ id, x, y, w, h });
      ctx.fillStyle = primary ? "#fff" : "rgba(255,255,255,.16)";
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = primary ? "#0a3161" : "#fff";
      ctx.font = "bold 17px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(label, x + w/2, y + h/2 + 6);
    }

    let uiButtons = [];
    function drawOverlays(){
      uiButtons = [];
      if (state === "title"){
        overlayBox();
        bigText("🛶 VARMINT WARS", 150, 46);
        bigText("Armadillos, snappers & coyotes are raiding the pond.", 195, 17, "#cfe3f5");
        bigText("Drag to aim, release to fire. Knock 'em off their rafts!", 220, 17, "#cfe3f5");
        const hasSave = save.level > 1 || save.money > 0 || save.raftTier > 0;
        if (hasSave){
          button("continue", W/2 - 110, 260, 220, 46, "Continue — Level " + save.level, true);
          button("newgame", W/2 - 110, 320, 220, 40, "New Game");
        } else {
          button("newgame", W/2 - 110, 270, 220, 46, "Start Game", true);
        }
      } else if (state === "intro"){
        overlayBox();
        bigText("Level " + save.level, 200, 40);
        const kinds = [...new Set(LEVELS[save.level-1].rafts.flatMap(r => r.crew))];
        bigText(kinds.map(k => ({armadillo:"🦔 Armadillo", turtle:"🐢 Snapper", coyote:"🐺 Coyote", boss:"🐢 BIG SNAPPER"})[k]).join("   "), 245, 20, "#cfe3f5");
        button("fight", W/2 - 90, 285, 180, 46, "Fight!", true);
      } else if (state === "victory"){
        overlayBox();
        bigText("Level " + save.level + " cleared! 🎉", 170, 36);
        bigText("Earned $" + levelEarnings + " this level — total $" + save.money, 210, 18, "#cfe3f5");
        button("shop", W/2 - 110, 250, 220, 46, "Shop & Continue", true);
      } else if (state === "defeat"){
        overlayBox();
        bigText("The varmints got ya! 💦", 190, 34);
        bigText("You keep your money and upgrades.", 228, 17, "#cfe3f5");
        button("retry", W/2 - 90, 262, 180, 46, "Try Again", true);
      } else if (state === "complete"){
        overlayBox();
        bigText("🏆 POND SECURED!", 160, 42);
        bigText("You cleared all " + MAX_LEVEL + " levels and saved the farm.", 205, 18, "#cfe3f5");
        bigText("Final bankroll: $" + save.money, 235, 18, "#ffd23f");
        button("newgame", W/2 - 110, 275, 220, 46, "Play Again", true);
      } else if (state === "shop"){
        overlayBox();
        bigText("🧑‍🌾 FARM SHOP", 78, 30);
        bigText("$" + save.money, 108, 20, "#ffd23f");
        // weapons
        const rows = [
          { id:"buyTomato",  label:"🍅 Tomatoes ×5 — heavier hit", cost: WEAPONS.tomato.cost },
          { id:"buyPumpkin", label:"🎃 Pumpkins ×3 — splash damage", cost: WEAPONS.pumpkin.cost }
        ];
        if (save.raftTier < 2){
          const next = RAFTS[save.raftTier + 1];
          rows.push({ id:"buyRaft", label:"🛶 " + next.name + " — sturdier, resists knockback", cost: next.cost });
        }
        rows.forEach((r, i) => {
          const y = 150 + i * 62;
          ctx.fillStyle = "rgba(255,255,255,.1)"; ctx.fillRect(W/2 - 300, y, 600, 50);
          ctx.fillStyle = "#fff"; ctx.font = "16px sans-serif"; ctx.textAlign = "left";
          ctx.fillText(r.label, W/2 - 284, y + 30);
          const afford = save.money >= r.cost;
          ctx.textAlign = "center";
          uiButtons.push({ id: r.id, x: W/2 + 190, y: y + 7, w: 100, h: 36 });
          ctx.fillStyle = afford ? "#7df58a" : "rgba(255,255,255,.25)";
          ctx.fillRect(W/2 + 190, y + 7, 100, 36);
          ctx.fillStyle = afford ? "#0a3161" : "rgba(255,255,255,.5)";
          ctx.font = "bold 15px sans-serif";
          ctx.fillText("$" + r.cost, W/2 + 240, y + 30);
        });
        if (shopMsg){ bigText(shopMsg, 150 + rows.length * 62 + 26, 15, "#ffd23f"); }
        bigText("Ammo: 🍅 " + save.tomatoes + "   🎃 " + save.pumpkins + "   Raft: " + playerRaft().name, 150 + rows.length * 62 + 52, 15, "#cfe3f5");
        button("nextLevel", W/2 - 110, H - 90, 220, 46, "Next Level ▶", true);
      }
    }

    function draw(){
      drawBackground();
      for (const rf of enemyRafts) drawEnemyRaft(rf);
      drawPlayerRaft();
      drawCharacters();
      drawProjectile();
      drawParticles();
      drawAim();
      drawHud();
      drawOverlays();
    }

    // ================== input ==================
    function canvasPos(e){
      const rect = canvas.getBoundingClientRect();
      const cx = (e.clientX !== undefined ? e.clientX : (e.touches && e.touches[0].clientX));
      const cy = (e.clientY !== undefined ? e.clientY : (e.touches && e.touches[0].clientY));
      return { x: (cx - rect.left) / viewScale, y: (cy - rect.top) / viewScale };
    }
    function hitButton(pos){
      for (const b of uiButtons){
        if (pos.x >= b.x && pos.x <= b.x + b.w && pos.y >= b.y && pos.y <= b.y + b.h) return b.id;
      }
      return null;
    }
    function handleButton(id){
      shopMsg = "";
      if (id === "newgame"){ save = defaultSave(); save.levelStart = invSnap(save); writeSave(); setupLevel(); state = "intro"; }
      else if (id === "continue"){ if (!save.levelStart) save.levelStart = invSnap(save); setupLevel(); state = "intro"; }
      else if (id === "fight"){ state = "aim"; }
      else if (id === "retry"){ Object.assign(save, save.levelStart); writeSave(); setupLevel(); state = "intro"; }   // revert to what you had entering the level
      else if (id === "shop"){ state = "shop"; }
      else if (id === "buyTomato"){
        if (save.money >= WEAPONS.tomato.cost){ save.money -= WEAPONS.tomato.cost; save.tomatoes += WEAPONS.tomato.pack; shopMsg = "Bought 5 tomatoes!"; writeSave(); }
        else shopMsg = "Not enough money.";
      }
      else if (id === "buyPumpkin"){
        if (save.money >= WEAPONS.pumpkin.cost){ save.money -= WEAPONS.pumpkin.cost; save.pumpkins += WEAPONS.pumpkin.pack; shopMsg = "Bought 3 pumpkins!"; writeSave(); }
        else shopMsg = "Not enough money.";
      }
      else if (id === "buyRaft"){
        const next = RAFTS[save.raftTier + 1];
        if (next && save.money >= next.cost){ save.money -= next.cost; save.raftTier++; shopMsg = "Upgraded to " + next.name + "!"; writeSave(); }
        else shopMsg = "Not enough money.";
      }
      else if (id === "nextLevel"){ save.level++; save.levelStart = invSnap(save); writeSave(); setupLevel(); state = "intro"; }   // snapshot post-shop inventory
    }

    function onDown(pos){
      const btn = hitButton(pos);
      if (btn){ handleButton(btn); return; }
      if (state !== "aim") return;
      // weapon selector taps
      const items = ["egg", "tomato", "pumpkin"];
      for (let i = 0; i < 3; i++){
        const bx = 12 + i * 86, by = H - 44;
        if (pos.x >= bx && pos.x <= bx + 78 && pos.y >= by && pos.y <= by + 32){
          const k = items[i];
          if (k === "egg" || (k === "tomato" && save.tomatoes > 0) || (k === "pumpkin" && save.pumpkins > 0)) weapon = k;
          return;
        }
      }
      aiming = true; aimStart = pos; aimCur = pos;
    }
    function onMove(pos){ if (aiming) aimCur = pos; }
    function onUp(pos){
      if (!aiming) return;
      aiming = false;
      const dx = pos.x - aimStart.x, dy = pos.y - aimStart.y;
      if (Math.hypot(dx, dy) < 12) return;   // too small — treat as tap
      playerFire(dx, dy);
    }

    canvas.addEventListener("pointerdown", (e) => { e.preventDefault(); onDown(canvasPos(e)); });
    canvas.addEventListener("pointermove", (e) => { onMove(canvasPos(e)); });
    window.addEventListener("pointerup",   (e) => { onUp(canvasPos(e)); });

    // ================== main loop ==================
    setupLevel();
    fitCanvas();
    let lastTime = null, frameAcc = 0;
    function loop(ts){
      if (lastTime === null) lastTime = ts;
      let dt = ts - lastTime;
      if (dt > 250) dt = 250;
      lastTime = ts;
      frameAcc += dt;
      while (frameAcc >= FRAME_MS){
        frameAcc -= FRAME_MS;
        stepFrame();
      }
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>

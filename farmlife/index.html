<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#8fc0e8" />
    <title>Farm Life</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #8fc0e8;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      #loading {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; flex-direction: column;
        background: linear-gradient(#8fc0e8 0%, #b6d8e6 45%, #cfe8c9 100%);
        color: #2c4a2c; text-align: center;
      }
      /* barn-sign loading card */
      #fl-load-card {
        background: #6b3a2e;
        border: 4px solid #4a271e;
        border-radius: 16px;
        padding: 22px 30px 20px;
        box-shadow: 0 10px 34px rgba(0,0,0,.32), inset 0 0 0 3px #7d4636;
        max-width: 86vw;
      }
      #fl-load-card .plank {
        background: linear-gradient(#f6ecd2, #ecdcb6);
        border: 2px solid #b98b4a; border-radius: 9px;
        padding: 8px 20px; display: inline-block;
      }
      #fl-load-title {
        font-size: 30px; font-weight: 900; letter-spacing: .06em;
        color: #a5402f; text-shadow: 1px 1px 0 #fff6df, 2px 2px 0 rgba(0,0,0,.12);
        margin: 0;
      }
      #fl-load-sub { margin-top: 12px; color: #f6ecd2; font-size: 15px; font-weight: 700; }
      #fl-load-hint { margin-top: 4px; color: #e8d6ac; font-size: 12.5px; font-weight: 600; opacity: .92; }
      #fl-load-dots { margin-top: 14px; height: 10px; display: flex; gap: 7px; justify-content: center; }
      #fl-load-dots span {
        width: 10px; height: 10px; border-radius: 50%; background: #f2c14e;
        animation: fl-bob 1s ease-in-out infinite;
      }
      #fl-load-dots span:nth-child(2) { animation-delay: .16s; }
      #fl-load-dots span:nth-child(3) { animation-delay: .32s; }
      @keyframes fl-bob { 0%,100% { transform: translateY(0); opacity:.6 } 50% { transform: translateY(-6px); opacity:1 } }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">
      <div id="fl-load-card">
        <div class="plank"><h1 id="fl-load-title">🌱 FARM LIFE</h1></div>
        <div id="fl-load-sub">Waking up the farm…</div>
        <div id="fl-load-hint">Tilling soil · feeding the goats · brewing sunshine</div>
        <div id="fl-load-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script>
      // Personalize the loading card with the family member's name (shared
      // localStorage `choreUser`, same origin as index.html). Lightweight, no assets.
      (function () {
        try {
          var who = localStorage.getItem("choreUser");
          if (who) {
            var el = document.getElementById("fl-load-sub");
            if (el) el.textContent = "Welcome back, " + who + "!";
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
